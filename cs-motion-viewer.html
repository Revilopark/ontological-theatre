<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clarksdale — Motion Comics</title>
<style>
:root{--bg:#0a0704;--gold:#D4AF37;--red:#8B1A1A;--text:#e8dcc8;--muted:#9a8a6a;--border:rgba(212,175,55,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}

/* Theater */
#theater{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
#panel-frame{position:relative;height:85vh;aspect-ratio:3/4;overflow:hidden;border-radius:4px;box-shadow:0 0 80px rgba(0,0,0,.9),0 0 120px rgba(0,0,0,.6)}

/* The panel image with Ken Burns motion */
#panel-img{width:100%;height:100%;object-fit:cover;transform-origin:center center;transition:none}
#panel-img.kb-in{animation:kenBurnsIn 8s ease-out forwards}
#panel-img.kb-out{animation:kenBurnsOut 8s ease-out forwards}
#panel-img.kb-pan-l{animation:panLeft 8s ease-in-out forwards}
#panel-img.kb-pan-r{animation:panRight 8s ease-in-out forwards}
#panel-img.kb-drift{animation:drift 8s ease-in-out forwards}
#panel-img.kb-rise{animation:rise 8s ease-out forwards}

@keyframes kenBurnsIn{0%{transform:scale(1.15) translate(2%,2%)}100%{transform:scale(1) translate(0,0)}}
@keyframes kenBurnsOut{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.12) translate(-2%,-2%)}}
@keyframes panLeft{0%{transform:scale(1.1) translate(4%,0)}100%{transform:scale(1.1) translate(-4%,0)}}
@keyframes panRight{0%{transform:scale(1.1) translate(-4%,0)}100%{transform:scale(1.1) translate(4%,0)}}
@keyframes drift{0%{transform:scale(1.08) translate(1%,2%)}100%{transform:scale(1.05) translate(-1%,-1%)}}
@keyframes rise{0%{transform:scale(1.12) translate(0,3%)}100%{transform:scale(1) translate(0,-1%)}}

/* Overlay elements */
#panel-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.7) 100%);pointer-events:none;z-index:2}
#grain{position:absolute;inset:0;opacity:0.04;z-index:3;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}

/* Caption */
#caption-bar{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:32px 24px 20px;background:linear-gradient(transparent,rgba(0,0,0,.92));pointer-events:none}
#caption-ep{font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:6px;text-transform:uppercase}
#caption-text{font-size:15px;line-height:1.6;color:#fff;font-style:italic;max-width:420px}
#caption-num{position:absolute;top:20px;right:20px;font-size:10px;color:var(--muted);letter-spacing:2px}

/* Top bar */
#top-bar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:linear-gradient(rgba(0,0,0,.8),transparent)}
#ep-title{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
#ep-era{font-size:10px;color:var(--muted)}

/* Controls */
#controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.85);border:1px solid var(--border);border-radius:40px;padding:10px 20px;backdrop-filter:blur(16px)}
.ctrl{background:none;border:none;color:var(--text);cursor:pointer;padding:6px 10px;font-size:16px;border-radius:6px;transition:.2s;line-height:1}
.ctrl:hover{background:rgba(212,175,55,.15);color:var(--gold)}
.ctrl.active{color:var(--gold)}
#progress-bar{width:120px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;position:relative;cursor:pointer}
#progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .1s linear}
#panel-counter{font-size:11px;color:var(--muted);letter-spacing:1px;min-width:50px;text-align:center}
#play-pause{font-size:20px!important}

/* Episode selector */
#ep-selector{position:fixed;left:20px;top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;gap:6px}
.ep-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:.3s;border:1px solid transparent}
.ep-dot:hover,.ep-dot.active{background:var(--gold);border-color:rgba(212,175,55,.5);transform:scale(1.3)}
.ep-dot-label{position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--gold);white-space:nowrap;opacity:0;pointer-events:none;background:rgba(0,0,0,.8);padding:2px 8px;border-radius:4px;letter-spacing:1px;transition:.2s}
.ep-dot-wrap{position:relative}
.ep-dot-wrap:hover .ep-dot-label{opacity:1}

/* Video overlay */
#video-overlay{position:fixed;inset:0;z-index:100;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center}
#video-player{max-width:min(100vw,56.25vh);width:100%;aspect-ratio:16/9}
#video-close{position:absolute;top:20px;right:20px;background:none;border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:16px}
#gen-video-btn{position:fixed;bottom:24px;right:24px;z-index:30;background:rgba(212,175,55,.15);border:1px solid var(--gold);color:var(--gold);padding:10px 18px;border-radius:20px;cursor:pointer;font-size:11px;letter-spacing:2px;backdrop-filter:blur(12px);transition:.2s;display:flex;align-items:center;gap:8px}
#gen-video-btn:hover{background:rgba(212,175,55,.3)}

/* Transition overlay */
#transition{position:absolute;inset:0;z-index:5;background:#000;opacity:0;pointer-events:none;transition:opacity .4s}
#transition.active{opacity:1}

/* Key settings modal */
#key-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}
#key-modal .modal{background:#0d0a06;border:1px solid var(--border);border-radius:16px;padding:28px;width:min(400px,90vw)}
.key-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(212,175,55,.2);border-radius:8px;color:#eee;padding:10px 14px;font-size:13px;outline:none;margin-top:8px;margin-bottom:16px}
.key-save-btn{width:100%;padding:11px;background:rgba(212,175,55,.15);border:1px solid var(--gold);border-radius:8px;color:var(--gold);font-size:12px;letter-spacing:2px;cursor:pointer}
</style>
</head>
<body>

<div id="theater">
  <div id="panel-frame">
    <img id="panel-img" src="" alt="Panel">
    <div id="panel-vignette"></div>
    <div id="grain"></div>
    <div id="transition"></div>
    <div id="top-bar">
      <div>
        <div id="ep-title">Loading...</div>
        <div id="ep-era"></div>
      </div>
    </div>
    <div id="caption-bar">
      <div id="caption-ep"></div>
      <div id="caption-text"></div>
    </div>
    <div id="caption-num"></div>
  </div>
</div>

<div id="ep-selector" id="ep-selector"></div>

<div id="controls">
  <button class="ctrl" onclick="prevEp()" title="Previous episode">«</button>
  <button class="ctrl" onclick="prevPanel()" title="Previous panel">‹</button>
  <button class="ctrl active" id="play-pause" onclick="togglePlay()" title="Play/Pause">▶</button>
  <button class="ctrl" onclick="nextPanel()" title="Next panel">›</button>
  <button class="ctrl" onclick="nextEp()" title="Next episode">»</button>
  <div id="progress-bar" onclick="seekProgress(event)"><div id="progress-fill" style="width:0%"></div></div>
  <div id="panel-counter">0 / 0</div>
  <button class="ctrl" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
</div>

<button id="gen-video-btn" onclick="openVideoGen()">🎬 Generate Video</button>

<div id="video-overlay">
  <video id="video-player" controls autoplay></video>
  <button id="video-close" onclick="closeVideo()">×</button>
  <div id="video-status" style="color:rgba(255,255,255,.6);font-size:12px;margin-top:12px"></div>
</div>

<div id="key-modal">
  <div class="modal">
    <div style="font-size:15px;font-weight:700;color:var(--gold);margin-bottom:6px">🎬 Video Generation</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:20px">Enter your Fal.ai API key to animate panels into video clips using Seedance or Kling.</div>
    <label style="font-size:11px;color:#aaa;letter-spacing:1px">FAL.AI KEY</label>
    <input class="key-input" id="fal-key-input" type="password" placeholder="fal-key-...">
    <div style="font-size:11px;color:var(--muted);margin-bottom:16px">Model: <strong>Seedance v1</strong> · 5 sec/panel · ~$0.08/panel</div>
    <button class="key-save-btn" onclick="saveAndGenerate()">SAVE KEY & ANIMATE CURRENT EPISODE</button>
    <button onclick="document.getElementById('key-modal').style.display='none'" style="width:100%;padding:9px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-top:8px">Cancel</button>
  </div>
</div>

<script>
const PROXY = 'https://awareness-proxy-328246068140.us-central1.run.app';

// Motion classes matched to era
const ERA_MOTION = {
  '1936': ['kb-in','kb-drift','kb-pan-l','kb-pan-r','kb-rise','kb-out'],
  '1929': ['kb-drift','kb-pan-r','kb-in','kb-pan-l','kb-rise','kb-out'],
  '1951': ['kb-in','kb-pan-r','kb-pan-l','kb-drift','kb-out','kb-rise'],
  '1943': ['kb-pan-l','kb-pan-l','kb-drift','kb-pan-r','kb-in','kb-out'],
  '1940s': ['kb-drift','kb-rise','kb-in','kb-pan-l','kb-out','kb-pan-r'],
  '1963': ['kb-rise','kb-in','kb-drift','kb-rise','kb-in','kb-out'],
  '1994': ['kb-pan-r','kb-in','kb-pan-l','kb-drift','kb-pan-r','kb-out'],
  '1976': ['kb-in','kb-pan-l','kb-pan-r','kb-drift','kb-rise','kb-out'],
  default: ['kb-in','kb-pan-r','kb-drift','kb-rise','kb-pan-l','kb-out']
};

// Load episodes from parent page if embedded, or standalone
let EPISODES = [];
let currentEp = 0;
let currentPanel = 0;
let isPlaying = false;
let playTimer = null;
let panelDuration = 7000; // ms per panel

// Try loading episodes from cs-panel-overrides + EPISODES
async function loadEpisodes() {
  try {
    // Try to fetch episodes data
    const r = await fetch('./cs-panel-overrides.js');
    const js = await r.text();
    eval(js.replace('(function(){','').replace('})();',''));

    // Also try the clarksdale page to get episode metadata
    // For standalone use, define minimal episode set
    const overrides = window.CS_PANEL_OVERRIDES || {};
    EPISODES = Object.entries(overrides).map(([id, urls]) => ({
      id: parseInt(id),
      panels: urls.filter(Boolean).map((url, i) => ({ img: url, caption: '' }))
    }));

    // Episode titles and eras
    const META = {
      1:{title:'The Crossroads',era:'1936',characters:'Robert Johnson'},
      2:{title:'Dockery Plantation',era:'1929',characters:'Charley Patton · Son House'},
      3:{title:'Rocket 88',era:'1951',characters:'Ike Turner · Sam Phillips'},
      4:{title:'The Great Migration',era:'1943',characters:'Muddy Waters'},
      5:{title:'The Sacred & Profane',era:'1940s',characters:'Son House · Sister Rosetta Tharpe'},
      6:{title:'A Change Is Gonna Come',era:'1963',characters:'Sam Cooke'},
      7:{title:'King of Hooks',era:'1994',characters:'Nate Dogg'},
      8:{title:'The Delta in Every Bar',era:'1976',characters:'George Clinton · Parliament-Funkadelic'},
      9:{title:'The Riverside Hotel',era:'1924–present',characters:'Bessie Smith · The Hotel Itself'},
      10:{title:'The Flood',era:'1927',characters:'Bessie Smith · Charley Patton'},
      11:{title:'White Gold',era:'1952–1956',characters:'Sam Phillips · Elvis Presley'},
      12:{title:'The First Invasion',era:'1736–1838',characters:'Chickasaw · Choctaw Nations'},
      13:{title:'The Second Invasion',era:'1964–1970s',characters:'Muddy Waters · Rolling Stones'},
      14:{title:'The First 27',era:'1938',characters:'Robert Johnson'},
      15:{title:'The Shiver — The 27 Club',era:'1938–2011',characters:'Robert Johnson through Amy Winehouse'}
    };

    EPISODES.forEach(ep => {
      const meta = META[ep.id] || {};
      ep.title = meta.title || `Episode ${ep.id}`;
      ep.era = meta.era || '';
      ep.characters = meta.characters || '';
    });

    // Sort by id
    EPISODES.sort((a,b) => a.id - b.id);
    buildEpSelector();
    loadEpisode(0);
  } catch(e) {
    console.error('Failed to load episodes:', e);
    document.getElementById('ep-title').textContent = 'Load from Clarksdale Series page';
  }
}

function buildEpSelector() {
  const sel = document.getElementById('ep-selector');
  sel.innerHTML = EPISODES.map((ep,i) => `
    <div class="ep-dot-wrap">
      <div class="ep-dot ${i===0?'active':''}" id="dot-${i}" onclick="jumpToEp(${i})"></div>
      <div class="ep-dot-label">Ep ${ep.id}: ${ep.title}</div>
    </div>
  `).join('');
}

function loadEpisode(idx) {
  currentEp = Math.max(0, Math.min(idx, EPISODES.length - 1));
  currentPanel = 0;
  const ep = EPISODES[currentEp];
  document.getElementById('ep-title').textContent = `EP ${ep.id} — ${ep.title}`;
  document.getElementById('ep-era').textContent = `${ep.era} · ${ep.characters}`;
  document.querySelectorAll('.ep-dot').forEach((d,i) => d.classList.toggle('active', i===currentEp));
  showPanel(0);
}

function getMotionClass(ep, panelIdx) {
  const moves = ERA_MOTION[ep.era] || ERA_MOTION.default;
  return moves[panelIdx % moves.length];
}

function showPanel(idx) {
  const ep = EPISODES[currentEp];
  if (!ep) return;
  currentPanel = Math.max(0, Math.min(idx, ep.panels.length - 1));
  const panel = ep.panels[currentPanel];

  // Transition
  const trans = document.getElementById('transition');
  trans.classList.add('active');
  setTimeout(() => {
    const img = document.getElementById('panel-img');
    img.src = panel.img || '';
    img.className = '';
    void img.offsetWidth;
    img.classList.add(getMotionClass(ep, currentPanel));
    document.getElementById('caption-text').textContent = panel.caption || '';
    document.getElementById('caption-ep').textContent = `${ep.title.toUpperCase()} · ${ep.era}`;
    document.getElementById('caption-num').textContent = `${currentPanel+1} / ${ep.panels.length}`;
    const pct = ep.panels.length > 1 ? (currentPanel/(ep.panels.length-1))*100 : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('panel-counter').textContent = `${currentPanel+1} / ${ep.panels.length}`;
    trans.classList.remove('active');
  }, 400);
}

function nextPanel() {
  const ep = EPISODES[currentEp];
  if (currentPanel < ep.panels.length - 1) showPanel(currentPanel + 1);
  else nextEp();
}
function prevPanel() {
  if (currentPanel > 0) showPanel(currentPanel - 1);
  else if (currentEp > 0) { loadEpisode(currentEp - 1); showPanel(EPISODES[currentEp].panels.length - 1); }
}
function nextEp() { if (currentEp < EPISODES.length - 1) loadEpisode(currentEp + 1); }
function prevEp() { if (currentEp > 0) loadEpisode(currentEp - 1); }
function jumpToEp(idx) { loadEpisode(idx); }

function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('play-pause').textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) scheduleNext();
  else clearTimeout(playTimer);
}

function scheduleNext() {
  if (!isPlaying) return;
  playTimer = setTimeout(() => { nextPanel(); if(isPlaying) scheduleNext(); }, panelDuration);
}

function seekProgress(e) {
  const bar = document.getElementById('progress-bar');
  const pct = e.offsetX / bar.offsetWidth;
  const ep = EPISODES[currentEp];
  showPanel(Math.round(pct * (ep.panels.length - 1)));
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nextPanel();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prevPanel();
  if(e.key===' ') { e.preventDefault(); togglePlay(); }
  if(e.key==='f') toggleFullscreen();
});

// Video generation
function openVideoGen() {
  const key = localStorage.getItem('fal_key');
  if (key) { generateEpisodeVideo(); }
  else { document.getElementById('key-modal').style.display = 'flex'; }
}

function saveAndGenerate() {
  const key = document.getElementById('fal-key-input').value.trim();
  if (key) { localStorage.setItem('fal_key', key); }
  document.getElementById('key-modal').style.display = 'none';
  generateEpisodeVideo();
}

async function generateEpisodeVideo() {
  const ep = EPISODES[currentEp];
  const overlay = document.getElementById('video-overlay');
  const statusEl = document.getElementById('video-status');
  overlay.style.display = 'flex';

  const falKey = localStorage.getItem('fal_key');
  if (!falKey) { statusEl.textContent = '⚠ No Fal.ai key. Add it in settings.'; return; }

  statusEl.textContent = `Animating ${ep.panels.length} panels via Seedance...`;
  const clips = [];

  for (let i = 0; i < Math.min(ep.panels.length, 6); i++) {
    const panel = ep.panels[i];
    statusEl.textContent = `Animating panel ${i+1}/${ep.panels.length}...`;
    try {
      const r = await fetch('https://fal.run/fal-ai/bytedance/seedance-v1-lite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Key ${falKey}` },
        body: JSON.stringify({
          image_url: panel.img,
          prompt: `${ep.title} ${ep.era} — ${panel.caption || 'cinematic Delta blues scene'}. Slow cinematic camera push, dramatic atmospheric motion, historical gravitas. No text, no watermarks.`,
          duration: 4,
          resolution: '480p'
        })
      });
      if (r.ok) {
        const d = await r.json();
        if (d.video?.url) clips.push(d.video.url);
      }
      await new Promise(res => setTimeout(res, 1500));
    } catch(e) { console.warn('Panel animation failed:', e); }
  }

  if (clips.length > 0) {
    statusEl.textContent = `${clips.length} clips ready. Playing first clip (full episode sequencing coming soon).`;
    document.getElementById('video-player').src = clips[0];
  } else {
    statusEl.textContent = '✗ Generation failed. Check your Fal.ai key and try again.';
  }
}

function closeVideo() {
  document.getElementById('video-overlay').style.display = 'none';
  document.getElementById('video-player').src = '';
}

// Init
loadEpisodes();
</script>
</body>
</html>
