<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Clarksdale Series — A Trinity World Production</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #111108;
  --surface2: #181510;
  --border: #2a1f00;
  --gold: #D4AF37;
  --gold-dim: #8a6f1e;
  --text: #e8d5b0;
  --text-dim: #8a7a5a;
  --text-muted: #4a3f2a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.6;display:flex;flex-direction:column;}

/* ══ TOP HEADER BAR ══ */
.top-bar{
  height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
.top-bar-left{display:flex;align-items:center;gap:12px;}
.top-bar-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:flex;align-items:center;justify-content:center;font-size:15px;}
.top-bar-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);}
.top-bar-sub{font-size:9px;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase;}
.top-bar-stats{font-size:11px;color:var(--text-dim);display:flex;gap:16px;}
.top-bar-stats span{color:var(--gold);font-weight:600;}
.top-bar-right{display:flex;align-items:center;gap:10px;}
.top-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:10px;font-weight:600;letter-spacing:.06em;cursor:pointer;transition:all .2s;font-family:inherit;}
.top-btn:hover{border-color:var(--gold);color:var(--gold);}
.top-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;border-color:var(--gold);}

/* ══ MAIN 3-PANEL LAYOUT ══ */
.app-layout{display:flex;flex:1;overflow:hidden;}

/* ── LEFT SIDEBAR ── */
.sidebar{width:280px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);background:#0d0d0d;flex-shrink:0;}
.sidebar-tab{
  flex:1;padding:10px 4px;text-align:center;
  font-size:8px;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;
}
.sidebar-tab:hover{color:var(--text-dim);}
.sidebar-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.sidebar-content{flex:1;overflow-y:auto;}
.sidebar-content::-webkit-scrollbar{width:3px;}
.sidebar-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.sidebar-panel{display:none;}
.sidebar-panel.active{display:block;}

/* Sidebar section header */
.sb-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.sb-header-count{font-size:10px;color:var(--text-dim);letter-spacing:.1em;}
.sb-search{width:100%;padding:6px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;margin-top:8px;outline:none;font-family:inherit;}
.sb-search:focus{border-color:var(--gold-dim);}

/* Episode card in sidebar */
.ep-card{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.ep-card:hover{background:var(--surface2);}
.ep-card.selected{background:var(--surface2);border-left:3px solid var(--gold);}
.ep-num{font-size:9px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;}
.ep-title{font-family:'Playfair Display',serif;color:var(--text);font-size:13px;margin:2px 0;}
.ep-meta{font-size:10px;color:var(--text-muted);}

/* Character card in sidebar */
.char-card-sb{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;overflow:hidden;}
.char-card-sb:hover{background:var(--surface2);}
.char-card-sb.selected{background:var(--surface2);border-left:3px solid var(--gold);}
.char-portrait{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);object-fit:cover;float:left;margin-right:10px;}
.char-name-sb{font-family:'Playfair Display',serif;color:var(--text);font-size:13px;}
.char-archetype{font-size:8px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;}
.char-era-sb{font-size:10px;color:var(--text-muted);}
.iam-score-bar{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:10px;clear:both;}
.iam-score-label{color:var(--text-dim);width:70px;font-size:9px;}
.iam-score-track{flex:1;height:2px;background:var(--border);position:relative;}
.iam-score-fill{height:100%;background:var(--gold);}
.iam-score-val{color:var(--gold-dim);font-size:9px;width:26px;text-align:right;}

/* Artifact card in sidebar */
.artifact-card-sb{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center;transition:background .15s;}
.artifact-card-sb:hover{background:var(--surface2);}
.artifact-card-sb.selected{background:var(--surface2);border-left:3px solid var(--gold);}
.artifact-icon{font-size:18px;flex-shrink:0;}
.artifact-name-sb{color:var(--text);font-size:12px;}
.artifact-owner-sb{font-size:10px;color:var(--text-dim);}

/* Theme card in sidebar */
.theme-card-sb{padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.theme-card-sb:hover{background:var(--surface2);}
.theme-card-sb.selected{background:var(--surface2);border-left:3px solid var(--gold);}
.theme-cat{font-size:8px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;}
.theme-title-sb{font-family:'Playfair Display',serif;color:var(--text);font-size:13px;margin:2px 0;}
.theme-preview{font-size:10px;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* Timeline card in sidebar */
.timeline-item{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:baseline;cursor:pointer;transition:background .15s;}
.timeline-item:hover{background:var(--surface2);}
.timeline-year{font-family:'Playfair Display',serif;color:var(--gold-dim);font-size:12px;font-weight:700;width:44px;flex-shrink:0;}
.timeline-label{font-size:11px;color:var(--text);}
.timeline-type{font-size:8px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}

/* ── CENTER PANEL ── */
.center-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);overflow-y:auto;padding:32px 20px;}
.center-panel::-webkit-scrollbar{width:4px;}
.center-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Phone frame */
.phone-frame{
  width:320px;min-height:560px;max-height:640px;
  background:#000;border-radius:40px;
  border:3px solid #222;
  box-shadow:0 20px 60px rgba(0,0,0,.6),inset 0 0 0 2px #1a1a1a;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
.phone-notch{height:28px;background:#000;border-radius:40px 40px 0 0;display:flex;align-items:center;justify-content:center;}
.phone-notch-inner{width:80px;height:6px;background:#1a1a1a;border-radius:3px;}
.phone-screen{flex:1;overflow-y:auto;background:var(--bg);}
.phone-screen::-webkit-scrollbar{width:2px;}
.phone-screen::-webkit-scrollbar-thumb{background:var(--border);}
.phone-home{height:18px;background:#000;border-radius:0 0 40px 40px;display:flex;align-items:center;justify-content:center;}
.phone-home-bar{width:100px;height:4px;background:#2a2a2a;border-radius:2px;}

/* Phone screen content types */
.phone-comic-panel{width:100%;display:block;}
.phone-comic-panel img{width:100%;display:block;}
.phone-caption{padding:14px 18px;font-size:12px;color:var(--text-dim);line-height:1.6;font-style:italic;border-top:1px solid var(--border);}

/* Character in phone */
.phone-char-portrait{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
.phone-char-info{padding:16px 18px;}
.phone-char-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:2px;}
.phone-char-arch{font-size:9px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;}
.phone-char-era{font-size:11px;color:var(--text-muted);margin:4px 0 12px;}
.phone-char-desc{font-size:12px;color:var(--text-dim);line-height:1.6;}
.phone-dots{display:flex;gap:6px;justify-content:center;padding:10px;}
.phone-dot{width:6px;height:6px;border-radius:50%;background:var(--border);}
.phone-dot.active{background:var(--gold);}

/* Artifact in phone */
.phone-artifact-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
.phone-artifact-info{padding:16px 18px;}
.phone-artifact-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:4px;}
.phone-artifact-desc{font-size:12px;color:var(--text-dim);line-height:1.6;}

/* Intelligence card in phone */
.intel-card{padding:28px 20px;height:100%;background:linear-gradient(180deg,#1a1200 0%,#0d0d00 100%);display:flex;flex-direction:column;gap:16px;}
.intel-header{display:flex;gap:8px;font-size:10px;letter-spacing:2px;color:var(--gold-dim);}
.intel-title{font-family:'Playfair Display',serif;color:var(--text);font-size:20px;line-height:1.2;}
.intel-divider{height:1px;background:var(--border);}
.intel-body{color:var(--text-dim);font-size:12px;line-height:1.6;flex:1;}
.intel-insight{color:var(--gold);font-style:italic;font-size:11px;line-height:1.5;}
.intel-connection{font-size:10px;color:var(--text-muted);padding-top:10px;border-top:1px solid var(--border);}

/* Center info below phone */
.center-context{margin-top:16px;text-align:center;font-size:10px;color:var(--text-muted);letter-spacing:.08em;}

/* ── RIGHT PANEL (Editor) ── */
.right-panel{width:320px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.editor-header{padding:14px 16px;border-bottom:1px solid var(--border);}
.editor-header-label{font-size:9px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:4px;}
.editor-header-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);}
.editor-body{flex:1;overflow-y:auto;padding:16px;}
.editor-body::-webkit-scrollbar{width:3px;}
.editor-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Editor form elements */
.ed-group{margin-bottom:16px;}
.ed-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
.ed-input{width:100%;padding:8px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none;font-family:inherit;}
.ed-input:focus{border-color:var(--gold-dim);}
.ed-textarea{width:100%;padding:8px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;outline:none;font-family:inherit;resize:vertical;min-height:60px;line-height:1.6;}
.ed-textarea:focus{border-color:var(--gold-dim);}
.ed-select{width:100%;padding:8px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;outline:none;font-family:inherit;-webkit-appearance:none;}
.ed-slider-row{display:flex;align-items:center;gap:8px;margin:4px 0;}
.ed-slider-label{font-size:10px;color:var(--text-dim);width:80px;}
.ed-slider{flex:1;-webkit-appearance:none;height:2px;background:var(--border);outline:none;border-radius:2px;}
.ed-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--gold);cursor:pointer;}
.ed-slider-val{font-size:10px;color:var(--gold-dim);width:32px;text-align:right;}
.ed-btn{width:100%;padding:10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;}
.ed-btn:hover{border-color:var(--gold);color:var(--gold);}
.ed-btn.gold{background:linear-gradient(135deg,rgba(212,175,55,.15),rgba(212,175,55,.05));border-color:var(--gold-dim);color:var(--gold);}
.ed-btn.gold:hover{background:linear-gradient(135deg,rgba(212,175,55,.25),rgba(212,175,55,.1));}
.ed-divider{height:1px;background:var(--border);margin:16px 0;}

/* Editor: IAM score display */
.ed-ity-row{display:flex;align-items:center;gap:8px;margin:6px 0;}
.ed-ity-label{font-size:10px;color:var(--text-dim);width:80px;}
.ed-ity-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.ed-ity-fill{height:100%;background:var(--gold);border-radius:2px;}
.ed-ity-val{font-size:10px;color:var(--gold-dim);width:32px;text-align:right;}

/* Spark in editor */
.ed-spark-portraits{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ed-spark-portrait{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
.ed-spark-bolt{font-size:20px;color:var(--gold);}
.ed-conv-score{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold);font-weight:700;}
.ed-conv-label{font-size:9px;color:var(--text-muted);letter-spacing:.1em;}

/* Narrative act in editor */
.ed-act-rune{font-size:36px;text-align:center;margin:8px 0;}

/* Environment in editor */
.ed-env-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.ed-env-tag{padding:3px 8px;border:1px solid var(--border);border-radius:10px;font-size:9px;color:var(--text-muted);}

/* ══ RESPONSIVE ══ */
@media(max-width:1100px){
  .right-panel{width:260px;}
  .sidebar{width:240px;}
}
@media(max-width:900px){
  .app-layout{flex-direction:column;}
  .sidebar{width:100%;height:auto;max-height:200px;border-right:none;border-bottom:1px solid var(--border);}
  .right-panel{width:100%;height:auto;max-height:300px;border-left:none;border-top:1px solid var(--border);}
  .phone-frame{width:280px;min-height:480px;}
}

/* ══ SCROLLBAR GLOBAL ══ */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<!-- ══ TOP BAR ══ -->
<div class="top-bar">
  <div class="top-bar-left">
    <div class="top-bar-logo">🎸</div>
    <div>
      <div class="top-bar-title">The Clarksdale Series</div>
      <div class="top-bar-sub">A Trinity World Production</div>
    </div>
  </div>
  <div class="top-bar-stats" id="context-stats">
    <span id="stat-display">9 episodes · 72 panels total</span>
  </div>
  <div class="top-bar-right">
    <button class="top-btn" onclick="toggleKnowledgeGraph()">🕸 Knowledge Graph</button>
    <button class="top-btn" onclick="csTogglePanel()">✦ Intelligence</button>
    <button class="top-btn gold" onclick="window.open('trinity-worlds.html')">⬡ Trinity Worlds</button>
  </div>
</div>

<!-- ══ 3-PANEL LAYOUT ══ -->
<div class="app-layout">

  <!-- ── LEFT SIDEBAR ── -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="episodes" onclick="switchTab('episodes')">Episodes</button>
      <button class="sidebar-tab" data-tab="characters" onclick="switchTab('characters')">Characters</button>
      <button class="sidebar-tab" data-tab="artifacts" onclick="switchTab('artifacts')">Artifacts</button>
      <button class="sidebar-tab" data-tab="themes" onclick="switchTab('themes')">Themes</button>
      <button class="sidebar-tab" data-tab="timeline" onclick="switchTab('timeline')">Timeline</button>
    </div>
    <div class="sidebar-content">

      <!-- EPISODES PANEL -->
      <div class="sidebar-panel active" id="panel-episodes"></div>

      <!-- CHARACTERS PANEL -->
      <div class="sidebar-panel" id="panel-characters"></div>

      <!-- ARTIFACTS PANEL -->
      <div class="sidebar-panel" id="panel-artifacts"></div>

      <!-- THEMES PANEL -->
      <div class="sidebar-panel" id="panel-themes"></div>

      <!-- TIMELINE PANEL -->
      <div class="sidebar-panel" id="panel-timeline"></div>

    </div>
  </div>

  <!-- ── CENTER PANEL ── -->
  <div class="center-panel" id="center-panel">

      <div class="phone-notch"><div class="phone-notch-inner"></div></div>
      <div class="phone-screen" id="phone-screen"></div>
      <div class="phone-home"><div class="phone-home-bar"></div></div>
    </div>
    <div class="center-context" id="center-context"></div>
  </div>

  <!-- ── RIGHT PANEL (Editor) ── -->
  <div class="right-panel">
    <div class="editor-header">
      <div class="editor-header-label" id="editor-label">PANEL EDITOR</div>
      <div class="editor-header-title" id="editor-title">Select an item</div>
    </div>
    <div class="editor-body" id="editor-body">
      <div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px;">
        Select an episode, character, artifact, or theme from the sidebar to begin editing.
      </div>
    </div>
  </div>

</div>

<!-- ══ INTELLIGENCE PANEL (floating) ══ -->
<style>
#cs-intel-toggle{position:fixed;bottom:28px;right:28px;z-index:9000;display:flex;align-items:center;gap:9px;padding:12px 20px;border-radius:40px;background:linear-gradient(135deg,#1a1206,#2a1e0a);border:1px solid rgba(200,151,58,.45);box-shadow:0 4px 32px rgba(200,151,58,.2);color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;transition:all .25s;}
#cs-intel-toggle:hover{transform:translateY(-2px);box-shadow:0 6px 40px rgba(200,151,58,.35);}
.toggle-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold);animation:cs-pulse 2s infinite;}
@keyframes cs-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
#cs-intel-panel{position:fixed;bottom:90px;right:28px;z-index:8999;width:440px;height:660px;max-height:calc(100vh - 110px);display:flex;flex-direction:column;background:rgba(10,7,4,.97);border:1px solid rgba(200,151,58,.3);border-radius:18px;box-shadow:0 12px 60px rgba(0,0,0,.7);backdrop-filter:blur(24px);transform:translateY(20px) scale(.97);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.4,0,.2,1);}
#cs-intel-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
.cs-toast{position:fixed;bottom:90px;right:28px;z-index:9500;padding:10px 16px;border-radius:10px;background:rgba(13,148,136,.9);color:#fff;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.4);transform:translateY(10px);opacity:0;transition:all .3s;pointer-events:none;}
.cs-toast.show{transform:translateY(0);opacity:1;}
</style>
<div class="cs-toast" id="cs-toast"></div>
<button id="cs-intel-toggle" onclick="csTogglePanel()" style="display:none;">
  <span class="toggle-dot"></span>Clarksdale Intelligence
</button>
<div id="cs-intel-panel"></div>

<!-- ══ KNOWLEDGE GRAPH OVERLAY ══ -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
#kg-overlay{position:fixed;inset:0;z-index:9999;background:#0d0d0d;display:none;flex-direction:column;font-family:'Inter',sans-serif;}
#kg-overlay.active{display:flex;}
#kg-topbar{display:flex;align-items:center;gap:16px;padding:10px 24px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;flex-shrink:0;}
#kg-topbar button{padding:6px 14px;border-radius:6px;border:1px solid #2a2a2a;background:transparent;color:#e8d5b0;font-size:12px;font-weight:600;cursor:pointer;}
#kg-topbar button:hover{border-color:#D4AF37;color:#D4AF37;}
#kg-topbar h2{font-family:'Playfair Display',serif;font-size:18px;color:#e8d5b0;margin:0;}
#kg-search{padding:6px 12px;border-radius:6px;border:1px solid #2a2a2a;background:#0d0d0d;color:#e8d5b0;font-size:12px;width:200px;outline:none;}
#kg-body{display:flex;flex:1;overflow:hidden;position:relative;}
#kg-canvas{flex:1;}
#kg-canvas svg{width:100%;height:100%;}
#kg-info{width:280px;background:#1a1a1a;border-left:1px solid #2a2a2a;padding:24px;overflow-y:auto;}
#kg-info.empty::before{content:'Hover or click a node to see details';color:#7A6A4A;font-size:13px;font-style:italic;}
#kg-info h3{font-family:'Playfair Display',serif;font-size:20px;color:#e8d5b0;margin-bottom:8px;}
#kg-legend{position:absolute;bottom:20px;left:20px;background:rgba(26,26,26,.9);border:1px solid #2a2a2a;border-radius:8px;padding:12px 16px;display:flex;gap:16px;font-size:11px;color:#7A6A4A;}
#kg-legend span{display:flex;align-items:center;gap:5px;}
#kg-legend i{display:inline-block;width:10px;height:10px;border-radius:50%;}
</style>

// ── TAB SWITCHING ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));

  // Update stats
  const stats = {
    episodes: `9 episodes · ${EPISODES.reduce((s,e)=>s+e.panels.length,0)} panels · ${VIDEOS.length} video arcs`,
    characters: `${CHARACTERS.length} characters across 9 episodes`,
    artifacts: `${ALL_ARTIFACTS.length} artifacts · ${ARTIFACTS.length} collections`,
    themes: `${THEMES.length} intelligence themes`,
    timeline: `${CHARACTERS.length + ALL_ARTIFACTS.length + THEMES.length} entities across all eras`
  };
  document.getElementById('stat-display').textContent = stats[tab] || '';

  // Auto-select first item if nothing selected for this tab
  selectedItem = null;
  if (tab === 'episodes' && EPISODES.length) selectItem('episode', 0);
  else if (tab === 'characters' && CHARACTERS.length) selectItem('character', 0);
  else if (tab === 'artifacts' && ALL_ARTIFACTS.length) selectItem('artifact', 0);
  else if (tab === 'themes' && THEMES.length) selectItem('theme', 0);
  else if (tab === 'timeline') { renderTimeline(); showWelcomeCenter(); showWelcomeEditor(); }
}

    artHtml += `<div class="artifact-card-sb${i===0?' selected':''}" data-idx="${i}" onclick="selectItem('artifact',${i})">

    </div>`;

function renderTimeline() {
  // Collect all items with dates
  const items = [];
  CHARACTERS.forEach(c => {
    const m = c.era.match(/\d{4}/);
    if (m) items.push({year:+m[0], label:c.name, type:'character', icon:'🎤'});
  });
  ALL_ARTIFACTS.forEach(a => items.push({year:0, label:a.name + ' · ' + a.owner, type:'artifact', icon:a.icon}));
  THEMES.forEach(t => {
    const m = (t.era||'').match(/\d{4}/);
    items.push({year:m?+m[0]:0, label:t.title, type:'theme', icon:'💡'});
  });
  EPISODES.forEach(e => {
    const m = (e.era||'').match(/\d{4}/);
    items.push({year:m?+m[0]:0, label:'Ep ' + e.id + ': ' + e.title, type:'episode', icon:'🎬'});
  });
  items.sort((a,b) => a.year - b.year);

  let html = '';
  items.forEach(item => {
    html += `<div class="timeline-item">
      <div class="timeline-year">${item.year || '—'}</div>
      <div>
        <div class="timeline-label">${item.icon} ${item.label}</div>
        <div class="timeline-type">${item.type}</div>
      </div>
    </div>`;
  });
  document.getElementById('panel-timeline').innerHTML = html;
}

// ── ITEM SELECTION ──
function selectItem(type, index) {
  selectedItem = {type, index};

  // Update sidebar selection
  const panelId = {episode:'panel-episodes',character:'panel-characters',artifact:'panel-artifacts',theme:'panel-themes'}[type];
  if (panelId) {
    const cards = document.getElementById(panelId).children;
    Array.from(cards).forEach((c,i) => c.classList.toggle('selected', i === index));
  }

  // Render center and right panels
  renderCenter(type, index);
  renderEditor(type, index);
}

  if (type === 'episode') {

      ep.panels.forEach(p => {
        html += `<div class="phone-comic-panel"><img src="${p.img}" alt="${ep.title}" loading="lazy"></div>`;

    {source:"son-house",target:"robert-johnson",label:"taught",strength:3},
    {source:"robert-johnson",target:"muddy-waters",label:"influenced",strength:3},
    {source:"muddy-waters",target:"chicago",label:"migrated to",strength:3},
    {source:"robert-johnson",target:"crossroads",label:"made the deal",strength:3},
    {source:"crossroads",target:"clarksdale",label:"located in",strength:3},
    {source:"ike-turner",target:"clarksdale",label:"born in",strength:3},
    {source:"muddy-waters",target:"great-migration",label:"part of",strength:2},
    {source:"delta-blues",target:"rock-and-roll-birth",label:"birthed",strength:3},
    {source:"clarksdale",target:"delta-blues",label:"origin of",strength:3}
  ]
};

const NC = {person:'#D4AF37',place:'#4ECDC4',song:'#C77DFF',theme:'#FF6B6B'};
let kgSim;

function initKG() {
  const canvas = document.getElementById('kg-canvas');
  const W = canvas.clientWidth, H = canvas.clientHeight;
  const nodes = GRAPH_DATA.nodes.map(d => ({...d}));
  const edges = GRAPH_DATA.edges.map(d => ({...d}));

  const svg = d3.select('#kg-canvas').append('svg').attr('width',W).attr('height',H);
  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([.3,5]).on('zoom', e => g.attr('transform',e.transform)));

  g.append('g').selectAll('line').data(edges).join('line')
    .attr('stroke','#e8d5b0').attr('stroke-opacity',.15).attr('stroke-width',d=>d.strength);

  const nodeG = g.append('g').selectAll('g').data(nodes).join('g').attr('cursor','pointer');
  nodeG.append('circle').attr('r',d => Math.max(8,Math.min(28,(d.episodes||[]).length*5)))
    .attr('fill',d => NC[d.type]).attr('opacity',.85);
  nodeG.append('text').text(d => d.label)
    .attr('dy',d => Math.max(8,Math.min(28,(d.episodes||[]).length*5))+14)
    .attr('text-anchor','middle').attr('fill','#e8d5b0').attr('font-size',10);

  nodeG.on('click', function(ev, d) {
    document.getElementById('kg-info').className = '';
    document.getElementById('kg-info').innerHTML = `<h3>${d.label}</h3><div style="font-size:11px;color:#D4AF37;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;">${d.type}${d.era?' · '+d.era:''}</div>`;
  });

  kgSim = d3.forceSimulation(nodes)
    .force('link',d3.forceLink(edges).id(d=>d.id).distance(100))
    .force('charge',d3.forceManyBody().strength(-300))
    .force('center',d3.forceCenter(W/2,H/2))
    .on('tick', () => {
      g.selectAll('line').attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeG.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
}

window.kgSearch = function(q) {};
window.kgEnrich = function() {};

// ── INIT ──
renderSidebar();
selectItem('episode', 0);
</script>
