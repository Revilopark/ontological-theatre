<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inkwell Garment Studio</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #e8e4f0;
    --bg2: rgba(255,255,255,0.55);
    --bg3: rgba(255,255,255,0.35);
    --bg4: rgba(255,255,255,0.2);
    --border: rgba(180,160,210,0.3);
    --border2: rgba(180,160,210,0.15);
    --gold: #8B5CF6;
    --gold2: #7C3AED;
    --gold-dim: rgba(139,92,246,0.4);
    --text: #1a1028;
    --text2: #4a3a6a;
    --text3: #8a7aaa;
    --accent-purple: #8B5CF6;
    --accent-blue: #3B82F6;
    --accent-teal: #06B6D4;
    --accent-rose: #EC4899;
    --accent-amber: #D4A04A;
    --font: 'Inter', system-ui, sans-serif;
    --font-display: 'Playfair Display', Georgia, serif;
    --radius: 16px;
    --radius-sm: 10px;
    --glass: rgba(255,255,255,0.6);
    --glass-border: rgba(255,255,255,0.8);
    --shadow: 0 8px 32px rgba(100,60,180,0.12);
    --shadow-sm: 0 2px 12px rgba(100,60,180,0.08);
  }
  html, body {
    height: 100%;
    background: linear-gradient(135deg, #e8e4f0 0%, #ddd8f0 30%, #e4dff5 60%, #ece8f8 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font);
    overflow-x: hidden;
  }
  /* Ambient orbs */
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    right: -10%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -10%;
    left: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  #root { min-height: 100vh; position: relative; z-index: 1; }
  button { font-family: var(--font); cursor: pointer; }
  input, select, textarea {
    font-family: var(--font);
    background: var(--glass);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.25); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.45); }

  .inkwell-header {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(40px) saturate(1.8);
    -webkit-backdrop-filter: blur(40px) saturate(1.8);
    border-bottom: 1px solid var(--glass-border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(100,60,180,0.08);
  }
  .inkwell-logo {
    display: flex;
    flex-direction: column;
  }
  .inkwell-logo-title {
    color: var(--gold);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: var(--font-display);
  }
  .inkwell-logo-sub {
    color: var(--text3);
    font-size: 9px;
    letter-spacing: 2px;
    margin-top: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .inkwell-tabs {
    display: flex;
    gap: 6px;
    background: rgba(139,92,246,0.08);
    padding: 5px;
    border-radius: 14px;
    border: 1px solid var(--border);
  }
  .inkwell-tab {
    padding: 7px 18px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text3);
    transition: all 0.25s ease;
    border-radius: 10px;
  }
  .inkwell-tab:hover { color: var(--text2); background: rgba(255,255,255,0.5); }
  .inkwell-tab.active {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    color: var(--gold);
    border-color: rgba(139,92,246,0.2);
    font-weight: 600;
    box-shadow: var(--shadow-sm);
  }

  .panel {
    padding: 28px;
    min-height: calc(100vh - 64px);
  }
  .panel-title {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text3);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--glass);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: var(--shadow); }
  .card-title {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .btn {
    padding: 8px 18px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text2);
    border-radius: var(--radius-sm);
    transition: all 0.2s ease;
  }
  .btn:hover {
    border-color: rgba(139,92,246,0.4);
    color: var(--gold);
    background: rgba(255,255,255,0.8);
    box-shadow: var(--shadow-sm);
  }
  .btn.primary {
    background: linear-gradient(135deg, #8B5CF6, #7C3AED);
    color: white;
    border-color: transparent;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(139,92,246,0.35);
  }
  .btn.primary:hover {
    background: linear-gradient(135deg, #7C3AED, #6D28D9);
    box-shadow: 0 6px 20px rgba(139,92,246,0.45);
    transform: translateY(-1px);
  }

  .fabric-chip {
    padding: 10px 14px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text2);
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.2s ease;
    width: 100%;
    border-radius: var(--radius-sm);
    font-weight: 400;
  }
  .fabric-chip:hover { border-color: rgba(139,92,246,0.3); color: var(--text); background: rgba(255,255,255,0.75); box-shadow: var(--shadow-sm); }
  .fabric-chip.selected { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.45); color: var(--gold); font-weight: 500; }

  .seam-chip {
    padding: 8px 12px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text2);
    text-align: left;
    width: 100%;
    transition: all 0.2s ease;
    border-radius: var(--radius-sm);
    font-weight: 400;
  }
  .seam-chip:hover { border-color: rgba(139,92,246,0.35); background: rgba(255,255,255,0.75); }
  .seam-chip.selected { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.45); color: var(--text); font-weight: 500; }

  .garment-chip {
    padding: 8px 12px;
    font-size: 11px;
    border: 1px solid var(--border);
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text2);
    transition: all 0.2s ease;
    border-radius: var(--radius-sm);
    font-weight: 400;
  }
  .garment-chip:hover { border-color: rgba(6,182,212,0.4); background: rgba(255,255,255,0.75); }
  .garment-chip.selected { background: rgba(6,182,212,0.1); border-color: rgba(6,182,212,0.45); color: var(--accent-teal); font-weight: 500; }

  .bar-track {
    height: 5px;
    background: rgba(139,92,246,0.12);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 6px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .stat-box {
    background: var(--glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    box-shadow: var(--shadow-sm);
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--text3);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .bom-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .bom-table th {
    padding: 8px 10px;
    background: rgba(139,92,246,0.08);
    color: var(--text3);
    font-size: 10px;
    letter-spacing: 1px;
    text-align: left;
    font-weight: 600;
    text-transform: uppercase;
  }
  .bom-table td { padding: 7px 10px; border-bottom: 1px solid var(--border2); color: var(--text2); }
  .bom-table tr:last-child td { border-bottom: none; }
  .bom-table .total-row td { background: rgba(139,92,246,0.08); color: var(--gold); font-weight: 700; border-top: 1px solid rgba(139,92,246,0.2); }

  .trinity-badge {
    display: inline-block;
    padding: 3px 9px;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.5px;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text3);
    background: var(--glass);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    margin: 2px;
  }

  .drape-canvas {
    display: block;
    margin: 0 auto;
    background: transparent;
    border-radius: var(--radius);
  }

  .generate-img-box {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .generate-img-box img { max-width: 100%; max-height: 500px; display: block; margin: 0 auto; border-radius: 10px; }

  .export-section { page-break-inside: avoid; }
  @media print {
    .inkwell-header, .inkwell-tabs { display: none !important; }
    .export-print-only { display: block !important; }
    body { background: white; color: black; }
  }
  .export-print-only { display: none; }

  .glow-ring {
    animation: pulseRing 2s ease-in-out infinite;
  }
  @keyframes pulseRing {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .shimmer {
    background: linear-gradient(90deg, transparent 0%, rgba(139,92,246,0.12) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmerAnim 2s linear infinite;
  }
  @keyframes shimmerAnim {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .gold-border-anim {
    border-color: var(--gold) !important;
    box-shadow: 0 0 8px rgba(212,160,74,0.3);
    animation: goldPulse 1s ease-in-out;
  }
  @keyframes goldPulse {
    0% { box-shadow: 0 0 0 rgba(212,160,74,0); }
    50% { box-shadow: 0 0 16px rgba(212,160,74,0.5); }
    100% { box-shadow: 0 0 8px rgba(212,160,74,0.3); }
  }

  .tooltip {
    position: relative;
    display: inline-block;
  }
  .tooltip-text {
    visibility: hidden;
    background: var(--bg4);
    color: var(--text);
    font-size: 9px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    z-index: 200;
    pointer-events: none;
  }
  .tooltip:hover .tooltip-text { visibility: visible; }

  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  .loading-dots::after {
    content: '';
    animation: loadingDots 1.2s steps(4, end) infinite;
  }
  @keyframes loadingDots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  .filter-btn {
    padding: 5px 12px;
    font-size: 8px;
    letter-spacing: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text2); border-color: var(--text3); }
  .filter-btn.active { background: var(--bg3); border-color: var(--gold); color: var(--gold); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 1px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .overflow-y { overflow-y: auto; }
  .h-full { height: 100%; }
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .mb-2 { margin-bottom: 8px; }
  .mb-3 { margin-bottom: 12px; }
  .text-gold { color: var(--gold); }
  .text-dim { color: var(--text3); }
  .text-sm { font-size: 10px; }
  .text-xs { font-size: 9px; }
  .text-2xs { font-size: 8px; }
  .fw-7 { font-weight: 700; }
  .ls-2 { letter-spacing: 2px; }
  .ls-3 { letter-spacing: 3px; }
  .w-full { width: 100%; }
  .ta-c { text-align: center; }
  .p-3 { padding: 12px; }

  /* ── SIDEBAR LAYOUT ── */
  .app-layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; min-width: 220px;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(40px) saturate(1.8);
    -webkit-backdrop-filter: blur(40px) saturate(1.8);
    border-right: 1px solid var(--glass-border);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100; overflow-y: auto;
    padding-bottom: 20px;
  }
  .sidebar-logo {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-logo-brand {
    font-family: var(--font-display);
    font-size: 13px; font-weight: 700;
    color: var(--text); letter-spacing: 0.5px; line-height: 1.3;
  }
  .sidebar-logo-sub {
    font-size: 7px; color: var(--text3);
    letter-spacing: 2.5px; margin-top: 3px;
    text-transform: uppercase; font-weight: 500;
  }
  .sidebar-garment-ctx {
    margin: 10px 12px 0;
    padding: 10px 12px;
    background: linear-gradient(135deg, rgba(184,147,58,0.08), rgba(212,168,67,0.06));
    border: 1px solid rgba(184,147,58,0.2);
    border-radius: 10px; cursor: pointer;
    transition: all 0.2s;
  }
  .sidebar-garment-ctx:hover { border-color: rgba(184,147,58,0.4); background: rgba(184,147,58,0.12); }
  .sidebar-garment-name {
    font-size: 11px; font-weight: 600;
    color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar-section-label {
    padding: 14px 20px 4px;
    font-size: 7px; letter-spacing: 2.5px;
    color: var(--text3); text-transform: uppercase;
    font-weight: 700;
  }
  .sidebar-nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 20px;
    font-size: 12px; font-weight: 400;
    color: var(--text2); cursor: pointer;
    border: none; background: transparent;
    width: 100%; text-align: left;
    transition: all 0.15s ease;
    border-left: 2px solid transparent;
    position: relative;
  }
  .sidebar-nav-item:hover { background: rgba(139,92,246,0.06); color: var(--text); }
  .sidebar-nav-item.active {
    background: rgba(139,92,246,0.1);
    color: var(--gold); font-weight: 600;
    border-left-color: var(--gold);
  }
  .sidebar-nav-icon { width: 18px; text-align: center; font-size: 13px; flex-shrink: 0; }
  .main-content { margin-left: 220px; flex: 1; min-height: 100vh; }

  /* ── GALLERY ── */
  .gallery-header {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(40px) saturate(1.8);
    -webkit-backdrop-filter: blur(40px) saturate(1.8);
    border-bottom: 1px solid var(--glass-border);
    padding: 32px 40px;
    display: flex; align-items: flex-end;
    justify-content: space-between; gap: 20px;
  }
  .gallery-title {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 600;
    color: var(--text); letter-spacing: 0.5px;
    line-height: 1.2;
  }
  .gallery-subtitle {
    font-size: 9px; color: var(--text3);
    letter-spacing: 3px; margin-top: 3px;
    text-transform: uppercase;
  }
  .gallery-count { font-size: 12px; color: var(--text2); margin-top: 10px; }
  .btn-new-garment {
    background: linear-gradient(135deg, #B8933A, #D4A843);
    color: white; border: none; border-radius: 12px;
    padding: 12px 22px; font-size: 12px; font-weight: 600;
    letter-spacing: 0.3px; cursor: pointer; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(184,147,58,0.35);
    display: flex; align-items: center; gap: 7px;
    transition: all 0.2s ease;
  }
  .btn-new-garment:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 22px rgba(184,147,58,0.45);
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px; padding: 32px 40px;
  }
  @media (max-width: 1300px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 900px)  { .gallery-grid { grid-template-columns: 1fr; padding: 16px; } }

  /* ── GARMENT CARD ── */
  .garment-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 20px; overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    box-shadow: 0 4px 24px rgba(100,60,180,0.08);
  }
  .garment-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(100,60,180,0.16);
    border-color: #D4A843;
  }
  .garment-card-image {
    aspect-ratio: 3/4;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    font-family: var(--font-display);
    font-size: 56px; font-weight: 700;
  }
  .garment-card-image img { width:100%; height:100%; object-fit:cover; }
  .garment-card-initial {
    color: rgba(255,255,255,0.55);
    font-family: var(--font-display);
    font-size: 56px; font-weight: 700;
    text-shadow: 0 2px 12px rgba(0,0,0,0.1);
    line-height: 1; user-select: none;
  }
  .garment-card-body { padding: 16px 18px 20px; }
  .garment-card-collection {
    font-size: 8px; letter-spacing: 2px;
    color: var(--text3); text-transform: uppercase;
    font-weight: 600; margin-bottom: 4px;
  }
  .garment-card-name {
    font-size: 16px; font-weight: 700;
    color: var(--text); letter-spacing: 0.2px;
    font-family: var(--font-display);
    margin-bottom: 10px;
  }
  .garment-card-footer {
    display: flex; align-items: center;
    justify-content: space-between; gap: 8px;
  }
  .stage-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; font-size: 9px;
    letter-spacing: 0.3px; border-radius: 20px;
    font-weight: 500; white-space: nowrap;
  }

// ─────────────────────────────────────────────
// UTILITY FUNCTIONS
// ─────────────────────────────────────────────
function getFabricById(id) { return FABRICS.find(f => f.id === id); }
function getSeamById(id) { return SEAMS.find(s => s.id === id); }
function getGarmentById(id) { return GARMENT_TYPES.find(g => g.id === id); }

function calcBOM(fabric, garment, seam, region, markup) {
  if (!fabric || !garment) return null;
  const g = getGarmentById(garment);
  const f = getFabricById(fabric);
  const s = seam ? getSeamById(seam) : SEAMS[0];
  const r = LABOR_REGIONS.find(x => x.id === region) || LABOR_REGIONS[2];
  const m = MARKUP_TIERS.find(x => x.id === markup) || MARKUP_TIERS[0];

  const fabricCost = f.costPerMeter * g.fabricYards * 0.9144; // yards to meters
  const trimCost = 0.08 + 0.04 + 0.15 + 0.05 + 0.12; // label+care+hangtag+polybag+thread
  const fabricTotal = fabricCost + trimCost;
  const cmBase = g.cmBase;
  const cmCost = cmBase * r.multiplier;
  const totalFOB = fabricTotal + cmCost;
  const msrp = totalFOB * m.markup;

  const items = [
    { item: f.name + " Fabric", qty: `${(g.fabricYards * 0.9144).toFixed(1)}m`, unitCost: f.costPerMeter, total: fabricCost },
    { item: "Main Label", qty: "1 pc", unitCost: 0.08, total: 0.08 },
    { item: "Care Label", qty: "1 pc", unitCost: 0.04, total: 0.04 },
    { item: (s ? s.name : "Overlock") + " Thread", qty: "200m", unitCost: 0.12, total: 0.12 },
    { item: "Hang Tag", qty: "1 pc", unitCost: 0.15, total: 0.15 },
    { item: "Poly Bag", qty: "1 pc", unitCost: 0.05, total: 0.05 }
  ];
  return { items, fabricTotal, cmCost, totalFOB, msrp, region: r, markup: m, garment: g, fabric: f, seam: s };
}

            {/* Pricing Model */}

                  ["Complexity", bom.garment.complexity],

                ))}
              </div>
            </div>

            {/* Seam Spec */}
            {bom.seam && (
              <div className="card">
                <div className="card-title">Seam Specification — {bom.seam.name}</div>
                <div style={{ display:"flex", gap:"16px", alignItems:"flex-start" }}>

            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// PANEL 4: Trinity Analysis (Chart.js)
// ─────────────────────────────────────────────
function TrinityAnalysisPanel({ selectedFabric }) {
  const ityChartRef = useRef(null);
  const pathyChartRef = useRef(null);
  const ityChartInstance = useRef(null);
  const pathyChartInstance = useRef(null);
  const [compareFabrics, setCompareFabrics] = useState([]);
  const [activeViz, setActiveViz] = useState("radar");

  // Colors for overlaid fabrics
  const COMPARE_COLORS = [
    { border:"#D4A04A", bg:"rgba(212,160,74,0.15)", point:"#D4A04A" },
    { border:"#7a5a9e", bg:"rgba(122,90,158,0.15)", point:"#7a5a9e" },
    { border:"#4a9e8a", bg:"rgba(74,158,138,0.15)", point:"#4a9e8a" }
  ];

  const getFabricsToShow = useCallback(() => {
    const ids = new Set();
    if (selectedFabric) ids.add(selectedFabric);
    compareFabrics.forEach(id => ids.add(id));
    return [...ids].map(id => getFabricById(id)).filter(Boolean).slice(0, 3);
  }, [selectedFabric, compareFabrics]);

  useEffect(() => {
    const fabrics = getFabricsToShow();
    if (!fabrics.length) return;

    const ityLabels = ["Materiality","Luminosity","Viscosity","Permanence","Workability"];
    const pathyLabels = ["Tactility","Sensuosity","Immediacy","Gestural Energy"];

    const baseConfig = (labels, datasets) => ({
      type: "radar",
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        scales: {
          r: {
            min: 0, max: 10,
            ticks: { display:false, stepSize:2 },
            grid: { color:"rgba(255,255,255,0.06)" },
            angleLines: { color:"rgba(255,255,255,0.08)" },
            pointLabels: { color:"#a09080", font:{ family:"'Courier New',monospace", size:9 } }
          }
        },
        plugins: {
          legend: { display: fabrics.length > 1, labels: { color:"#a09080", font:{ family:"'Courier New',monospace", size:9 }, boxWidth:10 } },
          tooltip: { backgroundColor:"#1a1a26", titleColor:"#D4A04A", bodyColor:"#e8e0d4", borderColor:"#2a2a3a", borderWidth:1 }
        },
        animation: { duration:600 }
      }
    });

    // ITY chart
    if (ityChartRef.current) {
      const ityDatasets = fabrics.map((f, i) => ({
        label: f.name,
        data: [f.trinity.ity.materiality, f.trinity.ity.luminosity, f.trinity.ity.viscosity, f.trinity.ity.permanence, f.trinity.ity.workability],
        borderColor: COMPARE_COLORS[i].border,
        backgroundColor: COMPARE_COLORS[i].bg,
        pointBackgroundColor: COMPARE_COLORS[i].point,
        pointRadius: 4, borderWidth: 2
      }));
      if (ityChartInstance.current) ityChartInstance.current.destroy();
      ityChartInstance.current = new Chart(ityChartRef.current, baseConfig(ityLabels, ityDatasets));
    }

    // PATHY chart
    if (pathyChartRef.current) {
      const pathyDatasets = fabrics.map((f, i) => ({
        label: f.name,
        data: [f.trinity.pathy.tactility, f.trinity.pathy.sensuosity, f.trinity.pathy.immediacy, f.trinity.pathy.gestural_energy],
        borderColor: COMPARE_COLORS[i].border,
        backgroundColor: COMPARE_COLORS[i].bg,
        pointBackgroundColor: COMPARE_COLORS[i].point,
        pointRadius: 4, borderWidth: 2
      }));
      if (pathyChartInstance.current) pathyChartInstance.current.destroy();
      pathyChartInstance.current = new Chart(pathyChartRef.current, baseConfig(pathyLabels, pathyDatasets));
    }

    return () => {
      if (ityChartInstance.current) ityChartInstance.current.destroy();
      if (pathyChartInstance.current) pathyChartInstance.current.destroy();
    };
  }, [selectedFabric, compareFabrics]);

  const toggleCompare = (id) => {
    setCompareFabrics(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 2) return [...prev.slice(1), id];
      return [...prev, id];
    });
  };

  const fabrics = getFabricsToShow();
  const primary = selectedFabric ? getFabricById(selectedFabric) : null;

  return (
    <div className="panel" style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:"24px", alignItems:"start" }}>
      {/* Left: fabric selector for comparison */}
      <div>
        <div className="panel-title">Trinity Analysis</div>
        <div style={{ fontSize:"8px", color:"var(--text3)", letterSpacing:"1px", marginBottom:"8px" }}>
          PRIMARY: {primary ? primary.name : "—"}
        </div>
        <div style={{ fontSize:"8px", color:"var(--text3)", letterSpacing:"1px", marginBottom:"8px" }}>
          COMPARE (up to 2 more):
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:"3px", maxHeight:"calc(100vh - 200px)", overflowY:"auto" }}>
          {FABRICS.filter(f => f.id !== selectedFabric).map((f, i) => {
            const isCompared = compareFabrics.includes(f.id);
            const ci = compareFabrics.indexOf(f.id);
            return (
              <button key={f.id}
                onClick={() => toggleCompare(f.id)}
                style={{
                  display:"flex", alignItems:"center", gap:"6px",
                  padding:"6px 8px", fontSize:"9px",
                  border:`1px solid ${isCompared ? COMPARE_COLORS[ci+1]?.border || "var(--gold)" : "var(--border)"}`,
                  background: isCompared ? "var(--bg3)" : "var(--bg2)",
                  color: isCompared ? "var(--text)" : "var(--text3)",
                  textAlign:"left"
                }}>
                <div className="swatch" style={{ background:f.color, width:"10px", height:"10px" }}/>
                <span style={{ flex:1 }}>{f.name}</span>
                {isCompared && <span style={{ fontSize:"8px", color:COMPARE_COLORS[ci+1]?.border }}>●</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Right: Charts + Trinity Graph */}
      <div className="fade-in">
        {!primary ? (
          <div style={{ padding:"60px", textAlign:"center", color:"var(--text3)" }}>
            <div style={{ fontSize:"32px", marginBottom:"16px", opacity:0.3 }}>◭</div>
            <div style={{ fontSize:"11px", letterSpacing:"3px" }}>SELECT A FABRIC IN EXPLORER</div>
          </div>
        ) : (
          <div>
            {/* Fabric Legend */}
            <div style={{ display:"flex", gap:"12px", marginBottom:"20px", flexWrap:"wrap" }}>
              {fabrics.map((f, i) => (
                <div key={f.id} style={{ display:"flex", alignItems:"center", gap:"6px", padding:"6px 12px", border:`1px solid ${COMPARE_COLORS[i].border}`, background:"var(--bg2)" }}>

// PANEL 5: Generate (Fal.ai)
// ─────────────────────────────────────────────
function GeneratePanel({ selectedFabric, selectedGarment, selectedSeam }) {
  const [prompt, setPrompt] = useState("");
  const [generating, setGenerating] = useState(false);
  const [imageUrl, setImageUrl] = useState(null);
  const [error, setError] = useState(null);
  const [customPrompt, setCustomPrompt] = useState(false);
  const [editedPrompt, setEditedPrompt] = useState("");
  const [lastGenParams, setLastGenParams] = useState(null);

  useEffect(() => {
    if (selectedFabric || selectedGarment) {
      const p = buildArtiquityPrompt(selectedFabric, selectedGarment, selectedSeam);
      setPrompt(p);
      if (!customPrompt) setEditedPrompt(p);
    }
  }, [selectedFabric, selectedGarment, selectedSeam, customPrompt]);

  const fabric = selectedFabric ? getFabricById(selectedFabric) : null;
  const garment = selectedGarment ? getGarmentById(selectedGarment) : null;

  const generate = async () => {
    if (!editedPrompt) return;
    setGenerating(true);
    setError(null);
    setImageUrl(null);

    try {
      const response = await fetch("https://awareness-proxy-328246068140.us-central1.run.app/fal/generate-sync", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "fal-ai/flux/dev",
          prompt: editedPrompt,
          image_size: "portrait_4_3",
          num_images: 1
        })
      });

      if (!response.ok) throw new Error(`API error: ${response.status}`);
      const data = await response.json();
      const url = data?.images?.[0]?.url || data?.image?.url || data?.url || data?.output?.[0];
      if (!url) throw new Error("No image URL in response");

      setImageUrl(url);
      setLastGenParams({ fabric: fabric?.name, garment: garment?.name, prompt: editedPrompt });
    } catch (e) {
      setError(e.message);
    } finally {
      setGenerating(false);
    }
  };

  return (
    <div className="panel" style={{ display:"grid", gridTemplateColumns:"340px 1fr", gap:"24px", alignItems:"start" }}>
      {/* Left: Configuration */}
      <div>
        <div className="panel-title">Generate</div>

        {/* Selection Summary */}
        <div className="card" style={{ marginBottom:"16px" }}>
          <div className="card-title">Current Selection</div>
          <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:"10px", padding:"4px 0", borderBottom:"1px solid var(--border)" }}>
              <span style={{ color:"var(--text3)" }}>Fabric</span>
              <span style={{ color: fabric ? "var(--gold)" : "var(--text3)", fontWeight: fabric ? "700" : "400" }}>
                {fabric ? fabric.name : "— none selected —"}
              </span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:"10px", padding:"4px 0", borderBottom:"1px solid var(--border)" }}>
              <span style={{ color:"var(--text3)" }}>Garment</span>
              <span style={{ color: garment ? "var(--accent-teal)" : "var(--text3)", fontWeight: garment ? "700" : "400" }}>
                {garment ? garment.name : "— none selected —"}
              </span>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:"10px", padding:"4px 0" }}>
              <span style={{ color:"var(--text3)" }}>Seam</span>
              <span style={{ color:"var(--text2)" }}>{selectedSeam ? getSeamById(selectedSeam)?.name : "— none —"}</span>
            </div>
          </div>
        </div>

        {/* Quick garment + fabric selectors */}
        <div className="card" style={{ marginBottom:"16px" }}>
          <div className="card-title">Quick Select Garment</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"3px" }}>
            {GARMENT_TYPES.slice(0,10).map(g => (
              <button key={g.id} className={`garment-chip ${selectedGarment === g.id ? "selected" : ""}`}
                onClick={() => {
                  window._setGarment && window._setGarment(g.id);
                }} style={{ fontSize:"8px", padding:"5px 8px" }}>
                {g.name}
              </button>
            ))}
          </div>
        </div>

        {/* Prompt */}
        <div className="card" style={{ marginBottom:"16px" }}>
          <div className="card-title" style={{ display:"flex", justifyContent:"space-between" }}>
            <span>Artiquity Prompt</span>
            <button className="btn" style={{ padding:"2px 8px", fontSize:"7px" }}
              onClick={() => setCustomPrompt(!customPrompt)}>
              {customPrompt ? "Auto" : "Edit"}
            </button>
          </div>
          <textarea
            value={editedPrompt}
            onChange={e => { setEditedPrompt(e.target.value); setCustomPrompt(true); }}
            rows={8}
            style={{
              width:"100%", padding:"8px", fontSize:"9px", lineHeight:"1.6",
              border:"1px solid var(--border)", background:"var(--bg3)", color:"var(--text2)",
              resize:"vertical", marginTop:"6px"
            }}
          />
          {!customPrompt && <div style={{ fontSize:"8px", color:"var(--text3)", marginTop:"4px" }}>Auto-generated from selection. Click Edit to customize.</div>}
        </div>

        <button className="btn primary" onClick={generate}
          disabled={generating || !editedPrompt}
          style={{ width:"100%", padding:"12px", fontSize:"10px", letterSpacing:"3px", opacity: generating ? 0.7 : 1 }}>
          {generating ? <span className="loading-dots">GENERATING</span> : "◈ GENERATE IMAGE"}
        </button>

        {error && (
          <div style={{ marginTop:"12px", padding:"10px", background:"rgba(158,74,107,0.15)", border:"1px solid var(--accent-rose)", fontSize:"9px", color:"#e06080" }}>
            ⚠ {error}
          </div>
        )}
      </div>

      {/* Right: Image Output */}
      <div>
        <div style={{ marginBottom:"12px" }}>
          <div style={{ fontSize:"9px", letterSpacing:"3px", color:"var(--text3)", textTransform:"uppercase" }}>
            Generated Image
          </div>
        </div>

        <div className="generate-img-box" style={{ minHeight:"400px" }}>
          {generating && (
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"32px", marginBottom:"16px", animation:"pulseRing 1.5s ease-in-out infinite", opacity:0.6 }}>◈</div>
              <div style={{ fontSize:"10px", color:"var(--text3)", letterSpacing:"3px" }}>
                <span className="loading-dots">GENERATING</span>
              </div>
              <div style={{ fontSize:"8px", color:"var(--text3)", marginTop:"8px" }}>
                Fal.ai FLUX/dev · portrait_4_3
              </div>
            </div>
          )}
          {imageUrl && !generating && (
            <div style={{ width:"100%" }}>
              <img src={imageUrl} alt="Generated garment" style={{ maxWidth:"100%", display:"block", margin:"0 auto" }} />
            </div>
          )}
          {!imageUrl && !generating && (
            <div style={{ textAlign:"center", padding:"40px" }}>
              <div style={{ fontSize:"48px", marginBottom:"16px", opacity:0.15 }}>◈</div>
              <div style={{ fontSize:"10px", color:"var(--text3)", letterSpacing:"3px" }}>AWAITING GENERATION</div>
              <div style={{ fontSize:"9px", color:"var(--text3)", marginTop:"8px" }}>
                Select fabric + garment, then click Generate
              </div>
            </div>
          )}
        </div>

        {lastGenParams && imageUrl && (
          <div className="card" style={{ marginTop:"12px" }}>
            <div className="card-title">Generation Details</div>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
              {[
                ["Fabric", lastGenParams.fabric || "—"],
                ["Garment", lastGenParams.garment || "—"],
                ["Model", "FLUX/dev"],
                ["Size", "portrait_4_3"]
              ].map(([l,v]) => (
                <div key={l} className="stat-box" style={{ padding:"6px 10px" }}>
                  <div className="stat-label">{l}</div>
                  <div className="stat-value" style={{ fontSize:"10px" }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// COMPONENT: Animated Trinity SVG Graph

function AnimatedTrinityGraph({ activeFabric }) {
  const [pulse, setPulse] = useState(0);
  const [activeNodes, setActiveNodes] = useState(new Set());

  useEffect(() => {
    if (!activeFabric) { setActiveNodes(new Set()); return; }
    setPulse(p => p + 1);
    // Cascade node activation
    const sequence = ["fiber","weave","weight","drape","seam","ity","pathy","human","cost","techpack"];
    let timers = [];
    sequence.forEach((id, i) => {
      timers.push(setTimeout(() => {
        setActiveNodes(prev => new Set([...prev, id]));
      }, i * 80));
    });
    return () => timers.forEach(clearTimeout);
  }, [activeFabric]);

  const getNode = (id) => TRINITY_NODES.find(n => n.id === id);
  const f = activeFabric ? getFabricById(activeFabric) : null;

  return (
    <svg viewBox="0 0 460 420" style={{ width:"100%", height:"100%" }}>
      <defs>
        <filter id="glow-gold">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-soft">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="techpack-grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#D4A04A" stopOpacity="0.4"/>
          <stop offset="100%" stopColor="#2a2a3a" stopOpacity="0.9"/>
        </radialGradient>
      </defs>

      {/* Edges */}
      {TRINITY_EDGES.map(([a, b], i) => {
        const na = getNode(a), nb = getNode(b);
        if (!na || !nb) return null;
        const active = activeNodes.has(a) && activeNodes.has(b);
        return (
          <line key={i}
            x1={na.x + 25} y1={na.y + 12}
            x2={nb.x + 25} y2={nb.y + 12}
            stroke={active ? "#D4A04A" : "#2a2a3a"}
            strokeWidth={active ? 1.5 : 1}
            strokeDasharray={active ? "none" : "3,4"}
            opacity={active ? 0.7 : 0.25}
            style={{ transition: "all 0.4s ease" }}
          />
        );
      })}

      {/* Nodes */}
      {TRINITY_NODES.map(node => {
        const isActive = activeNodes.has(node.id);
        const isTechPack = node.id === "techpack";
        const r = isTechPack ? 30 : 22;
        return (
          <g key={node.id} style={{ transition: "all 0.3s" }}>
            {isActive && (
              <circle cx={node.x+25} cy={node.y+12} r={r+8}
                fill="none" stroke={node.color} strokeWidth="1"
                opacity="0.3" className="glow-ring"
              />
            )}
            <circle
              cx={node.x+25} cy={node.y+12}
              r={r}
              fill={isTechPack && isActive ? "url(#techpack-grad)" : node.color}
              opacity={isActive ? 0.9 : 0.25}
              filter={isActive && isTechPack ? "url(#glow-gold)" : isActive ? "url(#glow-soft)" : "none"}
              style={{ transition: "all 0.4s ease" }}
            />
            {node.label.split("/").map((part, li) => (
              <text key={li}
                x={node.x+25} y={node.y+12+(li*10)-(node.label.includes("/")?5:0)}
                textAnchor="middle"
                fill={isActive ? (isTechPack ? "#D4A04A" : "white") : "#555"}
                fontSize="8"
                fontFamily="'Courier New', monospace"
                fontWeight={isActive ? "700" : "400"}
                style={{ transition: "fill 0.3s" }}
              >{part}</text>
            ))}
          </g>
        );
      })}

      {/* Fabric label when active */}
      {f && (
        <text x="230" y="408" textAnchor="middle"
          fill="#D4A04A" fontSize="9" fontFamily="'Courier New', monospace" letterSpacing="2">
          {f.name.toUpperCase()} · {f.gsm}gsm · drape {f.drapeCoeff.toFixed(2)}
        </text>
      )}
    </svg>
  );
}

// COMPONENT: Drape Simulator (Canvas)
// ─────────────────────────────────────────────
function DrapeSimulator({ fabricId }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const [animPhase, setAnimPhase] = useState(0);

  useEffect(() => {
    let phase = 0;
    const animate = () => {
      phase += 0.02;
      setAnimPhase(phase);
      animRef.current = requestAnimationFrame(animate);
    };
    animRef.current = requestAnimationFrame(animate);
    return () => cancelAnimationFrame(animRef.current);
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const f = fabricId ? getFabricById(fabricId) : null;
    const dc = f ? f.drapeCoeff : 0.5;
    const col = f ? f.color : "#888";
    const gsm = f ? f.gsm : 180;

    ctx.clearRect(0, 0, 240, 300);

    // Mannequin silhouette (simplified torso outline)
    ctx.beginPath();
    ctx.strokeStyle = "#2a2a4a";
    ctx.lineWidth = 1;
    // neck
    ctx.moveTo(105, 20); ctx.lineTo(105, 45);
    ctx.moveTo(135, 20); ctx.lineTo(135, 45);
    // shoulders
    ctx.moveTo(105, 45); ctx.bezierCurveTo(90, 50, 70, 60, 65, 75);
    ctx.moveTo(135, 45); ctx.bezierCurveTo(150, 50, 170, 60, 175, 75);
    // bust / chest
    ctx.moveTo(65, 75); ctx.bezierCurveTo(62, 100, 60, 120, 65, 140);
    ctx.moveTo(175, 75); ctx.bezierCurveTo(178, 100, 180, 120, 175, 140);
    // waist
    ctx.moveTo(65, 140); ctx.bezierCurveTo(62, 155, 68, 165, 75, 170);
    ctx.moveTo(175, 140); ctx.bezierCurveTo(178, 155, 172, 165, 165, 170);
    // hip
    ctx.moveTo(75, 170); ctx.bezierCurveTo(70, 175, 65, 185, 68, 200);
    ctx.moveTo(165, 170); ctx.bezierCurveTo(170, 175, 175, 185, 172, 200);
    ctx.stroke();

    if (!f) {
      ctx.fillStyle = "#333";
      ctx.font = "10px 'Courier New'";
      ctx.textAlign = "center";
      ctx.fillText("Select fabric", 120, 270);
      return;
    }

    // Fabric drape simulation
    const numFolds = Math.round(3 + dc * 9);
    const amplitude = dc * 22;
    const topY = 45;
    const bottomY = 260;
    const bodyLen = bottomY - topY;
    const cx = 120;
    const halfW = 55;

    // Convert color hex to rgba
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16),
            g = parseInt(hex.slice(3,5),16),
            b = parseInt(hex.slice(5,7),16);
      return {r,g,b};
    }
    const rgb = hexToRgb(col.length === 7 ? col : "#c0b090");
    const colStr = `rgba(${rgb.r},${rgb.g},${rgb.b},0.85)`;
    const colLight = `rgba(${Math.min(255,rgb.r+40)},${Math.min(255,rgb.g+40)},${Math.min(255,rgb.b+40)},0.5)`;
    const colDark = `rgba(${Math.max(0,rgb.r-40)},${Math.max(0,rgb.g-40)},${Math.max(0,rgb.b-40)},0.9)`;

    // Build drape path
    ctx.beginPath();
    ctx.moveTo(cx - halfW, topY);

    // Left edge
    for (let i = 0; i <= bodyLen; i += 4) {
      const t = i / bodyLen;
      const wind = Math.sin(animPhase + t * Math.PI * 2) * dc * 6;
      const fold = Math.sin(t * Math.PI * numFolds * 0.7 + animPhase * 0.5) * amplitude * Math.sqrt(t);
      const taper = halfW * (1 - t * 0.08);
      ctx.lineTo(cx - taper + fold * 0.4 + wind, topY + i);
    }

    const bW = halfW * (1 + dc * 0.3);
    ctx.lineTo(cx + bW, bottomY);

    // Right edge (reverse)
    for (let i = bodyLen; i >= 0; i -= 4) {
      const t = i / bodyLen;
      const wind = Math.sin(animPhase + t * Math.PI * 2 + 1) * dc * 6;
      const fold = Math.sin(t * Math.PI * numFolds * 0.7 + 1.5 + animPhase * 0.5) * amplitude * Math.sqrt(t);
      const taper = halfW * (1 - t * 0.08);
      ctx.lineTo(cx + taper + fold * 0.4 + wind, topY + i);
    }

    ctx.closePath();

    // Gradient fill
    const grad = ctx.createLinearGradient(cx - halfW, topY, cx + halfW, bottomY);
    grad.addColorStop(0, colLight);
    grad.addColorStop(0.4, colStr);
    grad.addColorStop(1, colDark);
    ctx.fillStyle = grad;
    ctx.fill();

    // Fold lines
    for (let fold = 1; fold < numFolds; fold++) {
      const y = topY + (bodyLen / numFolds) * fold;
      const wave = Math.sin(fold + animPhase * 0.3) * 10 * dc;
      ctx.beginPath();
      ctx.moveTo(cx - halfW + wave, y);
      ctx.quadraticCurveTo(cx, y + amplitude * 0.4, cx + halfW + wave, y);
      ctx.strokeStyle = colDark;
      ctx.lineWidth = 0.6;
      ctx.globalAlpha = 0.4;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Outline
    ctx.strokeStyle = colDark;
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.7;

    ctx.beginPath();
    ctx.moveTo(cx - halfW, topY);
    for (let i = 0; i <= bodyLen; i += 4) {
      const t = i / bodyLen;
      const wind = Math.sin(animPhase + t * Math.PI * 2) * dc * 6;
      const fold = Math.sin(t * Math.PI * numFolds * 0.7 + animPhase * 0.5) * amplitude * Math.sqrt(t);
      const taper = halfW * (1 - t * 0.08);
      ctx.lineTo(cx - taper + fold * 0.4 + wind, topY + i);
    }
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx + halfW * (1 + dc * 0.3), bottomY);
    for (let i = bodyLen; i >= 0; i -= 4) {
      const t = i / bodyLen;
      const wind = Math.sin(animPhase + t * Math.PI * 2 + 1) * dc * 6;
      const fold = Math.sin(t * Math.PI * numFolds * 0.7 + 1.5 + animPhase * 0.5) * amplitude * Math.sqrt(t);
      const taper = halfW * (1 - t * 0.08);
      ctx.lineTo(cx + taper + fold * 0.4 + wind, topY + i);
    }
    ctx.stroke();

    ctx.globalAlpha = 1;

    // Labels
    ctx.fillStyle = "#888";
    ctx.font = "8px 'Courier New'";
    ctx.textAlign = "center";
    ctx.fillText(`Drape: ${dc.toFixed(2)}  |  ${gsm}gsm`, cx, bottomY + 18);
    ctx.fillStyle = "#D4A04A";
    ctx.font = "9px 'Courier New'";
    ctx.fillText(f.name, cx, bottomY + 32);

  }, [fabricId, animPhase]);

  return (
    <canvas ref={canvasRef} width={240} height={300} className="drape-canvas" />
  );
}

function getCollectionGradient(collection) {
  return COLLECTION_GRADIENTS[collection] || DEFAULT_GRADIENT;
}

function getGarmentStageLabel(garment) {
  if (garment.stage && STAGE_LABEL_MAP[garment.stage]) return STAGE_LABEL_MAP[garment.stage];
  const stages = garment.stages || {};
  const order = ['dream','illustration','flat_sketch','sloper_selection','pattern_making','first_muslin','second_muslin','cut_self','construction','final_fitting'];
  const labels = ['🌙 Dream','🎨 Illustrating','📐 Flat Sketch','🧩 Sloper','📄 Patterning','🪡 First Muslin','🪡 Refining','✂️ Cutting Self','🧵 Construction','✅ Complete'];
  if (order.every(s => stages[s]?.status === 'Complete')) return '✅ Complete';
  const inProg = order.findIndex(s => stages[s]?.status === 'In Progress');
  if (inProg !== -1) return labels[inProg];
  const lastDone = order.reduce((last,s,i) => stages[s]?.status==='Complete'?i:last, -1);
  if (lastDone !== -1 && lastDone < order.length-1) return labels[lastDone+1];
  return '🌙 Dream';
}

function getStageBadgeClass(label) {
  if (label.includes('✅')) return 'done';
  if (label.includes('🌙') || label.includes('👤') || label.includes('🎨')) return 'dream';
  return 'work';
}

const VE_GARMENTS_KEY  = 've_garments';
const VE_SEED_VER_KEY  = 've_garments_seed_ver';
const VE_SEED_VER      = '2026-02-19-c';   // bump when sample data changes

function initGarments() {
  const today = new Date().toISOString().slice(0,10);
  const seedGarments = () => SAMPLE_GARMENTS.map(g => ({
    imageUrl: null, stages:{}, muslins:[], selfFabric:null,
    ...g,
    updatedAt: g.updatedAt || g.createdAt || today,
    createdAt: g.createdAt || today,
  }));

  try {
    const storedVer = localStorage.getItem(VE_SEED_VER_KEY);
    if (storedVer !== VE_SEED_VER) {
      // Seed version changed — merge: keep user-created garments, update/add sample ones
      const raw = localStorage.getItem(VE_GARMENTS_KEY);
      const existing = raw ? JSON.parse(raw) : [];
      const sampleIds = new Set(SAMPLE_GARMENTS.map(g => g.id));
      const userGarments = Array.isArray(existing) ? existing.filter(g => !sampleIds.has(g.id)) : [];
      const merged = [...seedGarments(), ...userGarments];
      localStorage.setItem(VE_GARMENTS_KEY, JSON.stringify(merged));
      localStorage.setItem(VE_SEED_VER_KEY, VE_SEED_VER);
      return merged;
    }
    const raw = localStorage.getItem(VE_GARMENTS_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return seedGarments();
}

        <div className="garment-card-footer">

          {updated && <span style={{ fontSize:'8px', color:'var(--text3)' }}>{updated}</span>}
        </div>
      </div>
    </div>
  );
}

// COMPONENT: NewGarmentModal
// ─────────────────────────────────────────────
const GARMENT_TYPES = ['Dress','Gown','Coat','Jacket','Trouser','Blouse','Skirt','Suit','Accessory','Other'];
const SEASONS = ['Spring/Summer','Fall/Winter','Resort','Capsule'];

function NewGarmentModal({ garments, onClose, onCreate }) {
  const [form, setForm] = useState({ name:'', collection:'', type:'Dress', season:'Spring/Summer', notes:'' });
  const existingCollections = [...new Set(garments.map(g=>g.collection).filter(Boolean))];
  const upd = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleCreate = () => {
    if (!form.name.trim()) return;
    onCreate(makeFreshGarment({
      name: form.name.trim(),
      collection: form.collection.trim(),
      type: form.type,
      season: form.season,
      notes: form.notes.trim(),
    }));
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal-box fade-in">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'24px' }}>
          <div className="modal-title" style={{ marginBottom:0 }}>New Garment</div>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:'20px', cursor:'pointer', color:'var(--text3)', lineHeight:1 }}>✕</button>
        </div>

        {/* Name */}
        <div className="modal-field">
          <label className="modal-label">Garment Name *</label>
          <input autoFocus className="modal-input" value={form.name}
            onChange={e=>upd('name',e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter') handleCreate(); if(e.key==='Escape') onClose(); }}
            placeholder="e.g. Celestine, The Midnight Coat…"/>
        </div>

        {/* Collection */}
        <div className="modal-field">
          <label className="modal-label">Collection</label>
          <input className="modal-input" value={form.collection}
            onChange={e=>upd('collection',e.target.value)}
            placeholder="e.g. Beaded Collection, Custom Commissions…"
            list="collections-list"/>
          {existingCollections.length > 0 && (
            <datalist id="collections-list">
              {existingCollections.map(c=><option key={c} value={c}/>)}
            </datalist>
          )}
          {existingCollections.length > 0 && (
            <div style={{ display:'flex', gap:'6px', flexWrap:'wrap', marginTop:'7px' }}>
              {existingCollections.map(c=>(
                <button key={c} onClick={()=>upd('collection',c)} style={{
                  padding:'3px 10px', fontSize:'8px', border:`1px solid ${form.collection===c?'var(--gold)':'var(--border)'}`,
                  background: form.collection===c?'rgba(184,147,58,0.1)':'transparent',
                  color: form.collection===c?'var(--gold)':'var(--text3)',
                  borderRadius:'20px', cursor:'pointer', letterSpacing:'0.5px'
                }}>{c}</button>
              ))}
            </div>
          )}
        </div>

        {/* Type + Season */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
          <div className="modal-field">
            <label className="modal-label">Garment Type</label>
            <select className="modal-input" value={form.type} onChange={e=>upd('type',e.target.value)}>
              {GARMENT_TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="modal-field">
            <label className="modal-label">Season</label>
            <select className="modal-input" value={form.season} onChange={e=>upd('season',e.target.value)}>
              {SEASONS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>

        {/* Notes */}
        <div className="modal-field">
          <label className="modal-label">Notes (optional)</label>
          <textarea className="modal-input" value={form.notes}
            onChange={e=>upd('notes',e.target.value)}
            placeholder="Initial vision, concept, inspiration…"
            rows={3} style={{ resize:'vertical' }}/>
        </div>

        <div className="modal-footer">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button onClick={handleCreate}
            disabled={!form.name.trim()}
            style={{
              padding:'10px 24px', fontSize:'11px', fontWeight:'600',
              letterSpacing:'0.5px', border:'none', borderRadius:'10px',
              background: form.name.trim() ? 'linear-gradient(135deg,#B8933A,#D4A843)' : 'var(--bg3)',
              color: form.name.trim() ? 'white' : 'var(--text3)',
              cursor: form.name.trim() ? 'pointer' : 'not-allowed',
              boxShadow: form.name.trim() ? '0 4px 14px rgba(184,147,58,0.3)' : 'none',
              transition:'all 0.2s'
            }}>
            Create Garment
          </button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// PANEL: Pipeline
// ─────────────────────────────────────────────
function PipelinePanel({ garments, onGarmentsChange, defaultGarmentId }) {
  const [selGarment, setSelGarment] = useState(defaultGarmentId || null);
  const [showNew, setShowNew] = useState(false);
  const [newName, setNewName] = useState("");
  const [activeStage, setActiveStage] = useState(null);
  useEffect(() => { if (defaultGarmentId) setSelGarment(defaultGarmentId); }, [defaultGarmentId]);

  const garment = garments.find(g => g.id === selGarment);
  const getStatus = (sid) => garment?.stages?.[sid]?.status || "Not Started";
  const getNotes  = (sid) => garment?.stages?.[sid]?.notes  || "";

  const addGarment = () => {
    if (!newName.trim()) return;
    const g = { id: Date.now().toString(), name: newName.trim(), createdAt: new Date().toISOString().slice(0,10), stages:{}, muslins:[], patternProven:false, selfFabric:null };
    onGarmentsChange([...garments, g]);
    setSelGarment(g.id); setShowNew(false); setNewName("");
  };

  const setStageStatus = (sid, status) => onGarmentsChange(garments.map(g =>
    g.id !== selGarment ? g : { ...g, stages:{ ...g.stages, [sid]:{ ...g.stages[sid], status } } }
  ));
  const setStageNotes = (sid, notes) => onGarmentsChange(garments.map(g =>
    g.id !== selGarment ? g : { ...g, stages:{ ...g.stages, [sid]:{ ...g.stages[sid], notes } } }
  ));

  const stCol = s => s==="Complete"?"#10b981":s==="In Progress"?"#f59e0b":"var(--text3)";
  const stBg  = s => s==="Complete"?"rgba(16,185,129,0.1)":s==="In Progress"?"rgba(245,158,11,0.1)":"transparent";

  const complete = garment ? PIPELINE_STAGES.filter(s => getStatus(s.id)==="Complete").length : 0;
  const progress = garment ? complete/PIPELINE_STAGES.length : 0;

  return (
    <div className="panel fade-in">
      <div className="panel-title">Verneccia Way — Production Pipeline</div>

      {/* Garment selector row */}
      <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"24px", flexWrap:"wrap" }}>
        <span style={{ fontSize:"9px", color:"var(--text3)", letterSpacing:"2px" }}>GARMENT:</span>
        {garments.map(g => (
          <button key={g.id} onClick={() => setSelGarment(g.id)} style={{
            padding:"6px 14px", fontSize:"10px", fontWeight:selGarment===g.id?"700":"400",
            border:`1px solid ${selGarment===g.id?"var(--gold)":"var(--border)"}`,
            background:selGarment===g.id?"rgba(139,92,246,0.12)":"var(--glass)",
            color:selGarment===g.id?"var(--gold)":"var(--text2)",
            borderRadius:"var(--radius-sm)", backdropFilter:"blur(12px)", cursor:"pointer"
          }}>{g.name}</button>
        ))}
        {showNew ? (
          <div style={{ display:"flex", gap:"6px" }}>
            <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") addGarment(); if(e.key==="Escape") setShowNew(false); }}
              placeholder="Garment name…"
              style={{ padding:"6px 10px", fontSize:"10px", width:"160px", borderRadius:"var(--radius-sm)" }}/>
            <button className="btn primary" onClick={addGarment} style={{ padding:"6px 12px", fontSize:"9px" }}>Add</button>
            <button className="btn" onClick={()=>setShowNew(false)} style={{ padding:"6px 10px", fontSize:"9px" }}>✕</button>
          </div>
        ) : (
          <button className="btn primary" onClick={()=>setShowNew(true)} style={{ padding:"6px 16px", fontSize:"9px" }}>+ New Garment</button>
        )}
      </div>

      {!garment ? (
        <div style={{ textAlign:"center", padding:"80px 0", color:"var(--text3)" }}>
          <div style={{ fontSize:"48px", marginBottom:"16px", opacity:0.15 }}>🌙</div>
          <div style={{ fontSize:"12px", letterSpacing:"3px", marginBottom:"8px" }}>BEGIN WITH A DREAM</div>
          <div style={{ fontSize:"9px" }}>Create a new garment to start tracking its journey through the ten stages</div>
        </div>
      ) : (
        <div>
          {/* Progress */}
          <div style={{ marginBottom:"24px" }}>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:"9px", color:"var(--text3)", marginBottom:"6px" }}>
              <span style={{ letterSpacing:"2px" }}>PIPELINE PROGRESS — {garment.name.toUpperCase()}</span>
              <span style={{ color:"var(--gold)", fontWeight:"700" }}>{complete}/{PIPELINE_STAGES.length} stages complete</span>
            </div>
            <div className="bar-track" style={{ height:"6px" }}>
              <div className="bar-fill" style={{ width:`${progress*100}%`, background:"linear-gradient(90deg,#8B5CF6,#10b981)", transition:"width 0.5s ease" }}/>
            </div>
          </div>

          {/* Stage grid */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:"10px", marginBottom:"20px" }}>
            {PIPELINE_STAGES.map(stage => {
              const status = getStatus(stage.id);
              const isAct = activeStage===stage.id;
              return (
                <button key={stage.id} onClick={()=>setActiveStage(isAct?null:stage.id)} style={{
                  padding:"14px 10px", textAlign:"center",
                  background:isAct?"rgba(139,92,246,0.15)":stBg(status),
                  border:`1px solid ${isAct?"var(--gold)":status!=="Not Started"?stCol(status):"var(--border)"}`,
                  borderRadius:"var(--radius)", backdropFilter:"blur(12px)", cursor:"pointer",
                  transition:"all 0.2s ease",
                  boxShadow:isAct?"0 4px 20px rgba(139,92,246,0.2)":"var(--shadow-sm)"
                }}>
                  <div style={{ fontSize:"22px", marginBottom:"6px" }}>{stage.icon}</div>
                  <div style={{ fontSize:"8px", fontWeight:"700", letterSpacing:"1px", color:"var(--text)", marginBottom:"4px" }}>{stage.num}. {stage.name}</div>
                  <div style={{ display:"inline-block", padding:"2px 7px", fontSize:"7px", letterSpacing:"0.5px",
                    background:stBg(status), color:stCol(status), border:`1px solid ${stCol(status)}`, borderRadius:"20px" }}>
                    {status}
                  </div>
                </button>
              );
            })}
          </div>

          {/* Detail panel */}
          {activeStage && (() => {
            const stage = PIPELINE_STAGES.find(s=>s.id===activeStage);
            const status = getStatus(activeStage);
            const notes  = getNotes(activeStage);
            return (
              <div className="card fade-in" style={{ border:"1px solid rgba(139,92,246,0.3)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"16px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
                    <div style={{ fontSize:"32px" }}>{stage.icon}</div>
                    <div>
                      <div style={{ fontSize:"14px", fontWeight:"700", color:"var(--text)", letterSpacing:"1px" }}>Stage {stage.num} — {stage.name}</div>
                      <div style={{ fontSize:"10px", color:"var(--text3)", marginTop:"3px" }}>{stage.desc}</div>
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:"6px" }}>
                    {STAGE_STATUS_LIST.map(s => (
                      <button key={s} onClick={()=>setStageStatus(activeStage,s)} style={{
                        padding:"6px 12px", fontSize:"8px", letterSpacing:"1px",
                        border:`1px solid ${status===s?stCol(s):"var(--border)"}`,
                        background:status===s?stBg(s):"transparent",
                        color:status===s?stCol(s):"var(--text3)",
                        borderRadius:"var(--radius-sm)", cursor:"pointer", fontWeight:status===s?"700":"400"
                      }}>{s}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize:"9px", color:"var(--text3)", letterSpacing:"2px", marginBottom:"6px" }}>STAGE NOTES</div>
                  <textarea value={notes} onChange={e=>setStageNotes(activeStage,e.target.value)}
                    placeholder={`Notes for ${stage.name}…`} rows={3}
                    style={{ width:"100%", padding:"10px", fontSize:"10px", lineHeight:"1.6",
                      border:"1px solid var(--border)", background:"var(--bg3)", color:"var(--text)",
                      borderRadius:"var(--radius-sm)", resize:"vertical" }}/>
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

function DreamJournalPanel({ dreams, onDreamsChange }) {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ date:new Date().toISOString().slice(0,10), title:"", description:"", moods:[] });

  const moodColor = m => ({"Structured":"#6366f1","Fluid":"#06b6d4","Dramatic":"#ec4899","Minimal":"#94a3b8","Heritage":"#d97706","Avant-garde":"#8b5cf6","Joyful":"#f59e0b","Powerful":"#ef4444"}[m]||"var(--text3)");

  const toggleMood = mood => setForm(f => ({...f, moods: f.moods.includes(mood)?f.moods.filter(m=>m!==mood):[...f.moods,mood]}));

  const saveDream = () => {
    if (!form.title.trim()) return;
    onDreamsChange([{ id:Date.now().toString(), ...form }, ...dreams]);

            <div style={{ marginBottom:"20px" }}>
              <label style={{ fontSize:"9px", color:"var(--text3)", letterSpacing:"2px", display:"block", marginBottom:"8px" }}>MOOD TAGS</label>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                {MOOD_TAGS.map(mood => (
                  <button key={mood} onClick={()=>toggleMood(mood)} style={{
                    padding:"5px 12px", fontSize:"9px", cursor:"pointer",

                    background:form.moods.includes(mood)?`${moodColor(mood)}20`:"transparent",

            </div>
            <div style={{ display:"flex", justifyContent:"flex-end", gap:"8px" }}>
              <button className="btn" onClick={()=>setShowModal(false)}>Cancel</button>
              <button className="btn primary" onClick={saveDream}>Save Dream</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    "Pocket":        {x:52,y:55,w:14,h:18},
    "Facing":        {x:33,y:10,w:34,h:18}
  };
  const r = regions[bodyPart];
  return (
    <svg viewBox="0 0 100 105" style={{ width:"100%", maxWidth:"72px" }}>
      <ellipse cx="50" cy="8" rx="10" ry="8" fill="none" stroke="var(--text3)" strokeWidth="1.5" opacity="0.5"/>
      <rect x="35" y="16" width="30" height="32" rx="3" fill="none" stroke="var(--text3)" strokeWidth="1.5" opacity="0.5"/>
      <rect x="5"  y="16" width="28" height="36" rx="3" fill="none" stroke="var(--text3)" strokeWidth="1.5" opacity="0.5"/>
      <rect x="67" y="16" width="28" height="36" rx="3" fill="none" stroke="var(--text3)" strokeWidth="1.5" opacity="0.5"/>
      <rect x="33" y="48" width="17" height="52" rx="3" fill="none" stroke="var(--text3)" strokeWidth="1.5" opacity="0.5"/>
      <rect x="50" y="48" width="17" height="52" rx="3" fill="none" stroke="var(--text3)" strokeWidth="1.5" opacity="0.5"/>
      {r && <rect x={r.x} y={r.y} width={r.w} height={r.h} rx="2" fill="rgba(139,92,246,0.25)" stroke="#8b5cf6" strokeWidth="1.5"/>}
    </svg>
  );
}

function SlopersPanel({ slopers, onSlopersChange }) {

    const ms = !search || s.name.toLowerCase().includes(q) || s.notes.toLowerCase().includes(q);

function MuslinLogPanel({ garments, onGarmentsChange, defaultGarmentId }) {
  const [selGarment, setSelGarment] = useState(defaultGarmentId || null);
  const [showModal, setShowModal]   = useState(false);
  const [form, setForm] = useState({ date:new Date().toISOString().slice(0,10), notes:"", status:"In Progress" });
  useEffect(() => { if (defaultGarmentId) setSelGarment(defaultGarmentId); }, [defaultGarmentId]);

  const garment  = garments.find(g=>g.id===selGarment);
  const muslins  = garment?.muslins || [];
  const isProven = garment?.patternProven || false;

  const stCol = s => s==="Approved"?"#10b981":s==="In Progress"?"#f59e0b":s==="Discarded"?"#ef4444":"var(--text3)";

  const addMuslin = () => {
    if (!selGarment) return;
    const entry = { id:Date.now().toString(), version:muslins.length+1, ...form };
    onGarmentsChange(garments.map(g=>g.id===selGarment?{...g,muslins:[...(g.muslins||[]),entry]}:g));
    setForm({ date:new Date().toISOString().slice(0,10), notes:"", status:"In Progress" });
    setShowModal(false);
  };

  const updateMuslinStatus = (mid, status) => onGarmentsChange(garments.map(g=> {
    if(g.id!==selGarment) return g;
    return {...g, muslins:(g.muslins||[]).map(m=>m.id===mid?{...m,status}:m)};
  }));

  const markProven   = () => onGarmentsChange(garments.map(g=>g.id===selGarment?{...g,patternProven:true}:g));
  const unmarkProven = () => onGarmentsChange(garments.map(g=>g.id===selGarment?{...g,patternProven:false}:g));

  const approvedCount = muslins.filter(m=>m.status==="Approved").length;

  return (
    <div className="panel fade-in">
      <div className="panel-title">Muslin Log — Prototype Iterations</div>

      {/* Garment selector */}

        {garments.length===0 ? (
          <span style={{ fontSize:"10px", color:"var(--text3)", fontStyle:"italic" }}>No garments — create one in Pipeline tab</span>
        ) : garments.map(g=>(
          <button key={g.id} onClick={()=>setSelGarment(g.id)} style={{
            padding:"6px 14px", fontSize:"10px",
            border:`1px solid ${selGarment===g.id?"var(--gold)":"var(--border)"}`,
            background:selGarment===g.id?"rgba(139,92,246,0.12)":"var(--glass)",
            color:selGarment===g.id?"var(--gold)":"var(--text2)",
            borderRadius:"var(--radius-sm)", cursor:"pointer", fontWeight:selGarment===g.id?"700":"400"
          }}>
            {g.name}

          <div style={{ fontSize:"11px", letterSpacing:"3px" }}>SELECT A GARMENT</div>
        </div>
      ) : (
        <div>
          {/* Warning / success banner */}
          {!isProven ? (
            <div style={{ padding:"14px 18px", marginBottom:"20px", background:"rgba(245,158,11,0.08)",
              border:"1px solid rgba(245,158,11,0.4)", borderRadius:"var(--radius-sm)", display:"flex", alignItems:"center", gap:"10px" }}>
              <span style={{ fontSize:"18px" }}>⚠️</span>
              <div>
                <div style={{ fontSize:"11px", fontWeight:"700", color:"#f59e0b", letterSpacing:"1px" }}>PATTERN NOT YET PROVEN — DO NOT CUT THE SELF</div>

              <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>

                  <div style={{ fontSize:"11px", fontWeight:"700", color:"#10b981", letterSpacing:"1px" }}>PATTERN PROVEN — SELF FABRIC UNLOCKED</div>

                        fontSize:"12px", fontWeight:"700", color:stCol(m.status), flexShrink:0 }}>{m.version}</div>
                      <div>
                        <div style={{ fontSize:"12px", fontWeight:"700", color:"var(--text)" }}>Muslin {m.version}</div>

const CUTTING_CHECKLIST_ITEMS = [
  "Grain line marked on every piece",
  "Seam allowance added (confirmed width)",
  "Notches marked and aligned",
  "Piece count confirmed against pattern",
  "Fabric grain checked before laying",
  "Nap direction noted and consistent",
  "Right side / wrong side identified",
  "All pattern pieces accounted for"
];

function SelfFabricPanel({ garments, onGarmentsChange, defaultGarmentId }) {
  const [selGarment, setSelGarment] = useState(defaultGarmentId || null);
  const [fabForm, setFabForm] = useState({ name:"", supplier:"", colorway:"", costPerYard:"" });
  const [pieces, setPieces] = useState([{ id:"p1", name:"", lengthIn:"", count:"1" }]);
  useEffect(() => { if (defaultGarmentId) { selectGarment(defaultGarmentId); } }, [defaultGarmentId]);

  const garment  = garments.find(g=>g.id===selGarment);
  const isProven = garment?.patternProven || false;
  const checklist = garment?.selfFabric?.checklist || {};

  const totalYds   = useMemo(()=> pieces.reduce((s,p)=>s+((parseFloat(p.lengthIn)||0)*(parseInt(p.count)||1)/36),0), [pieces]);
  const withWaste  = totalYds * 1.1;
  const totalCost  = withWaste * (parseFloat(fabForm.costPerYard)||0);

  const addPiece    = ()     => setPieces([...pieces,{id:Date.now().toString(),name:"",lengthIn:"",count:"1"}]);
  const removePiece = id     => setPieces(pieces.filter(p=>p.id!==id));
  const upPiece     = (id,k,v)=> setPieces(pieces.map(p=>p.id===id?{...p,[k]:v}:p));

  const toggleCheck = item => {
    if (!selGarment||!isProven) return;
    onGarmentsChange(garments.map(g=>{
      if(g.id!==selGarment) return g;
      const cl = {...(g.selfFabric?.checklist||{}), [item]:!g.selfFabric?.checklist?.[item]};
      return {...g, selfFabric:{...(g.selfFabric||{}), checklist:cl}};
    }));
  };

  const saveFabricPlan = () => {
    if (!selGarment||!isProven) return;
    onGarmentsChange(garments.map(g=>{
      if(g.id!==selGarment) return g;
      return {...g, selfFabric:{...(g.selfFabric||{}), ...fabForm, pieces, totalYards:withWaste, totalCost}};
    }));
  };

  const selectGarment = (gid) => {
    setSelGarment(gid);
    const g = garments.find(x=>x.id===gid);
    if (g?.selfFabric) {
      setFabForm({ name:g.selfFabric.name||"", supplier:g.selfFabric.supplier||"", colorway:g.selfFabric.colorway||"", costPerYard:g.selfFabric.costPerYard||"" });
      if (g.selfFabric.pieces?.length) setPieces(g.selfFabric.pieces);
    }
  };

  const checkedCount = Object.values(checklist).filter(Boolean).length;

  return (
    <div className="panel fade-in">
      <div className="panel-title">Self Fabric — The Real Thing</div>

      {/* Garment selector */}
      <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"20px", flexWrap:"wrap" }}>
        <span style={{ fontSize:"9px", color:"var(--text3)", letterSpacing:"2px" }}>GARMENT:</span>
        {garments.length===0 ? (
          <span style={{ fontSize:"10px", color:"var(--text3)", fontStyle:"italic" }}>No garments — create one in Pipeline tab</span>
        ) : garments.map(g=>(
          <button key={g.id} onClick={()=>selectGarment(g.id)} style={{
            padding:"6px 14px", fontSize:"10px",
            border:`1px solid ${selGarment===g.id?"var(--gold)":"var(--border)"}`,
            background:selGarment===g.id?"rgba(139,92,246,0.12)":"var(--glass)",
            color:selGarment===g.id?"var(--gold)":"var(--text2)",
            borderRadius:"var(--radius-sm)", cursor:"pointer", opacity:g.patternProven?1:0.6,
            fontWeight:selGarment===g.id?"700":"400"
          }}>

                {label:"SUPPLIER",            key:"supplier",     placeholder:"e.g. Halley Stevensons, Huddersfield"},
                {label:"COLORWAY",            key:"colorway",     placeholder:"e.g. Grey/Cream Glen Check"},

                        display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.2s" }}>
                        {checked && <span style={{ color:"white", fontSize:"10px" }}>✓</span>}
                      </div>
                      <span style={{ fontSize:"10px", color:checked?"var(--text)":"var(--text2)", fontWeight:checked?"700":"400" }}>{item}</span>
                    </button>
                  );
                })}
              </div>
              <div style={{ marginTop:"14px", padding:"12px", background:"rgba(139,92,246,0.06)",

              <div className="card">

                {fabForm.colorway && <div style={{ fontSize:"9px", color:"var(--text3)", fontStyle:"italic" }}>{fabForm.colorway}</div>}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab]       = useState("explore");
  const [selectedFabric, setSelectedFabric] = useState(null);
  const [selectedGarment, setSelectedGarment] = useState(null);
  const [selectedSeam, setSelectedSeam] = useState(null);
  // Verneccia Way shared state
  const [garments, setGarments] = useState([]);
  const [dreams,   setDreams]   = useState([]);
  const [slopers,  setSlopers]  = useState([]);

  // Expose setters for cross-panel access (Generate panel quick-select)
  useEffect(() => {
    window._setGarment = setSelectedGarment;
    window._setFabric = (id) => {
      setSelectedFabric(id);
      const f = getFabricById(id);
      if (f && f.compatibleSeams.length > 0) setSelectedSeam(f.compatibleSeams[0]);
    };
    return () => { delete window._setGarment; delete window._setFabric; };
  }, []);

  const handleFabricSelect = useCallback((id) => {
    setSelectedFabric(id);
    const f = getFabricById(id);
    if (f && f.compatibleSeams.length > 0) setSelectedSeam(f.compatibleSeams[0]);
  }, []);

  const TABS = [
    { id:"explore",  label:"Fabric" },
    { id:"techpack", label:"Tech Pack" },
    { id:"drape",    label:"Drape" },
    { id:"trinity",  label:"Trinity" },
    { id:"generate", label:"Generate" },
    { id:"export",   label:"Export" },
    { id:"pipeline", label:"🌙 Pipeline" },
    { id:"dreams",   label:"Dream Journal" },
    { id:"slopers",  label:"Slopers" },
    { id:"muslin",   label:"Muslin Log" },
    { id:"selffabric",label:"Self Fabric" },
    { id:"sourcing",  label:"🗺 Sourcing" }
  ];

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)" }}>
      {/* Header */}
      <header className="inkwell-header">
        <div className="inkwell-logo">
          <div className="inkwell-logo-title">Inkwell Garment Studio</div>
          <div className="inkwell-logo-sub">Trinity Graph · IAM · Tech Pack · Verneccia Way</div>
        </div>

        {/* Selection Pills */}
        <div style={{ display:"flex", gap:"6px", alignItems:"center" }}>
          {selectedFabric && (
            <div style={{ padding:"4px 10px", fontSize:"8px", letterSpacing:"1px", border:"1px solid var(--gold-dim)", color:"var(--gold)", display:"flex", alignItems:"center", gap:"6px" }}>
              <div style={{ width:"8px", height:"8px", background:getFabricById(selectedFabric)?.color||"transparent" }}/>
              {getFabricById(selectedFabric)?.name}
            </div>
          )}
          {selectedGarment && (
            <div style={{ padding:"4px 10px", fontSize:"8px", letterSpacing:"1px", border:"1px solid var(--accent-teal)", color:"var(--accent-teal)" }}>
              {getGarmentById(selectedGarment)?.name}
            </div>
          )}
          {selectedFabric && (
            <button onClick={()=>{ setSelectedFabric(null); setSelectedGarment(null); setSelectedSeam(null); }}
              style={{ padding:"4px 8px", fontSize:"8px", border:"1px solid var(--border)", background:"transparent", color:"var(--text3)", letterSpacing:"1px", cursor:"pointer" }}>
              ✕ Clear
            </button>
          )}
        </div>

        {/* Tab Nav */}
        <nav className="inkwell-tabs">
          {TABS.map(tab => (
            <button key={tab.id}
              className={`inkwell-tab ${activeTab===tab.id?"active":""}`}
              onClick={()=>setActiveTab(tab.id)}>
              {tab.label}
            </button>
          ))}
        </nav>
      </header>

      {/* Panel Content */}
      <main>
        {activeTab==="explore"    && <FabricExplorer selectedFabric={selectedFabric} onSelectFabric={handleFabricSelect}/>}
        {activeTab==="techpack"   && <TechPackBuilder selectedFabric={selectedFabric} onSelectFabric={handleFabricSelect}
            selectedGarment={selectedGarment} onSelectGarment={setSelectedGarment}
            selectedSeam={selectedSeam} onSelectSeam={setSelectedSeam}/>}
        {activeTab==="drape"      && <DrapeSimulatorPanel selectedFabric={selectedFabric} onSelectFabric={handleFabricSelect}/>}
        {activeTab==="trinity"    && <TrinityAnalysisPanel selectedFabric={selectedFabric}/>}
        {activeTab==="generate"   && <GeneratePanel selectedFabric={selectedFabric} selectedGarment={selectedGarment} selectedSeam={selectedSeam}/>}
        {activeTab==="export"     && <ExportPanel selectedFabric={selectedFabric} selectedGarment={selectedGarment} selectedSeam={selectedSeam}/>}
        {activeTab==="pipeline"   && <PipelinePanel   garments={garments}  onGarmentsChange={setGarments}/>}
        {activeTab==="dreams"     && <DreamJournalPanel dreams={dreams}    onDreamsChange={setDreams}/>}
        {activeTab==="slopers"    && <SlopersPanel slopers={slopers}       onSlopersChange={setSlopers}/>}
        {activeTab==="muslin"     && <MuslinLogPanel   garments={garments} onGarmentsChange={setGarments}/>}
        {activeTab==="selffabric" && <SelfFabricPanel  garments={garments} onGarmentsChange={setGarments}/>}
        {activeTab==="sourcing"   && <SourcingPanel/>}
      </main>
    </div>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

// UTILITY: build Artiquity prompt
// ─────────────────────────────────────────────
function buildArtiquityPrompt(fabric, garment, seam) {
  const f = getFabricById(fabric);
  const g = getGarmentById(garment);
  const s = seam ? getSeamById(seam) : null;
  if (!f || !g) return "";

  const ity = f.trinity.ity;
  const pathy = f.trinity.pathy;
  const fund = f.trinity.fundamentals;

  const dominant_ity = Object.entries(ity).sort((a,b)=>b[1]-a[1])[0][0];
  const dominant_pathy = Object.entries(pathy).sort((a,b)=>b[1]-a[1])[0][0];

  const ity_desc = {
    materiality: "materially present, weight-forward",
    luminosity: "luminous, light-catching, shimmering",
    viscosity: "fluid, flowing, viscous movement",
    permanence: "permanent, structured, architecturally resolved",
    workability: "responsive, hand-worked, craft-evident"
  };
  const pathy_desc = {
    tactility: "tactile invitation, skin-aware",
    sensuosity: "sensuous, body-celebrating",
    immediacy: "immediate, emotionally present",
    gestural_energy: "gestural, movement-filled, kinetic"
  };

  return `Editorial fashion photograph of a ${g.name.toLowerCase()} crafted from ${f.name} (${f.gsm}gsm, drape coefficient ${f.drapeCoeff.toFixed(2)}). The garment is ${ity_desc[dominant_ity]}, with ${pathy_desc[dominant_pathy]} qualities. Fabric feel: ${f.handfeel}. Thermal character: ${f.thermal}. ${s ? `Construction: ${s.name} (${s.code}), ${s.seamWidth} seam allowance.` : ''} Artiquity aesthetic: authenticity ${fund.authenticity}/10, felicity ${fund.felicity}/10, propensity ${fund.propensity}/10. Shot on large format film, natural light, architectural space. Inkwell Studio editorial.`;
}
