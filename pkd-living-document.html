  `,document.head.appendChild(i)};$();var t={indigo:"#4f46e5",indigoD:"#3730a3",indigoPale:"rgba(79,70,229,0.09)",teal:"#0f766e",tealPale:"rgba(15,118,110,0.09)",amber:"#b45309",amberPale:"rgba(180,83,9,0.09)",red:"#b91c1c",redPale:"rgba(185,28,28,0.08)",slate:"#475569",slate2:"#64748b",text:"#0f172a",textMid:"#1e293b",textLight:"#64748b"},d=[{id:"exec",num:"01",title:"Executive Summary",score:6.2,accent:t.indigo,pale:t.indigoPale,pillar:"Synchronicity",summary:"$28\u2013$105M beachhead TAM \xB7 25:1 LTV:CAC \xB7 60\u201375% gross margin",body:`PKD is an infrastructure software and services platform purpose-built to enable Federally Qualified Health Centers (FQHCs) to access, capture, and manage the full economic and clinical value of 340B-eligible specialty pharmaceuticals in autoimmune and rheumatologic disease \u2014 while maintaining rigorous compliance with HRSA, OIG, Medicaid, and Anti-Kickback Statute requirements.

The 340B program generates $81.4 billion in annual savings nationally. FQHCs represent $3.6 billion (5.4%) of that figure \u2014 a structural underperformance driven not by ineligibility, but by compliance infrastructure unavailability. PKD solves exactly that gap.`,kpis:[{l:"Beachhead TAM",v:"$28\u2013$105M"},{l:"ACV Range",v:"$150K\u2013$500K"},{l:"LTV:CAC",v:"25:1"},{l:"Gross Margin",v:"60\u201375%"},{l:"Round Target",v:"$4\u2013$8M"},{l:"Program Size",v:"$81.4B 340B"}],tables:[{label:"KPI Benchmark Matrix",headers:["Dimension","Value","Benchmark"],rows:[["Market Opportunity","$28\u2013$105M beachhead TAM","1,400 FQHCs / 34M patients"],["Annual Contract Value","$150K\u2013$500K per FQHC","Kalderos: $76M raised, Bain Capital"],["LTV (mid-size FQHC)","$940K\u2013$1.34M","7\u201310 year customer lifetime"],["CAC (fully-loaded)","$40K\u2013$80K","1 BD per 15\u201320 prospects"],["Gross Margin","60\u201375%","SaaS + compliance services at scale"],["LTV:CAC Ratio","~25:1","Trellis Rx: 840% growth to acquisition"]]}]},{id:"problem",num:"02",title:"The Problem",score:8.5,accent:t.red,pale:t.redPale,pillar:"Vitality",summary:"102% rheumatology supply gap by 2030 \xB7 61.5% of 340B = specialty drugs \xB7 PPS margins preclude investment",body:"The intersection of rheumatology supply collapse, FQHC structural incapacity, and 340B program complexity creates a discrete, solvable compliance infrastructure gap \u2014 one that grows with each quarterly HRSA enforcement cycle.",bullets:["93% of rural U.S. counties have zero adult rheumatologists \u2014 the ACR projects demand will exceed supply by 102% by 2030","Total 340B purchases by FQHCs reached $3.6 billion in 2023, representing only 5.4% of the $81.4B program","Specialty drugs now represent 61.5% of all 340B purchases nationally, yet most FQHCs cannot access this value without risking HRSA audit exposure","High-acuity autoimmune Medicaid patients \u2014 untreated \u2014 are among the highest utilizers of emergency department and inpatient services","Prospective Payment System (PPS) thin margins leave no capital for compliance infrastructure investment","Stark Law and Anti-Kickback Statute referral implications require sophisticated legal structuring most FQHCs cannot afford","340B white-bag drug ownership requirements create supply chain governance obligations beyond standard FQHC operations","Medical-benefit J-code billing, prior authorization, and settlement reconciliation require specialty RCM expertise entirely absent in most FQHCs","Over 40 manufacturers now restrict 340B contract pharmacy arrangements, requiring entity-owned pharmacy capabilities"],tables:[]},{id:"solution",num:"03",title:"The Solution \u2014 PKD Platform",score:7.0,accent:t.teal,pale:t.tealPale,pillar:"Enginuity",summary:"Billing agent for the CE \xb7 PKD invoices infusion clinic post-administration \xb7 Corporate guarantee to distributor \xb7 Contract pharmacy compliance infrastructure",body:"PKD provides managed 340B compliance infrastructure enabling FQHCs to capture specialty drug program value within existing care delivery structures. The operational model is precise: the infusion clinic administers the specialty drug and bills the payer as normal. PKD, acting as billing agent on behalf of the Covered Entity (FQHC), then invoices the infusion clinic for drug reimbursement\u2014preserving the CE\u2019s drug ownership and 340B eligibility chain without requiring entity-owned pharmacy operations.\n\nPKD carries payment responsibility in two directions: as a fiduciary of the FQHC ensuring drug payment obligations are met, and through a corporate guarantee to the distributor\u2014which is also what enables PKD to negotiate improved 340B pricing terms on the FQHC\u2019s behalf.",bullets:["Patient eligibility determination and qualifying encounter documentation (HRSA three-part bona fide patient test)","Referral integrity orchestration and specialty care coordination across FQHC/specialty clinic interfaces","340B-compliant drug procurement and chain-of-custody documentation via contract pharmacy arrangements","Billing agent function: PKD invoices infusion clinic on behalf of the CE for drug reimbursement post-administration","Payment guarantor to distributor: corporate guarantee enables improved 340B pricing terms; PKD holds payment responsibility as FQHC fiduciary","Medical-benefit billing oversight including J-code integrity, prior authorization workflow, and site-of-care documentation","Audit trail generation meeting HRSA, OIG, Medicaid, and UDS documentation standards"],tables:[{label:"Billing & Settlement Flow",headers:["Step","Actor","Action","PKD Role"],rows:[["1","Infusion Clinic","Administers specialty drug to patient","Verifies patient eligibility and qualifying encounter"],["2","Infusion Clinic","Bills payer (Medicaid/commercial) for drug + administration (J-code)","Ensures J-code accuracy and prior auth compliance"],["3","PKD","Invoices infusion clinic on behalf of CE for 340B drug cost","Billing agent: generates invoice, enforces drug ownership chain"],["4","Infusion Clinic","Remits payment to CE via PKD","PKD reconciles payment; maintains audit trail"],["5","Distributor","Ships drug at 340B contract price to infusion clinic","PKD corporate guarantee backs payment terms; improved pricing via guarantee"]]},{label:"Stakeholder Governance Matrix",headers:["Stakeholder","Role","PKD Function"],rows:[["Distributor","Drug supplier at 340B price","PKD corporate guarantee; payment orchestration; improved terms"],["FQHC (CE)","340B covered entity; drug owner","PKD acts as billing agent and compliance fiduciary"],["Infusion Clinic","Drug administrator; primary biller","PKD invoices clinic post-administration on behalf of CE"],["Payer","Reimburser of drug + administration","J-code billing integrity; site-of-care documentation"],["Patient","Care recipient","Eligibility verification; copay management; specialty access"]]}]},{id:"economics",num:"04",title:"Unit Economics",score:6.5,accent:t.indigo,pale:t.indigoPale,pillar:"Serendipity",summary:"Spread/performance model (not fixed-fee) \xb7 Revenue tied to 340B savings captured \xb7 Corporate guarantee = contingent balance sheet liability \xb7 9\u201318 month sales cycle",body:"PKD\u2019s revenue model is performance-based\u2014compensation is derived from the 340B savings captured per drug claim processed, not a fixed monthly subscription. This structure aligns incentives with FQHC outcomes and is more defensible under AKS Personal Services Safe Harbor (compensation tied to value delivered, not volume of referrals). However, it introduces revenue variability tied to drug pricing dynamics, including IRA Medicare price negotiation compression on high-value biologics.\n\nPKD also carries contingent balance sheet exposure: the corporate guarantee extended to distributors to secure improved 340B pricing terms creates a payment obligation that, while operationally manageable under normal conditions, represents a real financial liability distinct from a pure software business.",bullets:["Revenue model: performance/spread-based\u2014percentage of net 340B savings captured per processed drug claim","AKS defensibility: FMV-validated compensation tied to value delivered, not referral volume or fixed fee","Revenue variability risk: IRA Medicare price negotiation compresses 340B spread on negotiated drugs (10 drugs in 2026, expanding)","Corporate guarantee liability: PKD\u2019s guarantee to distributors creates contingent payment exposure; requires working capital discipline","Capital intensity: payment responsibility for drug costs requires higher working capital reserves than SaaS model implies","Customer stickiness unchanged: 340B registration cycles + compliance continuity = 7\u201310 year effective lifetime"],tables:[{label:"Illustrative Revenue Model (Spread-Based)",headers:["Scenario","Drug Value","340B Discount","PKD Share (20%)","Annual Claims","Est. Annual Revenue"],rows:[["Small FQHC, 1\u20132 drugs","$8K\u2013$12K/infusion","35\u201345%","$700\u2013$1,100/claim","100\u2013200 claims","$70K\u2013$220K"],["Mid FQHC, 3\u20135 drugs","$10K\u2013$25K/infusion","35\u201345%","$875\u2013$2,250/claim","300\u2013600 claims","$260K\u2013$1.35M"],["Large FQHC, 6+ drugs","$15K\u2013$40K/infusion","35\u201345%","$1.3K\u2013$3.6K/claim","600\u20131,200 claims","$780K\u2013$4.3M"]]},{label:"Unit Economics (Revised)",headers:["Metric","Basis","Value"],rows:[["Revenue Driver","% of 340B savings per processed claim","Performance-based; ~20% of net savings (illustrative)"],["Gross Margin","Compliance ops + billing agent services at scale","55\u201370% (lower than SaaS; payment ops cost higher)"],["Customer Lifetime","Migration cost $50K\u2013$150K + compliance continuity","7\u201310 years (unchanged)"],["CAC (fully-loaded)","1 senior BD / 15\u201320 prospects; 9\u201318 month cycle","$40K\u2013$80K (unchanged)"],["Working Capital Req.","Corporate guarantee exposure + payment float","Higher than SaaS model; requires credit facility"],["IRA Compression Risk","Negotiated drugs lose 340B spread value post-MFP","10 drugs in 2026; monitor adalimumab, ustekinumab, ixekizumab"]]}]},{id:"regulatory",num:"05",title:"Regulatory Defensibility",score:6.5,accent:t.teal,pale:t.tealPale,pillar:"Ethics",summary:"MSO + AKS Personal Services Safe Harbor \xb7 Contract pharmacy model with state law protections \xb7 20+ state 340B protection statutes \xb7 Audit trail as primary operational moat",body:"PKD\u2019s regulatory defensibility operates on three layers: (1) proper MSO structuring to satisfy AKS and Stark requirements, (2) contract pharmacy model supported by an expanding body of state-level 340B protection statutes, and (3) a proprietary compliance workflow and audit trail system that functions as the primary operational moat.\n\nThe primary shift from prior analysis: PKD operates within the contract pharmacy framework rather than through entity-owned pharmacy infrastructure. This changes the manufacturer restriction landscape (see Section 06) but preserves the core HRSA 340B program participation rights, as the right of covered entities to use contract pharmacies remains intact under federal statute notwithstanding manufacturer restrictions.",bullets:["MSO fee structure validated against AKS Personal Services Safe Harbor: FMV-validated compensation for defined compliance services","FQHC Safe Harbor compliance: all 9 conditions satisfied; FQHC board patient-majority preserved","340B patient definition compliance: HRSA three-part test documentation built into eligibility workflow","Duplicate discount prevention: system-level controls prevent simultaneous Medicaid rebate + 340B capture","State 340B protection statutes (20+ states enacted): prohibit manufacturer restrictions on contract pharmacy arrangements in key markets","Compliance audit trail: immutable documentation meeting HRSA, OIG, Medicaid, and UDS standards\u2014primary switching cost driver","Billing agent legal structure: invoicing on behalf of CE preserves drug ownership chain required for 340B eligibility"],tables:[{label:"Recommended Legal Counsel (Unchanged)",headers:["Firm","Specialty"],rows:[["Feldesman Leifer LLP","Premier FQHC specialist; Section 330, 340B, HRSA audit defense"],["Powers Pyles Sutter & Verville PC","340B program architects since 1992; William von Oehsen drafted original 340B legislation"],["Bass Berry & Sims","340B-specific practice; former DOJ/OIG alumni"],["Frier Levitt","MSO formation; contract pharmacy and PBM contracting expertise"],["Quarles & Brady","Dedicated 340B program team; covered entity ADR"]]},{label:"Regulatory Risk Matrix (Updated)",headers:["Area","Legal Question","Status","Authority"],rows:[["AKS / Safe Harbor","Does performance-based spread model satisfy Personal Services Safe Harbor?","REQUIRES FMV VALIDATION","OIG Advisory Opinion 22-17; AO 25-03"],["340B Patient Definition","Do specialty clinic patients meet HRSA three-part test?","Opinion letter required","42 USC \u00a7256b; HRSA OPA Guidance"],["Contract Pharmacy Rights","Does CE retain right to use contract pharmacy despite manufacturer restrictions?","STATE LAW DEPENDENT","42 USC \u00a7256b; 20+ state protection statutes"],["Duplicate Discount","Does PKD workflow prevent simultaneous Medicaid rebate + 340B capture?","System control required","42 USC \u00a7256b(a)(5)(A)"],["FQHC Governance","Does MSO structure preserve patient-majority board control?","Opinion letter required","42 USC \u00a7254b; HRSA Compliance Manual"],["Billing Agent Authority","Is PKD\u2019s invoicing on behalf of CE properly authorized and documented?","Requires CE authorization agreement","HRSA OPA Guidance; state agency law"]]}]},{id:"manufacturer",num:"06",title:"Manufacturer Risk Analysis",score:4.5,accent:t.amber,pale:t.amberPale,pillar:"Sagacity",summary:"\u26a0 ELEVATED RISK \xb7 Contract pharmacy model is subject to manufacturer restrictions \xb7 Biosimilar pivot + state law protection + non-restricting manufacturer selection are primary mitigations",body:"PKD operates within the contract pharmacy framework. Unlike entity-owned pharmacy models, contract pharmacy arrangements are subject to the restrictions that 40+ manufacturers have imposed since 2020. This is a material risk that requires honest assessment and proactive mitigation strategy.\n\nThe primary mitigations are: (1) geographic concentration in the 20+ states with enacted 340B contract pharmacy protection statutes, (2) therapeutic and manufacturer selection strategy favoring non-restricting manufacturers and biosimilars, and (3) drug class diversification beyond the highest-restriction biologics. The biosimilar pivot is particularly timely\u2014adalimumab now has 20+ biosimilars approved, most from manufacturers with no contract pharmacy restrictions.",bullets:["40+ manufacturers have imposed contract pharmacy restrictions; PKD\u2019s contract pharmacy model is subject to these restrictions","Third Circuit (Sanofi v. HHS, 2023) and D.C. Circuit (AstraZeneca v. Becerra, 2024) upheld manufacturer restriction rights\u2014no federal exemption available without entity-owned pharmacy","Primary mitigation 1: Operate predominantly in states with enacted 340B contract pharmacy protection statutes (20+ states including CA, NY, IL, CO, VA, MN)","Primary mitigation 2: Biosimilar preference strategy\u2014adalimumab biosimilars (20+), infliximab biosimilars, rituximab biosimilars; most non-restricting","Primary mitigation 3: Manufacturer selection\u2014prioritize drugs from manufacturers without active restrictions (biosimilar makers, smaller specialty pharma)","Drug class risk tiering: avoid high-restriction AbbVie/Amgen/J&J originator drugs where biosimilar alternatives exist","IRA MFP compression on negotiated drugs further reduces economic case for manufacturer restriction on those molecules"],tables:[{label:"Manufacturer Risk Matrix (Updated \u2014 Contract Pharmacy Model)",headers:["Drug (Manufacturer)","Restriction","Risk to PKD","Mitigation"],rows:[["Humira/adalimumab (AbbVie)","RESTRICTED \u2014 contract pharmacy blocked","HIGH","Biosimilar pivot: 20+ biosimilars available, most non-restricting; prefer Hyrimoz, Hadlima, Cyltezo"],["Enbrel/etanercept (Amgen)","RESTRICTED \u2014 extended to federal grantees","HIGH","Biosimilar (Erelzi, Eticovo) preference; IRA MFP reduces Enbrel economic appeal"],["Stelara/ustekinumab (J&J)","RESTRICTED \u2014 IRA negotiated; MFP 2026","HIGH","IRA pricing compresses manufacturer economics; biosimilar entry expected 2025\u20132026"],["Rituxan/rituximab (Genentech)","Tightening restrictions (May 2025)","MODERATE","Rituximab biosimilars (Ruxience, Truxima) from non-restricting manufacturers"],["Infliximab biosimilars (multi)","Mostly non-restricting","LOW","Biosimilar preference strategy; choose non-restricting manufacturers"],["Cosentyx/secukinumab (Novartis)","Moderate restrictions","MODERATE","Monitor; Novartis has been less aggressive than AbbVie/Amgen"],["State-protected markets","Restrictions unenforceable","LOW IN 20+ STATES","Concentrate initial rollout in CA, NY, IL, CO, MN, VA, WA, OR"]]}]},{id:"gtm",num:"07",title:"Go-to-Market Strategy",score:3,accent:t.red,pale:t.redPale,pillar:"Ubiquity",summary:"\u26A0 CRITICAL GAP \xB7 7 priority states \xB7 6 pilot FQHC targets \xB7 5 key conferences 2026",body:"PKD's go-to-market must leverage the existing FQHC infrastructure networks \u2014 Primary Care Associations and Health Center Controlled Networks \u2014 that pre-vet vendors, compress sales cycles, and provide concentrated access to decision-makers across hundreds of health centers simultaneously.",bullets:["Health Choice Network (Miami): highest-priority partner \u2014 CommonWealth Purchasing Group (600+ health centers, $30M annual collective savings)","OCHIN (Portland): largest HCCN nationally by Epic membership; California and Pacific Northwest reach","AllianceChicago HCCN: ACRES research infrastructure + athenahealth support; Illinois and Midwest penetration","CHCollective / Provista-Vizient: partnered with nation's largest GPO; strongest contract portfolio for vendor credentialing"],tables:[{label:"Priority State Markets",headers:["State","FQHC Count","Medicaid Enrollees","340B Protection","Strategic Rationale"],rows:[["California","174","12.7M","Strong","Largest FQHC market; CPCA represents 1,200+ sites"],["Texas","100+","5.5M","Emerging","No Medicaid expansion = largest FQHC-dependent uninsured population"],["New York","70+","7.2M","Strong","Sun River Health (250K+ patients); dense urban FQHCs"],["Florida","50+","4.5M","Moderate","Health Choice Network HQ; no Medicaid expansion"],["Illinois","45+","3.2M","Strong","ACCESS Community Health Network; AllianceChicago HCCN"],["Ohio","40+","3.0M","Strong","Medicaid expansion + state 340B reporting mandate"],["Georgia","35+","2.4M","Moderate","Large Black population, disproportionate SLE prevalence"]]},{label:"Priority Pilot Targets",headers:["
