    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #d4dce9; color: #0f172a; font-family: -apple-system,'Inter',BlinkMacSystemFont,system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.04); }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .glass {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.98);
      box-shadow: 0 2px 20px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,1);
    }
    .glass-panel {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid rgba(255,255,255,1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,1);
    }
    .glass-card {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0,0,0,0.09);
      border-top: 1px solid rgba(255,255,255,0.98);
      border-radius: 14px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.09), 0 1px 3px rgba(0,0,0,0.05);
      transition: all 0.2s ease;
    }
    .glass-card:hover {
      background: rgba(255,255,255,0.97);
      box-shadow: 0 6px 24px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }
    .nav-item { border-radius:11px; cursor:pointer; transition:all 0.15s ease; }
    .nav-item:hover { background: rgba(255,255,255,0.75); }
    .nav-item.active {
      background: rgba(255,255,255,0.97);
      box-shadow: 0 2px 14px rgba(0,0,0,0.11), 0 1px 3px rgba(0,0,0,0.06);
    }
    .pill-btn { cursor:pointer; transition:all 0.15s ease; outline:none; }
    .pill-btn:hover { transform:translateY(-1px); filter:brightness(1.04); }
    .pill-btn:active { transform:translateY(0); filter:brightness(0.97); }
    .pill-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .section-in { animation:fadeUp 0.25s ease forwards; }
    .iam-in { animation:slideIn 0.22s ease forwards; }
    table { border-collapse:collapse; width:100%; }
    th {
      font-size:10px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase;
      color:#3730a3; padding:11px 14px; text-align:left;
      background:rgba(99,102,241,0.1);
      border-bottom:2px solid rgba(99,102,241,0.18);
    }
    td {
      font-size:13px; padding:11px 14px;
      border-bottom:1px solid rgba(0,0,0,0.07);
      color:#1e293b; line-height:1.6; vertical-align:top;
    }
