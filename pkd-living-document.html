function Ring({ score, size=52, sw=3 }) {
  const r = (size-sw*2)/2, circ = 2*Math.PI*r;
  const off = circ-(score/10)*circ;
  const color = score>=7?C.teal:score>=5?C.indigo:C.red;
  const track = score>=7?"rgba(13,148,136,0.15)":score>=5?"rgba(99,102,241,0.15)":"rgba(220,38,38,0.15)";
  return (
    <svg width={size} height={size} style={{flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={sw}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off}
        transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{transition:"stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1)"}}/>
      <text x={size/2} y={size/2+0.5} textAnchor="middle" dominantBaseline="middle"
        fill={color} fontSize={size*0.25} fontFamily="-apple-system,Inter,system-ui" fontWeight="600">
        {score.toFixed(1)}
      </text>
    </svg>
  );
}

function DTable({ data }) {
  if (!data) return null;
  const chip = cell => {
    if (cell==="HIGH"||cell==="CRITICAL"||cell==="HIGH (currently)"||cell==="HIGH (specific drugs)")
      return <span className="c-hi">{cell}</span>;
    if (cell==="MODERATE"||cell==="LOW–MOD")
      return <span className="c-mo">{cell}</span>;
    if (cell==="LOW")
      return <span className="c-lo">{cell}</span>;
    return cell;
  };
  return (
    <div style={{borderRadius:12,overflow:"hidden",border:"1px solid rgba(0,0,0,0.06)",
      boxShadow:"0 2px 10px rgba(0,0,0,0.04)"}}>
      <table>
        <thead><tr>{data.headers.map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
        <tbody>
          {data.rows.map((row,ri)=>(
            <tr key={ri}>{row.map((c,ci)=><td key={ci}>{chip(c)}</td>)}</tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

        <div style={{width:1,height:28,background:"rgba(0,0,0,0.12)"}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,letterSpacing:"-0.01em"}}>
            PKD · FQHC Specialty Compliance Infrastructure
          </div>
          <div style={{fontSize:10,color:C.slate,marginTop:1,fontWeight:500}}>
            Investment Committee Memorandum · Feb 2026 · Series A Evaluation · Confidential
          </div>
        </div>
        {/* Score */}
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:C.slate,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>SAVESUCCESS</div>
            <div style={{fontSize:17,fontWeight:800,color:C.indigo}}>5.8 / 10.0</div>
          </div>
          <Ring score={5.8} size={44} sw={3}/>
        </div>
        <div style={{width:1,height:28,background:"rgba(0,0,0,0.12)"}}/>
        {/* Badges */}
        <div style={{display:"flex",gap:5,flexShrink:0}}>
          {[
            {l:"Conditional", bg:"rgba(180,83,9,0.12)",  t:"#78350f", b:"rgba(180,83,9,0.28)"},
            {l:"Term Sheet",  bg:"rgba(15,118,110,0.11)", t:"#064e3b", b:"rgba(15,118,110,0.28)"},
            {l:"$4–$8M",      bg:"rgba(79,70,229,0.1)",  t:"#3730a3", b:"rgba(79,70,229,0.28)"},
          ].map(b=>(
            <div key={b.l} style={{padding:"4px 10px",borderRadius:20,
              background:b.bg,border:`1px solid ${b.b}`,
              fontSize:11,fontWeight:700,color:b.t}}>{b.l}</div>
          ))}
        </div>
        <div style={{width:1,height:28,background:"rgba(0,0,0,0.12)"}}/>
        {/* IAM toggle */}
        <button className="pill-btn" onClick={()=>setShowIAM(v=>!v)}
          style={{display:"flex",alignItems:"center",gap:7,padding:"8px 16px",borderRadius:20,
            background:showIAM?"linear-gradient(135deg,#4f46e5,#3730a3)":"rgba(79,70,229,0.1)",
            border:showIAM?"1px solid transparent":"1px solid rgba(79,70,229,0.28)",
            boxShadow:showIAM?"0 4px 14px rgba(79,70,229,0.4)":"none",
            cursor:"pointer",flexShrink:0}}>
          <div style={{width:6,height:6,borderRadius:"50%",
            background:showIAM?"rgba(255,255,255,0.9)":C.teal,
            animation:showIAM?"breathe 1.5s infinite":"none"}}/>
          <span style={{fontSize:12,fontWeight:700,color:showIAM?"white":C.indigo}}>IAM</span>
        </button>
      </div>

      {/* BODY */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* SIDEBAR */}
        <div className="glass" style={{width:collapsed?50:222,flexShrink:0,
          display:"flex",flexDirection:"column",
          borderRadius:0,borderTop:"none",borderBottom:"none",borderLeft:"none",
          borderRight:"1px solid rgba(0,0,0,0.1)",
          transition:"width 0.2s ease",overflow:"hidden"}}>
          <button onClick={()=>setCollapsed(v=>!v)} style={{
            padding:"10px 12px",background:"none",border:"none",
            borderBottom:"1px solid rgba(0,0,0,0.05)",cursor:"pointer",
            display:"flex",alignItems:"center",justifyContent:collapsed?"center":"space-between"}}>
            {!collapsed&&<span style={{fontSize:9,fontWeight:600,color:C.slate2,letterSpacing:"0.08em"}}>SECTIONS</span>}
            <span style={{fontSize:11,color:C.slate2}}>{collapsed?"▶":"◀"}</span>
          </button>
          <div style={{flex:1,overflowY:"auto",padding:"5px 5px"}}>
            {SECS.map(s=>{
              const isA = active.id===s.id;
              const color = s.score>=7?C.teal:s.score>=5?C.indigo:C.red;
              return (
                <div key={s.id} className={`nav-item ${isA?"active":""}`}
                  onClick={()=>setActive(s)}
                  style={{display:"flex",alignItems:"center",gap:7,marginBottom:1,
                    padding:collapsed?"7px 6px":"7px 10px"}}>
                  <div style={{width:26,height:19,borderRadius:5,flexShrink:0,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    background:isA?`${color}15`:"rgba(0,0,0,0.04)",
                    fontSize:9,fontWeight:700,color:isA?color:C.slate2}}>{s.num}</div>
                  {!collapsed&&(
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,fontWeight:isA?600:400,
                        color:isA?C.text:C.textMid,
                        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.title}</div>
                      <div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}>
                        <div style={{flex:1,height:2,borderRadius:99,background:"rgba(0,0,0,0.06)",overflow:"hidden"}}>
                          <div style={{width:`${s.score*10}%`,height:"100%",borderRadius:99,
                            background:color,opacity:isA?1:0.55,
                            transition:"width 0.8s cubic-bezier(0.4,0,0.2,1)"}}/>
                        </div>
                        <span style={{fontSize:9,color,fontWeight:600,flexShrink:0}}>{s.score}</span>
                        {s.score<5&&<span style={{fontSize:9,color:C.red}}>⚠</span>}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {!collapsed&&(
            <div style={{padding:"10px 12px",borderTop:"1px solid rgba(0,0,0,0.05)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:9,color:C.slate2,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase"}}>Composite</div>
                  <div style={{fontSize:20,fontWeight:700,color:C.indigo}}>{overall.toFixed(2)}</div>
                </div>
                <Ring score={overall} size={38} sw={2.5}/>
              </div>
            </div>
          )}
        </div>

        {/* CONTENT */}
        <div ref={contentRef} style={{flex:1,overflowY:"auto",padding:"32px 40px",
          marginRight:showIAM?420:0,transition:"margin-right 0.22s ease"}}>
          <div key={active.id} className="section-in">
            {/* Header */}
            <div style={{marginBottom:28}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,marginBottom:12}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{padding:"3px 10px",borderRadius:20,
                      background:`${active.accent}14`,border:`1.5px solid ${active.accent}45`,
                      fontSize:10,fontWeight:800,color:active.accent,letterSpacing:"0.07em"}}>
                      SECTION {active.num}
                    </div>
                    <div style={{fontSize:11,color:C.slate,fontWeight:600}}>{active.pillar} signal</div>
                  </div>
                  <h1 style={{fontSize:30,fontWeight:800,color:C.text,letterSpacing:"-0.025em",lineHeight:1.15}}>
                    {active.title}
                  </h1>
                </div>
                <Ring score={active.score} size={58} sw={3.5}/>
              </div>
              {/* Summary strip */}
              <div className="glass" style={{padding:"10px 16px",borderRadius:12,
                borderLeft:`3px solid ${active.accent}`,
                fontSize:12,fontWeight:600,color:C.textMid,letterSpacing:"0.01em"}}>
                {active.summary}
              </div>
            </div>
            {/* Divider */}
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
              <div style={{flex:1,height:1,background:"rgba(0,0,0,0.09)"}}/>
              <div style={{fontSize:9,color:C.slate,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600}}>
                PKD · IC Memo · Feb 2026
              </div>
              <div style={{flex:1,height:1,background:"rgba(0,0,0,0.09)"}}/>
            </div>
            <SectionBody sec={active}/>
            {/* Nav */}
            <div style={{display:"flex",justifyContent:"space-between",marginTop:48,
              paddingTop:24,borderTop:"1px solid rgba(0,0,0,0.06)"}}>
              {SECS.indexOf(active)>0?(
                <button className="pill-btn" onClick={()=>setActive(SECS[SECS.indexOf(active)-1])}
                  style={{padding:"9px 18px",borderRadius:20,background:"rgba(255,255,255,0.65)",
                    border:"1px solid rgba(0,0,0,0.07)",fontSize:12,fontWeight:500,
                    color:C.textMid,cursor:"pointer"}}>
                  ← {SECS[SECS.indexOf(active)-1].title}
                </button>
              ):<div/>}
              {SECS.indexOf(active)<SECS.length-1?(
                <button className="pill-btn" onClick={()=>setActive(SECS[SECS.indexOf(active)+1])}
                  style={{padding:"9px 18px",borderRadius:20,
                    background:`${active.accent}10`,border:`1px solid ${active.accent}28`,
                    fontSize:12,fontWeight:600,color:active.accent,cursor:"pointer"}}>
                  {SECS[SECS.indexOf(active)+1].title} →
                </button>
              ):<div/>}
            </div>
          </div>
        </div>

        {showIAM&&<IAMPanel sec={active} onClose={()=>setShowIAM(false)}/>}
      </div>

      {/* STATUS BAR */}
      <div className="glass" style={{height:30,flexShrink:0,display:"flex",alignItems:"center",
        padding:"0 20px",gap:18,borderRadius:0,borderBottom:"none",borderLeft:"none",borderRight:"none",
        borderTop:"1px solid rgba(0,0,0,0.1)"}}>
        {[
          {l:"340B Program", v:"$81.4B",    c:C.indigo},
          {l:"FQHC TAM",    v:"$28–$105M",  c:C.teal},
          {l:"LTV:CAC",     v:"25:1",        c:C.teal},
          {l:"Pilot Status",v:"LOI REQUIRED",c:C.red},
          {l:"Ubiquity",    v:"3/10 ⚠",     c:C.red},
          {l:"Certainty",   v:"3/10 ⚠",     c:C.red},
        ].map((it,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:9,color:C.slate,fontWeight:600}}>{it.l}</span>
            <span style={{fontSize:9,color:it.c,fontWeight:800}}>{it.v}</span>
          </div>
        ))}
        <div style={{flex:1}}/>
        <div style={{fontSize:9,color:C.slate,fontWeight:600}}>
          AI Inkwell · Living Document System · {new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}).toUpperCase()}
        </div>
      </div>
    </div>
  );
}

const domRoot = document.getElementById('root');
const reactRoot = ReactDOM.createRoot(domRoot);
reactRoot.render(React.createElement(App));

  </script>
</body>
</html>
