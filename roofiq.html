<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── KEYS ──────────────────────────────────────────────────────
const PROXY = "https://awareness-proxy-328246068140.us-central1.run.app"; // All API calls route through here

// ─── MATERIALS & COSTS ─────────────────────────────────────────
const MATS = {
  "3-Tab Asphalt":         {mat:1.50,labor:2.00,warranty:"20–25 yr",tier:"Good"},
  "Architectural Shingle": {mat:2.25,labor:2.50,warranty:"30 yr",tier:"Better"},
  "Premium Designer":      {mat:4.00,labor:3.00,warranty:"50 yr",tier:"Best"},
  "Metal Standing Seam":   {mat:7.50,labor:5.00,warranty:"40–70 yr",tier:"Premium"},
  "Tile (Clay/Concrete)":  {mat:8.00,labor:6.00,warranty:"50+ yr",tier:"Premium+"},
};
const COMP = {simple:{l:"Simple (Gable)",f:1},moderate:{l:"Moderate (Hip/Valley)",f:1.15},complex:{l:"Complex (Multi-level)",f:1.35},extreme:{l:"Extreme (Dormers/Turrets)",f:1.55}};
const PITCH = {low:{l:"Low (2–4/12)",f:1,r:[0,18.4]},standard:{l:"Standard (5–7/12)",f:1.1,r:[18.4,30.3]},steep:{l:"Steep (8–10/12)",f:1.25,r:[30.3,39.8]},extreme:{l:"Extreme (11+/12)",f:1.45,r:[39.8,90]}};
const WASTE = {simple:1.10,moderate:1.13,complex:1.17,extreme:1.22};
const EX = {tearOff:1.25,underlay:0.45,ice:0.75,dump:450,permit:350,gutter:6.50};

// ─── HELPERS ───────────────────────────────────────────────────
const $ = n=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n);
const $k = n=>n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(0)}K`:$(n);
const m2s = m=>Math.round(m*10.7639);
const pCat = d=>{for(const[k,v]of Object.entries(PITCH))if(d>=v.r[0]&&d<v.r[1])return k;return"standard"};
const pRat = d=>`${Math.round(Math.tan(d*Math.PI/180)*12)}/12`;
const azD = a=>["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"][Math.round(a/22.5)%16];
const eRoof = (sq,fl)=>Math.round((sq/Math.max(fl,1))*1.15);

const inferComp = (p,sol)=>{if(sol){const s=sol.solarPotential?.roofSegmentStats?.length||0;return s>=8?"extreme":s>=5?"complex":s>=3?"moderate":"simple";}const fl=p.features?.floorCount||1,sq=p.squareFootage||0;return fl>=3||sq>5000?"extreme":fl>=2||sq>3000?"complex":sq>1800?"moderate":"simple";};
const inferMat = p=>{const r=(p.features?.roofType||"").toLowerCase();return r.includes("metal")||r.includes("standing")?"Metal Standing Seam":r.includes("tile")||r.includes("clay")?"Tile (Clay/Concrete)":r.includes("architect")||r.includes("comp")?"Architectural Shingle":r.includes("asphalt")||r.includes("shingle")?"3-Tab Asphalt":"Architectural Shingle";};

function calcBid(ra,mat,comp,pitch,opts={}) {
  const m=MATS[mat],c=COMP[comp],p=PITCH[pitch],w=WASTE[comp];
  const ea=ra*w,mc=ea*m.mat,lc=ea*m.labor*c.f*p.f;
  const to=opts.tearOff?ea*EX.tearOff:0,un=ea*EX.underlay,ic=opts.iceShield?ea*0.15*EX.ice:0,gu=opts.gutters?Math.sqrt(ra)*4*EX.gutter:0;
  const sub=mc+lc+to+un+ic+gu+EX.dump+EX.permit,oh=sub*0.15,pr=sub*0.20;
  return{roofArea:Math.round(ra),ea:Math.round(ea),mc:Math.round(mc),lc:Math.round(lc),to:Math.round(to),un:Math.round(un),ic:Math.round(ic),gu:Math.round(gu),dump:EX.dump,perm:EX.permit,sub:Math.round(sub),oh:Math.round(oh),pr:Math.round(pr),total:Math.round(sub+oh+pr),psf:((sub+oh+pr)/ra).toFixed(2),warranty:m.warranty,tier:m.tier};
}

// ─── DEEP RENTCAST MINING ──────────────────────────────────────
function mineRentcast(p) {
  const signals = [];
  const ta = p.taxAssessments||{}, yrs = Object.keys(ta).sort();

  // Assessment trend analysis
  if (yrs.length >= 2) {
    const vals = yrs.map(y=>({y,v:ta[y]?.value||0,land:ta[y]?.land||0,imp:ta[y]?.improvements||0})).filter(x=>x.v>0);
    if (vals.length >= 2) {
      const first=vals[0], last=vals[vals.length-1];
      const totalPct = ((last.v-first.v)/first.v*100);
      signals.push({key:"assessTrend",val:totalPct,label:`Assessment ${totalPct>0?"+":""}${totalPct.toFixed(0)}% over ${vals.length}yrs (${$k(first.v)}→${$k(last.v)})`});

      // Improvement vs land split — if improvements flat but land up, no work done
      if (first.imp>0 && last.imp>0) {
        const impPct = ((last.imp-first.imp)/first.imp*100);
        const landPct = first.land>0?((last.land-first.land)/first.land*100):0;
        if (impPct < 10 && landPct > 20) {
          signals.push({key:"noImprovements",val:true,label:`Improvements flat (${impPct>0?"+":""}${impPct.toFixed(0)}%) while land rose ${landPct.toFixed(0)}% — NO recent renovation`});
        } else if (impPct > 30) {
          signals.push({key:"recentWork",val:true,label:`Improvement value jumped ${impPct.toFixed(0)}% — possible recent renovation`});
        }
      }

      // Year-over-year spikes (detect specific improvement events)
      for (let i=1;i<vals.length;i++) {
        const yoy = vals[i-1].v>0 ? ((vals[i].v-vals[i-1].v)/vals[i-1].v*100) : 0;
        if (yoy > 15) signals.push({key:"spike",val:yoy,label:`Assessment spike in ${vals[i].y}: +${yoy.toFixed(0)}% (${$k(vals[i-1].v)}→${$k(vals[i].v)}) — possible permitted work`});
      }
    }
  }

  // Owner tenure
  if (p.lastSaleDate) {
    const tenure = (Date.now()-new Date(p.lastSaleDate).getTime())/(365.25*24*3600000);
    signals.push({key:"tenure",val:tenure,label:`Owner tenure: ${tenure.toFixed(1)} years (purchased ${new Date(p.lastSaleDate).toLocaleDateString()} for ${$(p.lastSalePrice||0)})`});
    if (tenure<=2) signals.push({key:"newOwner",val:true,label:"New owner (<2yr) — 40% higher renovation probability"});
    if (tenure>=15) signals.push({key:"longOwner",val:true,label:"Long-term owner (15+yr) — deferred maintenance likely"});
  }

  // Roof type life expectancy
  const rt = (p.features?.roofType||"").toLowerCase();
  const age = p.yearBuilt ? 2026-p.yearBuilt : 0;
  if (rt && age) {
    let life = 25; // default
    if (rt.includes("3-tab")||rt.includes("asphalt")) life = 20;
    else if (rt.includes("architect")) life = 30;
    else if (rt.includes("metal")) life = 50;
    else if (rt.includes("tile")) life = 50;
    else if (rt.includes("wood")||rt.includes("shake")) life = 15;
    const roofAge = Math.min(age, life+10); // can't be older than house
    const pctLife = (roofAge/life*100);
    signals.push({key:"roofLife",val:pctLife,label:`${p.features.roofType}: ~${life}yr life, property ${age}yr old (${pctLife.toFixed(0)}% of cycle)`});
    if (pctLife >= 100) signals.push({key:"pastLife",val:true,label:`CRITICAL: Roof material past expected lifespan`});
  }

  // Square footage / value ratio (undermaintained = low value/sqft)
  const val = p.lastSalePrice||p._assessedValue||0;
  if (val > 0 && (p.squareFootage||0) > 0) {
    const psf = val/p.squareFootage;
    signals.push({key:"valPerSf",val:psf,label:`Value/sqft: $${psf.toFixed(0)} — ${psf<150?"below market (undermaintained?)":psf<300?"market rate":"premium property"}`});
  }

  // Features mining
  if (p.features?.cooling) signals.push({key:"cooling",val:p.features.cooling,label:`Cooling: ${p.features.cooling}`});
  if (p.features?.heating) signals.push({key:"heating",val:p.features.heating,label:`Heating: ${p.features.heating}`});
  if (p.features?.condition) signals.push({key:"condition",val:p.features.condition,label:`Condition: ${p.features.condition}`});
  if (p.features?.pool) signals.push({key:"pool",val:true,label:"Has pool — higher-value homeowner"});
  if (p.features?.fireplace) signals.push({key:"fireplace",val:true,label:"Has fireplace — invest in home"});

  return signals;
}

// ─── PROPENSITY SCORING ────────────────────────────────────────
function scoreProperty(p) {
  let s=0; const r=[];
  const age = p.yearBuilt ? 2026-p.yearBuilt : 0;
  const mined = mineRentcast(p);

  // Age
  if(age>=25){s+=30;r.push({t:`Built ${p.yearBuilt} — roof past useful life (${age}yrs)`,w:30,c:"age"});}
  else if(age>=18){s+=22;r.push({t:`Approaching replacement (${age}yrs)`,w:22,c:"age"});}
  else if(age>=12){s+=10;r.push({t:`Inspection window (${age}yrs)`,w:10,c:"age"});}

  // Value
  const val=p.lastSalePrice||p._assessedValue||0;
  if(val>500000){s+=15;r.push({t:`High-value (${$k(val)}) — premium material opportunity`,w:15,c:"value"});}
  else if(val>250000){s+=10;r.push({t:`Mid-range (${$k(val)})`,w:10,c:"value"});}
  else if(val>100000){s+=5;r.push({t:`Entry-level (${$k(val)})`,w:5,c:"value"});}

  // Size & type
  if((p.squareFootage||0)>3000){s+=10;r.push({t:`Large (${p.squareFootage.toLocaleString()}sf) — high job value`,w:10,c:"size"});}
  if((p.features?.floorCount||1)>=2){s+=5;r.push({t:"Multi-story — complexity premium",w:5,c:"size"});}
  if(p.propertyType==="Single Family"){s+=8;r.push({t:"Single family — ideal target",w:8,c:"type"});}
  if(p.ownerOccupied){s+=5;r.push({t:"Owner-occupied — decision-maker on-site",w:5,c:"owner"});}

  // Mined signals → score
  const noImp = mined.find(x=>x.key==="noImprovements");
  if(noImp){s+=10;r.push({t:noImp.label,w:10,c:"assess"});}
  const recentWork = mined.find(x=>x.key==="recentWork");
  if(recentWork){s-=5;r.push({t:recentWork.label,w:-5,c:"assess"});}
  const pastLife = mined.find(x=>x.key==="pastLife");
  if(pastLife){s+=12;r.push({t:pastLife.label,w:12,c:"roof"});}
  const newOwner = mined.find(x=>x.key==="newOwner");
  if(newOwner){s+=8;r.push({t:newOwner.label,w:8,c:"owner"});}
  const longOwner = mined.find(x=>x.key==="longOwner");
  if(longOwner){s+=6;r.push({t:longOwner.label,w:6,c:"owner"});}

  // Shovels permit data
  if(p._shovelsPermits!==undefined) {
    const rp = (p._shovelsPermits||[]).filter(x=>(x.tags||[]).includes("roofing")||(x.description||"").toLowerCase().includes("roof"));
    if(rp.length===0&&age>=10){s+=12;r.push({t:`No roofing permits found in Shovels (180M records) — ${age}yr old property`,w:12,c:"permit"});}
    else if(rp.length>0) {
      const latest = rp.sort((a,b)=>(b.file_date||"").localeCompare(a.file_date||""))[0];
      const yrsAgo = latest.file_date ? ((Date.now()-new Date(latest.file_date).getTime())/(365.25*24*3600000)).toFixed(1) : "?";
      if(parseFloat(yrsAgo)>15){s+=10;r.push({t:`Last roof permit: ${latest.file_date} (${yrsAgo}yrs ago)`,w:10,c:"permit"});}
      else if(parseFloat(yrsAgo)>8){s+=5;r.push({t:`Roof permit ${yrsAgo}yrs ago — approaching cycle`,w:5,c:"permit"});}
      else{r.push({t:`Recent roof permit: ${latest.file_date} (${yrsAgo}yrs ago)`,w:0,c:"permit"});}
    }
  }
  if(p._aiPermitScore){s+=p._aiPermitScore;r.push({t:p._aiPermitReason,w:p._aiPermitScore,c:"ai"});}

  // Roof material
  const rt=(p.features?.roofType||"").toLowerCase();
  if(rt.includes("asphalt")||rt.includes("shingle")||rt.includes("comp")||rt.includes("3-tab")){s+=5;r.push({t:`${p.features.roofType} — standard replacement material`,w:5,c:"roof"});}

  s=Math.max(0,Math.min(s,100));
  return{score:s,priority:s>=70?"HOT":s>=45?"WARM":"COOL",reasons:r,mined};
}

// ─── APIs ──────────────────────────────────────────────────────
async function callRentcast(prompt) {
  // Parse intent from prompt
  const addrMatch = prompt.match(/address="([^"]+)"/);
  const zipMatch  = prompt.match(/zipCode="([^"]+)"/);
  const isAVM     = prompt.includes("/avm/value") || prompt.includes("avm/value");
  try {
    if (isAVM && addrMatch) {
      const r = await fetch(`${PROXY}/rentcast/avm`, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({address:addrMatch[1],compCount:5})});
      if (!r.ok) return {properties:[],valuation:null};
      const val = await r.json();
      return {properties:[], valuation: val?.price ? val : null};
    }
    const params = addrMatch ? {address:addrMatch[1],limit:10} : zipMatch ? {zipCode:zipMatch[1],propertyType:"Single Family",limit:15} : null;
    if (!params) return {properties:[],valuation:null};
    const r = await fetch(`${PROXY}/rentcast/properties`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(params)});
    if (!r.ok) {
      const err = await r.text();
      return {properties:[],valuation:null,raw:err.slice(0,200)};
    }
    const data = await r.json();
    // Rentcast returns array for zip search, single object for address
    const properties = Array.isArray(data) ? data : (data?.id ? [data] : data?.properties || []);
    return {properties: properties.filter(Boolean), valuation:null};
  } catch(e) {
    return {properties:[],valuation:null,raw:e.message};
  }
}

async function callSolar(lat,lng,key){try{const r=await fetch(`https://solar.googleapis.com/v1/buildingInsights:findClosest?location.latitude=${lat}&location.longitude=${lng}&key=${key}`);return r.ok?await r.json():null;}catch{return null;}}

// Permit lookup — LADBS (LA) via BackyardOne, Shovels.ai (national) via proxy
async function callShovels(zipCode, address) {
  // 1. Try LADBS via BackyardOne (works for LA County addresses)
  if (address) {
    try {
      const r = await fetch(`${PROXY}/byo/lookup_permits`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({address})});
      if (r.ok) {
        const data = await r.json();
        const permits = data?.raw?.result?.structuredContent?.data?.permits || [];
        if (permits.length > 0) {
          return permits.map(p=>({description:p.work_description||p.description||"Roofing permit",file_date:p.issue_date||p.permit_date,tags:["roofing"],jurisdiction:"Los Angeles LADBS",permit_number:p.permit_number}));
        }
      }
    } catch {}
  }
  // 2. Fallback: Shovels.ai national database via proxy (needs SHOVELS_KEY in Cloud Run)
  try {
    const r = await fetch(`${PROXY}/shovels/permits`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({geo_id:zipCode,size:50})});
    if (r.ok) { const data=await r.json(); return data.items||[]; }
  } catch {}
  return [];
}

// Legacy alias kept for compatibility
async function callShovelsViaProxy(zipCode, address) {
  return callShovels(zipCode, address);
}

// AI inference of permit history from property characteristics
async function inferPermits(prop, mined) {
  const ta = prop.taxAssessments||{};
  const yrs = Object.keys(ta).sort();
  const assessHistory = yrs.map(y=>`${y}: total=${$k(ta[y]?.value||0)}, land=${$k(ta[y]?.land||0)}, improvements=${$k(ta[y]?.improvements||0)}`).join("\n");
  const spikes = mined.filter(x=>x.key==="spike").map(x=>x.label).join("; ");
  const prompt = `Analyze this property for ROOFING permit probability. Return ONLY valid JSON, no prose.\n\nPROPERTY: ${prop.formattedAddress}\nBuilt: ${prop.yearBuilt} (${2026-(prop.yearBuilt||2000)}yrs old)\nRoof: ${prop.features?.roofType||"Unknown"}\nSqFt: ${prop.squareFootage||"?"}\nStories: ${prop.features?.floorCount||1}\nLast sale: ${prop.lastSaleDate||"?"} for ${$(prop.lastSalePrice||0)}\nOwner-occupied: ${prop.ownerOccupied}\nCondition: ${prop.features?.condition||"?"}\n\nTAX ASSESSMENT HISTORY:\n${assessHistory||"None available"}\n\nASSESSMENT SPIKES: ${spikes||"None"}\n\nBased on: 1) Roof material lifespan 2) Assessment patterns 3) Property age 4) Owner tenure 5) Regional weather exposure\n\nReturn exactly: {"estimatedLastRoofWork":"YYYY or never","confidence":"high/medium/low","yearsSinceRoof":0,"reasoning":"1 sentence","score":0}`;
  try {
    const r = await fetch(`${PROXY}/gemini/generate`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const d = await r.json();
    const text=(d.candidates||[{content:{parts:[{text:""}]}}])[0].content.parts[0].text||"";
    return JSON.parse(text.replace(/```json\s*/g,"").replace(/```/g,"").trim());
  } catch { return null; }
}

async function callAI(prop,bid,cfg,val,solar,permits,mined) {
  const pv=val?.price||prop.lastSalePrice||0;
  const sInfo=solar?`\nSATELLITE: ${m2s(solar.solarPotential?.wholeRoofStats?.areaMeters2||0)}sf measured, ${solar.solarPotential?.roofSegmentStats?.length||0} segments`:"";
  const pInfo=permits?.length?`\nPERMITS (Shovels): ${permits.length} roofing permits in zip, ${permits.filter(x=>x.description?.toLowerCase().includes(prop.formattedAddress?.split(",")[0]?.trim().toLowerCase())||false).length} at this address`:"";
  const minedStr=mined?.slice(0,6).map(m=>m.label).join("\n")||"";
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
      messages:[{role:"user",content:`Expert roofing sales consultant. 5 sentences max. SPECIFIC & ACTIONABLE — reference actual data.\n\nPROPERTY: ${prop.formattedAddress}\n${prop.squareFootage}sf, ${prop.features?.floorCount||1} stories, built ${prop.yearBuilt}\nRoof: ${prop.features?.roofType||"?"} | Value: ${$(pv)}${sInfo}${pInfo}\nOwner: ${prop.owner?.names?.join(", ")||"Unknown"} | Occupied: ${prop.ownerOccupied}\n\nDATA INTELLIGENCE:\n${minedStr}\n\nBID: ${$(bid.total)} for ${cfg.material} ($${bid.psf}/sf) | ${bid.warranty}\n\nCover: 1) Lead with strongest data point 2) Competitive positioning 3) Specific upsell based on property 4) Create urgency from data 5) Recommended approach angle (door knock vs mail vs call)`}]})});
  const d=await res.json();return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("")||"";
}

    kx:{marginTop:12,background:`${w}0.02)`,border:`1px solid ${w}0.06)`,borderRadius:11,padding:14},
    ki:{width:"100%",padding:"10px 12px",borderRadius:8,border:`1px solid ${w}0.06)`,background:"rgba(0,0,0,0.3)",color:"#DDE3F0",fontSize:13,fontFamily:"inherit",outline:"none",marginTop:6},
    pp:{background:`${w}0.03)`,border:`1px solid ${w}0.06)`,borderRadius:12,padding:14,marginTop:12},
    pw:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${w}0.03)`,fontSize:13},
    cc:c=>({fontSize:10,padding:"2px 7px",borderRadius:3,background:c==="age"?"rgba(255,50,30,0.06)":c==="permit"||c==="ai"?"rgba(180,130,255,0.06)":c==="owner"?"rgba(30,200,120,0.06)":c==="assess"?"rgba(255,200,0,0.06)":c==="roof"?"rgba(255,85,0,0.06)":`${w}0.03)`,color:c==="age"?"#FF6B4A":c==="permit"||c==="ai"?"#B482FF":c==="owner"?"#1EC878":c==="assess"?"#FFD000":c==="roof"?"#FF8C00":"#5D6F95"}),
  };

  const cols=["#FF5500","#FF8C00","#FFD000","#1EC878","#509CFF","#B482FF","#FF6B9D","#6B7FA0"];
  const hasSol=!!solar?.solarPotential;const segs=solar?.solarPotential?.roofSegmentStats;const wr=solar?.solarPotential?.wholeRoofStats;
  const sc=sel?scoreProperty(sel):null;

  return(<div style={S.app}>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}input::placeholder{color:#3D4A6B}select option{background:#0D1117;color:#DDE3F0}*::-webkit-scrollbar{width:5px}*::-webkit-scrollbar-thumb{background:${w}0.08);border-radius:3px}`}</style>
    <div style={S.glow}/><div style={S.wr} className="riq-wrapper">
    {/* HDR */}
    <header style={S.hd}>
      <div style={S.logo}><I.Roof/><span style={S.lt}>RoofIQ</span><span style={S.tg}>v7 · Powered by BackyardOne + Gemini</span></div>
      <nav style={S.nv}>
        <button style={S.nb(view==="search")} onClick={()=>setView("search")}>Search</button>
        <button style={S.nb(view==="results")} onClick={()=>props.length&&setView("results")}>Results{props.length?` (${props.length})`:""}</button>
        <button style={S.nb(view==="bid")} onClick={()=>bid&&setView("bid")}>Bid</button>
        <button style={S.nb(view==="ads")} onClick={()=>sel&&bid&&setView("ads")}><I.Ad/> Ads</button>
        <span style={{width:1,height:20,background:`${w}0.08)`,margin:"0 4px"}}/>
        <button style={S.bs()} onClick={()=>setShowP(!showP)}><I.Fld/> Projects</button>
        {(sel||props.length>0)&&<button style={S.bs("linear-gradient(135deg,#FF5500,#E04A00)")} onClick={doSave}><I.Sv/> Save</button>}
      </nav>
    </header>
    {sMsg&&<div style={{...S.lb2,background:"rgba(30,200,120,0.06)",border:"1px solid rgba(30,200,120,0.15)",color:"#1EC878"}}><I.Chk/>{sMsg}</div>}

    {showP&&<div style={S.pp}>
      <div style={{display:"flex",gap:10,marginBottom:12}}><input style={{...S.ki,marginTop:0,flex:1}} placeholder="Project name" value={pName} onChange={e=>setPName(e.target.value)}/><button style={S.bs("linear-gradient(135deg,#FF5500,#E04A00)")} onClick={doSave}><I.Sv/> Save</button></div>
      {projs.length===0?<div style={{fontSize:12,color:"#3D4A6B"}}>No saved projects</div>:projs.map(p=><div key={p} style={S.pw}><span style={{fontWeight:700,cursor:"pointer"}} onClick={()=>doLoad(p)}>{p}</span><div style={{display:"flex",gap:6}}><button style={{...S.bs(),padding:"4px 8px"}} onClick={()=>doLoad(p)}>Load</button><button style={{...S.bs(),padding:"4px 8px",color:"#FF4444"}} onClick={()=>{store.del(p);store.list().then(setProjs);}}><I.Tr/></button></div></div>)}
    </div>}

    {/* ═══ SEARCH ═══ */}
    {view==="search"&&<div style={S.sc}>
      <h1 style={S.h1}>Measure. Score. Bid.<br/><span style={S.ac}>Win more roofs.</span></h1>
      <p style={S.sb}>Satellite measurement · Shovels.ai permits · Rentcast property intelligence · AI propensity scoring · Auto-bid engine.</p>
      <div style={S.sx}>
        <input style={S.ip} placeholder="Full address: Street, City, State, Zip" value={addr} onChange={e=>{setAddr(e.target.value);setZip("");}} onKeyDown={e=>e.key==="Enter"&&search()}/>
        <span style={{display:"flex",alignItems:"center",color:"#3D4A6B",fontSize:12,fontWeight:700}}>or</span>
        <input style={S.ips} placeholder="Zip" value={zip} maxLength={5} onChange={e=>{setZip(e.target.value);setAddr("");}} onKeyDown={e=>e.key==="Enter"&&search()}/>
        <button style={S.bt} onClick={search} disabled={loading}>{loading?<I.Spn/>:<><I.Search/> Search</>}</button>
      </div>
      {loading&&lm&&<div style={S.lb2}><I.Spn/>{lm}</div>}
      {err&&<div style={S.er}><I.Alrt/><div>{err}</div></div>}
      <div style={S.kx}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setShowKeys(!showKeys)}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><I.Sat/><span style={{fontSize:13,fontWeight:700,color:solKey?"#1EC878":"#6B7FA0"}}>{solKey?"✓ Solar API connected":"Add Google Solar API key (optional)"}</span></div>
          <span style={{fontSize:11,color:"#3D4A6B"}}>{showKeys?"▲":"▼"}</span>
        </div>
        {showKeys&&<div><input style={S.ki} type="password" placeholder="Google Cloud API key" value={solKey} onChange={e=>setSolKey(e.target.value)}/><div style={{fontSize:11,color:"#3D4A6B",marginTop:6,lineHeight:1.5}}>Enables satellite roof measurement. Without it, area is estimated + AI infers from property data.</div></div>}
      </div>
      <div style={S.ft}>
        {[{i:<I.Sat/>,t:"Satellite Measurement",d:"Google Solar API — area, pitch, azimuth per segment"},{i:<I.Prm/>,t:"Shovels.ai Permits",d:"180M permits — roofing history by zip & address"},{i:<I.Brn/>,t:"AI Permit Inference",d:"Predicts roof work from assessments, age, features"},{i:<I.Tgt/>,t:"Propensity Engine",d:"12 signals: tax trends, owner tenure, material life, permits"}].map((f,i)=><div key={i} style={S.fc}><div style={S.fi}>{f.i}</div><div style={{fontSize:12,fontWeight:800,marginBottom:3}}>{f.t}</div><div style={{fontSize:11,color:"#4D5A7B",lineHeight:1.4}}>{f.d}</div></div>)}
      </div>
    </div>}

    {/* ═══ RESULTS ═══ */}
    {view==="results"&&<div style={S.sc}>
      <button style={S.bk} onClick={()=>setView("search")}>← New search</button>
      <h2 style={{fontSize:22,fontWeight:800,margin:"0 0 3px"}}>{props.length} Properties</h2>
      <p style={{color:"#4D5A7B",fontSize:13,margin:"0 0 18px"}}>Ranked by replacement propensity · Click for full analysis</p>
      {[...props].sort((a,b)=>scoreProperty(b).score-scoreProperty(a).score).map((p,idx)=>{
        const{score,priority,reasons,mined}=scoreProperty(p);const v=p.lastSalePrice||p._assessedValue;
        return(<div key={p.id||idx} style={S.cd(hov===idx)} onClick={()=>pick(p)} onMouseEnter={()=>setHov(idx)} onMouseLeave={()=>setHov(null)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div><div style={{display:"flex",alignItems:"center",gap:9,marginBottom:3}}><I.Home/><span style={{fontSize:15,fontWeight:800}}>{p.formattedAddress||"—"}</span></div>
              <div style={{fontSize:12,color:"#4D5A7B"}}>{p.county?`${p.county} Co · `:""}{p.propertyType||""}{p.ownerOccupied?" · Owner-occupied":""}</div></div>
            <div style={{display:"flex",alignItems:"center",gap:9}}><span style={S.bg(priority)}>{priority==="HOT"?"🔥":priority==="WARM"?"⚡":"❄️"} {score}</span><I.Rt/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:8}}>
            {[{l:"Sq Ft",v:p.squareFootage?.toLocaleString()||"—"},{l:"Built",v:p.yearBuilt||"—"},{l:"Roof",v:p.features?.roofType||"—"},{l:"Stories",v:p.features?.floorCount||"1"},{l:"Value",v:v?$k(v):"—"},{l:"Est Roof",v:`${eRoof(p.squareFootage||2000,p.features?.floorCount||1).toLocaleString()} sf`}].map((m,i)=><div key={i}><div style={S.ml}>{m.l}</div><div style={S.mv}>{m.v}</div></div>)}
          </div>
          {p.owner&&<div style={{fontSize:11,color:"#5D6F95",marginBottom:5,display:"flex",alignItems:"center",gap:6}}><I.Usr/>{p.owner.names?.join(", ")||"—"}</div>}
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{reasons.slice(0,5).map((r,i)=><span key={i} style={S.cc(r.c)}>{r.t}</span>)}</div>
        </div>);
      })}
    </div>}

    {/* ═══ BID ═══ */}
    {view==="bid"&&sel&&bid&&<div style={S.sc}>
      <button style={S.bk} onClick={()=>setView("results")}>← Back</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
        <div><h2 style={{fontSize:22,fontWeight:800,margin:"0 0 3px"}}>Auto-Generated Bid</h2><div style={{fontSize:13,color:"#4D5A7B"}}>{sel.formattedAddress}</div></div>
        <span style={S.bg(sc.priority)}>Score: {sc.score}/100</span>
      </div>

      <div style={S.tt}>
        <div style={{fontSize:11,color:"#5D6F95",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:3}}>Total Bid Price</div>
        <div style={S.pr}>{$(bid.total)}</div>
        <div style={{fontSize:13,color:"#6B7FA0",marginTop:4}}>${bid.psf}/sf · {bid.roofArea.toLocaleString()} sf{hasSol?" (measured)":""} · {bid.warranty}<span style={S.tb(bid.tier)}>{bid.tier}</span></div>
        {hasSol&&<div style={{fontSize:11,color:"#1EC878",marginTop:6,fontWeight:700}}>📡 Satellite-measured roof</div>}
      </div>

      {/* Solar */}
      {hasSol&&<div style={S.so}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,fontWeight:800,fontSize:13,color:"#1EC878"}}><I.Sat/> Satellite Roof Measurement</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12,marginBottom:8}}>
          <div><div style={S.ml}>Total</div><div style={S.mv}>{m2s(wr?.areaMeters2||0).toLocaleString()} sf</div></div>
          <div><div style={S.ml}>Ground</div><div style={S.mv}>{m2s(wr?.groundAreaMeters2||0).toLocaleString()} sf</div></div>
          <div><div style={S.ml}>Segments</div><div style={S.mv}>{segs?.length||0}</div></div>
          <div><div style={S.ml}>Quality</div><div style={S.mv}>{solar.imageryQuality||"—"}</div></div>
        </div>
        {segs?.length>0&&<><div style={{display:"flex",height:24,borderRadius:6,overflow:"hidden",marginBottom:8}}>{segs.map((sg,i)=>{const p=(sg.stats?.areaMeters2||0)/(segs.reduce((a,s)=>a+(s.stats?.areaMeters2||0),0))*100;return p<1?null:<div key={i} title={`Seg ${i+1}`} style={{width:`${p}%`,background:cols[i%8],display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"rgba(0,0,0,0.6)"}}>{p>8?`${Math.round(p)}%`:""}</div>;})}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(165px,1fr))",gap:6}}>{segs.slice(0,8).map((sg,i)=><div key={i} style={{background:"rgba(0,0,0,0.2)",borderRadius:7,padding:"8px 10px",borderLeft:`3px solid ${cols[i%8]}`}}><div style={{fontSize:10,fontWeight:800,color:cols[i%8]}}>SEG {i+1}</div><div style={{fontSize:14,fontWeight:800}}>{m2s(sg.stats?.areaMeters2||0).toLocaleString()} sf</div><div style={{fontSize:11,color:"#6B7FA0"}}>{(sg.pitchDegrees||0).toFixed(1)}° ({pRat(sg.pitchDegrees||0)}) · {azD(sg.azimuthDegrees||0)}</div></div>)}</div></>}
      </div>}

      {/* Permits */}
      {permits.length>0&&<div style={S.pm}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,fontWeight:800,fontSize:13,color:"#B482FF"}}><I.Prm/> Shovels.ai Permit Data — {permits.length} roofing permits in zip</div>
        {permits.slice(0,8).map((pm,i)=><div key={i} style={S.cr}><span style={{color:"#8DA4C8",flex:1}}>{pm.description?.slice(0,80)||pm.tags?.join(", ")||"Roofing permit"}</span><span style={{fontWeight:700,whiteSpace:"nowrap"}}>{pm.file_date||pm.issue_date||"—"}{pm.jurisdiction?` · ${pm.jurisdiction}`:""}</span></div>)}
        {permits.length>8&&<div style={{fontSize:11,color:"#4D5A7B",marginTop:6}}>+ {permits.length-8} more permits</div>}
      </div>}

      {/* Owner */}
      {sel.owner&&<div style={{...S.cs,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,fontWeight:800,fontSize:13}}><I.Usr/> Owner</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {sel.owner.names&&<div><div style={S.ml}>Name</div><div style={S.mv}>{sel.owner.names.join(", ")}</div></div>}
          {sel.ownerOccupied!=null&&<div><div style={S.ml}>Occupied</div><div style={S.mv}>{sel.ownerOccupied?"Yes":"No (Absentee)"}</div></div>}
          {sel.lastSaleDate&&<div><div style={S.ml}>Purchased</div><div style={S.mv}>{new Date(sel.lastSaleDate).toLocaleDateString()} ({$(sel.lastSalePrice||0)})</div></div>}
          {sel.owner.mailingAddress&&<div><div style={S.ml}>Mailing</div><div style={S.mv}>{typeof sel.owner.mailingAddress==="object"?Object.values(sel.owner.mailingAddress).filter(Boolean).join(", "):sel.owner.mailingAddress}</div></div>}
        </div>
      </div>}

      {/* Good/Better/Best */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        {["3-Tab Asphalt","Architectural Shingle","Premium Designer"].map(mat=>{const m=MATS[mat],b=calcBid(bid.roofArea,mat,cfg.complexity,cfg.pitch,cfg),a=cfg.material===mat;
          return<div key={mat} style={{background:a?`${o}0.06)`:`${w}0.015)`,border:`1px solid ${a?`${o}0.25)`:`${w}0.04)`}`,borderRadius:11,padding:14,cursor:"pointer",textAlign:"center"}} onClick={()=>setCfg(c=>({...c,material:mat}))}>
            <div style={{fontSize:10,fontWeight:800,color:a?"#FF6B1A":"#4D5A7B",textTransform:"uppercase",marginBottom:4}}>{m.tier}</div>
            <div style={{fontSize:22,fontWeight:900,color:a?"#FF6B1A":"#8DA4C8",marginBottom:2}}>{$(b.total)}</div>
            <div style={{fontSize:11,color:"#4D5A7B"}}>{mat}</div><div style={{fontSize:10,color:"#3D4A6B",marginTop:2}}>{m.warranty}</div>
          </div>;})}
      </div>

      {/* Valuation */}
      {val&&<div style={S.vl}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8,fontWeight:800,fontSize:13,color:"#509CFF"}}><I.Dol/> AVM</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:8}}>
          <div><div style={S.ml}>Est</div><div style={S.mv}>{$(val.price)}</div></div>
          <div><div style={S.ml}>Low</div><div style={S.mv}>{$(val.priceRangeLow)}</div></div>
          <div><div style={S.ml}>High</div><div style={S.mv}>{$(val.priceRangeHigh)}</div></div>
        </div>
        {val.comparables?.slice(0,3).map((c,i)=><div key={i} style={S.cr}><span>{c.formattedAddress}</span><span style={{fontWeight:700,color:"#8DA4C8"}}>{$(c.price)}</span></div>)}
      </div>}

      {/* Config */}
      <div style={S.cs}>
        <div style={{fontSize:13,fontWeight:800,marginBottom:12,display:"flex",alignItems:"center",gap:7}}><I.Roof/> Configuration</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={S.lb}>Material</label><select style={S.sl} value={cfg.material} onChange={e=>setCfg(c=>({...c,material:e.target.value}))}>{Object.entries(MATS).map(([k,v])=><option key={k}>{k}</option>)}</select></div>
          <div><label style={S.lb}>Complexity</label><select style={S.sl} value={cfg.complexity} onChange={e=>setCfg(c=>({...c,complexity:e.target.value}))}>{Object.entries(COMP).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></div>
          <div><label style={S.lb}>Pitch</label><select style={S.sl} value={cfg.pitch} onChange={e=>setCfg(c=>({...c,pitch:e.target.value}))}>{Object.entries(PITCH).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}</select></div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={S.lb}>Add-Ons</label>
            {[{k:"tearOff",l:"Tear-off"},{k:"iceShield",l:"Ice shield"},{k:"gutters",l:"Gutters"}].map(x=><div key={x.k} style={S.tl(cfg[x.k])} onClick={()=>setCfg(c=>({...c,[x.k]:!c[x.k]}))}><div style={S.dt(cfg[x.k])}>{cfg[x.k]&&<I.Chk/>}</div><span style={{fontSize:12,fontWeight:700,color:cfg[x.k]?"#DDE3F0":"#4D5A7B"}}>{x.l}</span></div>)}
          </div>
        </div>
      </div>

      {/* Cost */}
      <div style={{...S.cs,marginTop:8}}>
        <div style={{fontSize:13,fontWeight:800,marginBottom:8}}><I.Dol/> Breakdown</div>
        {[{l:`Materials — ${cfg.material}`,v:bid.mc},{l:`Labor`,v:bid.lc},bid.to>0&&{l:"Tear-off",v:bid.to},{l:"Underlayment",v:bid.un},bid.ic>0&&{l:"Ice shield",v:bid.ic},bid.gu>0&&{l:"Gutters",v:bid.gu},{l:"Dumpster",v:bid.dump},{l:"Permits",v:bid.perm}].filter(Boolean).map((x,i)=><div key={i} style={S.ln}><span style={{color:"#6B7FA0"}}>{x.l}</span><span style={{fontWeight:700}}>{$(x.v)}</span></div>)}
        <div style={{...S.ln,color:"#4D5A7B",fontSize:12,borderBottom:"none"}}><span>Sub</span><span>{$(bid.sub)}</span></div>
        <div style={{...S.ln,color:"#4D5A7B",fontSize:12}}><span>OH 15%</span><span>{$(bid.oh)}</span></div>
        <div style={{...S.ln,borderBottom:`2px solid ${o}0.2)`,paddingBottom:12}}><span style={{fontWeight:800,color:"#FF6B1A"}}>Profit 20%</span><span style={{fontWeight:800,color:"#FF6B1A"}}>{$(bid.pr)}</span></div>
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,fontSize:17,fontWeight:900}}><span>TOTAL</span><span style={{color:"#FF5500"}}>{$(bid.total)}</span></div>
      </div>

      {/* AI */}
      <div style={S.ai}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7,fontWeight:800,color:"#509CFF",fontSize:12}}><I.Zap/> AI Sales Strategy</div>
        {aiL?<div style={{display:"flex",alignItems:"center",gap:7,color:"#4D5A7B"}}><I.Spn/>{lm||"Generating..."}</div>:<div style={{whiteSpace:"pre-wrap"}}>{ai||"..."}</div>}
      </div>

      {/* Generate Ads CTA */}
      <button onClick={()=>setView("ads")} style={{width:"100%",padding:"16px",borderRadius:12,border:`1px solid ${o}0.2)`,background:`linear-gradient(135deg,${o}0.06),rgba(255,140,0,0.02))`,cursor:"pointer",fontFamily:"inherit",marginTop:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
        <I.Ad/><span style={{fontSize:14,fontWeight:800,color:"#FF6B1A"}}>Generate Targeted Ads</span><span style={{fontSize:12,color:"#4D5A7B"}}>— Sniper · Neighborhood · Conquest</span>
      </button>

      {/* Propensity detail */}
      <div style={{...S.cs,marginTop:12}}>
        <div style={{fontSize:13,fontWeight:800,marginBottom:10}}><I.Tgt/> Replacement Propensity</div>
        {sc.reasons.map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:13,borderBottom:`1px solid ${w}0.02)`}}>
          <span style={S.cc(r.c)}>{r.t}</span><span style={{fontSize:11,fontWeight:800,color:r.w>0?"#1EC878":r.w<0?"#FF4444":"#3D4A6B"}}>{r.w>0?"+":""}{r.w}</span>
        </div>)}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,fontSize:14,fontWeight:800}}><span>Total</span><span style={{color:sc.priority==="HOT"?"#FF3B1E":sc.priority==="WARM"?"#FF8C00":"#509CFF"}}>{sc.score}/100 ({sc.priority})</span></div>
      </div>

      {/* Rentcast deep data */}
      <div style={{...S.cs,marginTop:12}}>
        <div style={{fontSize:13,fontWeight:800,marginBottom:10}}><I.Home/> Rentcast Property Intelligence</div>

// Storage polyfill for non-Claude environments
if (!window.storage) {
  const _store = {};
  window.storage = {
    get: async (k) => { const v = localStorage.getItem(k); return v ? { key: k, value: v } : (() => { throw new Error('not found'); })(); },
    set: async (k, v) => { localStorage.setItem(k, v); return { key: k, value: v }; },
    delete: async (k) => { localStorage.removeItem(k); return { key: k, deleted: true }; },
    list: async (prefix) => { const keys = []; for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); if (!prefix || k.startsWith(prefix)) keys.push(k); } return { keys }; },
  };
}
