<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1a2332;--green:#00e676;--green2:#00c853;--blue:#448aff;--cyan:#00e5ff;--gold:#ffd740;--white:#e0e0e0;--dim:#607080;--red:#ff5252}
body{background:var(--bg);color:var(--white);font-family:'SF Mono','Fira Code','Cascadia Code',monospace;font-size:13px;line-height:1.4}
a{color:var(--green)}

::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
.container{max-width:1600px;margin:0 auto;padding:16px}
header{border-bottom:1px solid #1e2d3d;padding-bottom:16px;margin-bottom:16px}
h1{font-size:28px;color:var(--green);letter-spacing:4px;font-weight:700}
h1 span{color:var(--dim);font-size:14px;letter-spacing:1px;display:block;margin-top:4px}
.stats-bar{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid #1e2d3d;padding:8px 16px;border-radius:4px;font-size:12px}
.stat b{color:var(--green)}
.filters{background:var(--bg2);border:1px solid #1e2d3d;padding:12px;border-radius:4px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filters input[type=text]{background:var(--bg);border:1px solid #1e2d3d;color:var(--white);padding:8px 12px;border-radius:4px;font-family:inherit;font-size:13px;width:260px}
.filters input:focus{outline:none;border-color:var(--green)}
.filter-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.filter-group label{color:var(--dim);font-size:11px;margin-right:4px}
.fbtn{background:var(--bg);border:1px solid #1e2d3d;color:var(--dim);padding:5px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:11px;transition:.2s}
.fbtn:hover,.fbtn.active{color:var(--green);border-color:var(--green)}
select{background:var(--bg);border:1px solid #1e2d3d;color:var(--white);padding:6px 8px;border-radius:4px;font-family:inherit;font-size:12px}
select:focus{outline:none;border-color:var(--green)}
.showing{color:var(--dim);font-size:12px;margin-bottom:8px}
.showing b{color:var(--green)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--bg2);color:var(--green);padding:8px 10px;text-align:left;font-size:11px;letter-spacing:1px;cursor:pointer;user-select:none;border-bottom:1px solid #1e2d3d;white-space:nowrap;position:sticky;top:0;z-index:2}
thead th:hover{color:#fff}
thead th .arrow{margin-left:4px;font-size:9px}
tbody tr{border-bottom:1px solid #0f1520;cursor:pointer;transition:.15s}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:7px 10px;font-size:12px;white-space:nowrap}
.op-LN{color:var(--green)}
.op-AEG{color:var(--blue)}
.op-OVG{color:var(--cyan)}
.op-MSG{color:var(--gold)}
.op-IND{color:var(--white)}
.tier-badge{padding:2px 6px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:.5px}
.tier-CLUB{background:#1b5e20;color:#a5d6a7}
.tier-THEATER{background:#0d47a1;color:#90caf9}
.tier-MID{background:#4a148c;color:#ce93d8}
.tier-ARENA{background:#b71c1c;color:#ef9a9a}
.tier-STADIUM{background:#e65100;color:#ffcc80}
.detail-row td{padding:0!important}
.detail-content{padding:12px 20px;background:var(--bg3);border-left:3px solid var(--green);font-size:12px;line-height:1.6}
.detail-content .dl{display:grid;grid-template-columns:120px 1fr;gap:4px 12px}
.detail-content .dl dt{color:var(--dim)}
.detail-content .dl dd{color:var(--white)}
.table-wrap{max-height:600px;overflow:auto;border:1px solid #1e2d3d;border-radius:4px;margin-bottom:24px}
.section-title{color:var(--green);font-size:16px;letter-spacing:2px;margin:24px 0 12px;border-bottom:1px solid #1e2d3d;padding-bottom:8px}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:16px}
.market-card{background:var(--bg2);border:1px solid #1e2d3d;padding:10px;border-radius:4px}
.market-card h4{color:var(--green);font-size:13px;margin-bottom:4px}
.market-card .mc-stat{color:var(--dim);font-size:11px}
.bar-chart{margin-bottom:16px}
.bar-row{display:flex;align-items:center;margin-bottom:4px}
.bar-label{width:140px;font-size:11px;color:var(--dim);text-align:right;padding-right:8px;white-space:nowrap;overflow:hidden}
.bar-fill{height:18px;border-radius:2px;display:flex;align-items:center;padding-left:6px;font-size:10px;color:var(--bg);font-weight:700;min-width:20px;transition:.3s}
.tour-section{background:var(--bg2);border:1px solid #1e2d3d;padding:16px;border-radius:4px}
.tour-section input,.tour-section select{margin-right:8px;margin-bottom:8px}

.gen-btn{background:var(--green);color:var(--bg);border:none;padding:8px 20px;border-radius:4px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px}
.gen-btn:hover{background:var(--green2)}
.gen-btn:disabled{opacity:.5;cursor:wait}
#tourResult{margin-top:12px;padding:12px;background:var(--bg);border:1px solid #1e2d3d;border-radius:4px;white-space:pre-wrap;font-size:12px;line-height:1.6;display:none;max-height:500px;overflow:auto}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}.filters{flex-direction:column}.table-wrap{max-height:none}}
</style>
</head>

</div>

<div class="showing" id="showCount"></div>
<div class="table-wrap">

<tbody id="tbody"></tbody>
</table>
</div>

<div>

<div class="bar-chart" id="opBars"></div>
</div>
</div>
<div class="section-title">STATE COVERAGE</div>
<div class="market-grid" id="stateGrid"></div>

<div class="section-title">TOUR ROUTING INTELLIGENCE</div>

<div id="tourResult"></div>
</div>
</div>

// Deduplicate by name (keep first occurrence)
const seen=new Set();const V=VENUES.filter(v=>{const k=v.name;if(seen.has(k))return false;seen.add(k);return true;});
V.forEach((v,i)=>v.id=i+1);

// State & filter state
let filters={search:'',op:'',tp:'',tr:'',st:''};
let sortCol='name',sortDir=1;
let expandedId=null;

const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

function init(){
  // Populate state dropdown
  const states=[...new Set(V.map(v=>v.state))].sort();
  const sel=$('#stateF');
  states.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
  // Stats
  $('#sTot').textContent=V.length;
  const markets=[...new Set(V.map(v=>v.market))];
  $('#sMkt').textContent=markets.length;
  $('#sSt').textContent=states.length;
  // Events
  $('#search').addEventListener('input',e=>{filters.search=e.target.value.toLowerCase();render();});
  $$('.fbtn').forEach(b=>b.addEventListener('click',e=>{
    const f=b.dataset.f,v=b.dataset.v;
    $$(`.fbtn[data-f="${f}"]`).forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    filters[f]=v;render();
  }));
  $('#stateF').addEventListener('change',e=>{filters.st=e.target.value;render();});
  $$('thead th').forEach(th=>th.addEventListener('click',()=>{
    const c=th.dataset.col;if(!c)return;
    if(sortCol===c)sortDir*=-1;else{sortCol=c;sortDir=1;}
    render();
  }));
  $('#genRoute').addEventListener('click',generateRoute);
  render();
  renderAnalysis();
}

function getFiltered(){
  return V.filter(v=>{
    if(filters.search){
      const s=filters.search;
      if(!v.name.toLowerCase().includes(s)&&!v.city.toLowerCase().includes(s)&&!v.state.toLowerCase().includes(s))return false;
    }
    if(filters.op&&v.operator!==filters.op)return false;
    if(filters.tp&&v.type!==filters.tp)return false;
    if(filters.tr&&v.tier!==filters.tr)return false;
    if(filters.st&&v.state!==filters.st)return false;
    return true;
  });
}

function render(){
  const f=getFiltered();
  f.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(typeof av==='string')av=av.toLowerCase();
    if(typeof bv==='string')bv=bv.toLowerCase();
    if(av<bv)return -1*sortDir;if(av>bv)return sortDir;return 0;
  });
  $('#showCount').innerHTML=`Showing <b>${f.length}</b> of <b>${V.length}</b> venues`;
  const tbody=$('#tbody');
  const opClass=o=>o==='LIVE_NATION'?'op-LN':o==='AEG'?'op-AEG':o==='OVG'?'op-OVG':o==='MSG'?'op-MSG':'op-IND';
  const opLabel=o=>o==='LIVE_NATION'?'Live Nation':o;
  let html='';
  f.forEach(v=>{
    html+=`<tr data-id="${v.id}" onclick="toggleRow(${v.id})">
      <td class="${opClass(v.operator)}">${v.name}</td>
      <td>${v.city}</td><td>${v.state}</td>
      <td>${v.capacity.toLocaleString()}</td>
      <td><span class="tier-badge tier-${v.tier}">${v.tier}</span></td>
      <td class="${opClass(v.operator)}">${opLabel(v.operator)}</td>
      <td>${v.type}</td></tr>`;
    if(expandedId===v.id){
      const route=v.capacity<2000?'D':v.capacity<5000?'C':v.capacity<15000?'B':'A';
      html+=`<tr class="detail-row"><td colspan="7"><div class="detail-content">
        <div class="dl">
          <dt>Market Region</dt><dd>${v.market}</dd>
          <dt>Capacity</dt><dd>${v.capacity.toLocaleString()}</dd>
          <dt>Routing Tier</dt><dd>${route} (${route==='A'?'Major/Headliner':route==='B'?'Support/Mid-Level':route==='C'?'Developing/Club':'Emerging/Showcase'})</dd>
          <dt>Notes</dt><dd>${v.notes}</dd>
        </div></div></td></tr>`;
    }
  });
  tbody.innerHTML=html;
}

window.toggleRow=function(id){expandedId=expandedId===id?null:id;render();};

function renderAnalysis(){
  // Top states
  const stateCounts={};V.forEach(v=>{stateCounts[v.state]=(stateCounts[v.state]||0)+1;});
  const top=Object.entries(stateCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxC=top[0]?top[0][1]:1;
  let bh='';
  top.forEach(([st,c])=>{
    bh+=`<div class="bar-row"><div class="bar-label">${st}</div><div class="bar-fill" style="width:${c/maxC*100}%;background:var(--green)">${c}</div></div>`;
  });
  $('#marketBars').innerHTML=bh;

  // Operator share
  const opCounts={};V.forEach(v=>{opCounts[v.operator]=(opCounts[v.operator]||0)+1;});
  const ops=Object.entries(opCounts).sort((a,b)=>b[1]-a[1]);
  const maxO=ops[0]?ops[0][1]:1;
  const opColors={LIVE_NATION:'var(--green)',AEG:'var(--blue)',OVG:'var(--cyan)',MSG:'var(--gold)',INDEPENDENT:'var(--white)'};
  let oh='';
  ops.forEach(([op,c])=>{
    const label=op==='LIVE_NATION'?'Live Nation':op;
    oh+=`<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-fill" style="width:${c/maxO*100}%;background:${opColors[op]||'var(--white)'}">${c}</div></div>`;
  });
  $('#opBars').innerHTML=oh;

  // State grid
  const stateEntries=Object.entries(stateCounts).sort((a,b)=>b[1]-a[1]);
  let sg='';
  stateEntries.forEach(([st,c])=>{
    const totalCap=V.filter(v=>v.state===st).reduce((s,v)=>s+v.capacity,0);
    sg+=`<div class="market-card"><h4>${st}</h4><div class="mc-stat">${c} venues · ${(totalCap/1000).toFixed(0)}K total capacity</div></div>`;
  });
  $('#stateGrid').innerHTML=sg;
}

async function generateRoute(){
  const artist=$('#tArtist').value.trim();
  const shows=$('#tShows').value||'20';
  const tier=$('#tTier').value;
  const region=$('#tRegion').value;
  if(!artist){alert('Enter artist name');return;}
  const btn=$('#genRoute');const res=$('#tourResult');
  btn.disabled=true;btn.textContent='GENERATING...';res.style.display='block';res.textContent='Querying touring intelligence...';

  const filtered=getFiltered();
  const venueList=filtered.slice(0,80).map(v=>`${v.name} (${v.city}, ${v.state}) - ${v.capacity.toLocaleString()} cap - ${v.type}`).join('\n');

  const prompt=`Generate an optimal ${shows}-date tour routing for ${artist}.
${tier?`Preferred venue tier: ${tier}`:''}
${region&&region!=='National'?`Focus region: ${region}`:'National tour'}

Available venues from our database:
${venueList}

Provide a numbered routing with:
1. City/Market → Recommended Venue → Capacity
Include routing logic (geographic efficiency, market spacing, day-of-week optimization).
End with total estimated capacity reach and routing notes.`;

  try{
    const r=await fetch('https://awareness-proxy-328246068140.us-central1.run.app/gemini/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        system_instruction:{parts:[{text:"You are a professional touring consultant with expertise in venue routing, ticket scaling, and live music economics. Provide specific, actionable tour routing advice based on capacity tiers, market demographics, and promoter relationships."}]}
      })
    });
    const d=await r.json();
    const text=d?.candidates?.[0]?.content?.parts?.[0]?.text||'No response generated.';
    res.textContent=text;
  }catch(e){res.textContent='Error: '+e.message;}
  btn.disabled=false;btn.textContent='GENERATE ROUTE';
}

init();
</script>
