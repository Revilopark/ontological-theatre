<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Clawd</title>
<style>
:root {
  --ink:#0a0a14; --navy:#12122a; --card:#1a1a30;
  --fire:#e94560; --gold:#d4a017; --teal:#16a596;
  --purple:#7b2fff; --white:#f0eefc; --muted:#6a6a8a;
  --border:rgba(255,255,255,0.07);
  --oracle:#7b2fff; --ally:#16a596; --spark:#e94560;
  --builder:#d4a017; --scout:#1d9bf0; --mirror:#c084fc;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--ink);font-family:-apple-system,'SF Pro Display',sans-serif;}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;}

/* ── HEADER ── */
.header{
  background:rgba(10,10,20,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:12px 16px;flex-shrink:0;position:relative;z-index:10;
}
.header-top{display:flex;align-items:center;gap:12px;}
.persona-avatar{
  width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;position:relative;flex-shrink:0;
  background:linear-gradient(135deg,var(--persona-color,var(--teal)),rgba(0,0,0,0.3));
  border:2px solid var(--persona-color,var(--teal));
  box-shadow:0 0 12px var(--persona-color,var(--teal));
}
.persona-info{flex:1;min-width:0;}
.persona-name{font-size:0.95rem;font-weight:600;color:var(--white);letter-spacing:0.3px;}
.persona-tagline{font-size:0.72rem;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-actions{display:flex;gap:8px;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.06);border:none;color:var(--muted);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.icon-btn:hover,.icon-btn:active{background:rgba(255,255,255,0.12);color:var(--white);}

/* ── PERSONA SWITCHER ── */
.persona-bar{
  display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;flex-shrink:0;
}
.persona-bar::-webkit-scrollbar{display:none;}
.persona-chip{
  display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
  cursor:pointer;white-space:nowrap;scroll-snap-align:start;transition:all 0.2s;flex-shrink:0;
  font-size:0.78rem;color:var(--muted);
}
.persona-chip.active{border-color:var(--chip-color);background:rgba(255,255,255,0.1);color:var(--white);}
.persona-chip.active .chip-dot{background:var(--chip-color);box-shadow:0 0 6px var(--chip-color);}
.chip-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all 0.2s;}

/* ── MESSAGES ── */
#messages{
  flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:3px;}
#messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

.msg{display:flex;flex-direction:column;max-width:85%;animation:popin 0.25s ease;}
@keyframes popin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.ai{align-self:flex-start;align-items:flex-start;}

.msg-bubble{
  padding:10px 14px;border-radius:18px;font-size:0.9rem;line-height:1.5;word-break:break-word;
}
.msg.user .msg-bubble{
  background:var(--persona-color,var(--teal));color:#fff;border-bottom-right-radius:4px;
}
.msg.ai .msg-bubble{
  background:var(--card);color:var(--white);border-bottom-left-radius:4px;
  border:1px solid var(--border);
}
.msg-meta{font-size:0.62rem;color:var(--muted);margin-top:3px;padding:0 4px;}

/* Typing indicator */
.typing-bubble{
  background:var(--card);border:1px solid var(--border);padding:12px 16px;
  border-radius:18px;border-bottom-left-radius:4px;display:inline-flex;gap:4px;align-items:center;
}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}

/* Formatted text */
.msg-bubble strong,.msg-bubble b{color:var(--persona-color,var(--teal));font-weight:700;}
.msg-bubble em,.msg-bubble i{color:var(--muted);font-style:italic;}

/* ── INPUT ── */
.input-area{
  background:rgba(10,10,20,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));
  flex-shrink:0;display:flex;align-items:flex-end;gap:8px;
}
#msgInput{
  flex:1;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:22px;
  color:var(--white);padding:10px 16px;font-size:0.9rem;font-family:inherit;
  outline:none;resize:none;max-height:120px;line-height:1.4;transition:border-color 0.2s;
}
#msgInput:focus{border-color:rgba(255,255,255,0.2);}
#msgInput::placeholder{color:var(--muted);}
.send-btn{
  width:44px;height:44px;border-radius:50%;border:none;
  background:var(--persona-color,var(--teal));color:#fff;font-size:1.1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;box-shadow:0 0 12px rgba(0,0,0,0.3);
}
.send-btn:hover{transform:scale(1.05);}
.send-btn:active{transform:scale(0.97);}
.send-btn:disabled{opacity:0.4;transform:none;}

/* ── MODE BAR ── */
.mode-bar{
  display:flex;gap:6px;padding:0 16px 6px;flex-shrink:0;
}
.mode-chip{
  font-size:0.68rem;padding:4px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);
  color:var(--muted);cursor:pointer;transition:all 0.2s;background:transparent;
}
.mode-chip.active{border-color:var(--persona-color,var(--teal));color:var(--persona-color,var(--teal));background:rgba(255,255,255,0.04);}

/* ── SIDEBAR / SETTINGS ── */
.sidebar{
  position:absolute;top:0;right:0;bottom:0;width:280px;
  background:#0d0d1f;border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform 0.3s ease;z-index:100;overflow-y:auto;
}
.sidebar.open{transform:translateX(0);}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
.sidebar-header h3{font-size:1rem;font-weight:600;color:var(--white);}
.sidebar-header p{font-size:0.72rem;color:var(--muted);margin-top:4px;}
.sidebar-section{padding:16px;}
.sidebar-section h4{font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.sidebar-item{
  padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:background 0.15s;margin-bottom:4px;
}
.sidebar-item:hover,.sidebar-item.active{background:rgba(255,255,255,0.06);}
.sidebar-item .si-icon{font-size:1.1rem;width:32px;text-align:center;}
.sidebar-item .si-label{font-size:0.85rem;color:var(--white);}
.sidebar-item .si-sub{font-size:0.7rem;color:var(--muted);margin-top:1px;}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.skill-card{
  padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;
  text-align:center;transition:all 0.2s;background:rgba(255,255,255,0.02);
}
.skill-card.active{border-color:var(--persona-color,var(--teal));background:rgba(255,255,255,0.06);}
.skill-card .sk-emoji{font-size:1.4rem;}
.skill-card .sk-name{font-size:0.7rem;color:var(--muted);margin-top:4px;}
.sidebar-divider{height:1px;background:var(--border);margin:8px 0;}
.clear-btn{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(233,69,96,0.3);background:transparent;color:var(--fire);font-size:0.82rem;cursor:pointer;transition:all 0.2s;}
.clear-btn:hover{background:rgba(233,69,96,0.1);}

/* ── OVERLAY ── */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:none;}
.overlay.show{display:block;}

/* ── WELCOME ── */
.welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px 24px;flex:1;gap:16px;
}
.welcome-logo{font-size:3rem;margin-bottom:8px;}
.welcome h2{font-size:1.4rem;font-weight:600;color:var(--white);}
.welcome p{font-size:0.88rem;color:var(--muted);line-height:1.6;max-width:300px;}
.welcome-start{
  padding:12px 32px;border-radius:24px;background:var(--teal);border:none;color:#fff;
  font-size:0.95rem;font-weight:600;cursor:pointer;margin-top:8px;
  box-shadow:0 0 20px rgba(22,165,150,0.3);transition:all 0.2s;
}
.welcome-start:hover{transform:scale(1.03);}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="persona-avatar" id="personaAvatar">🤝</div>
      <div class="persona-info">
        <div class="persona-name" id="personaName">The Ally</div>
        <div class="persona-tagline" id="personaTagline">In your corner. Always.</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleSidebar()" title="Settings">⚙️</button>
      </div>
    </div>
  </div>

  <!-- PERSONA BAR -->
  <div class="persona-bar" id="personaBar"></div>

  <!-- MODE BAR -->
  <div class="mode-bar">
    <button class="mode-chip" id="modeBalanced" onclick="setAxis('balanced')">⚖️ Balanced</button>
    <button class="mode-chip" id="modeLogic" onclick="setAxis('logic')">🧠 Logic</button>
    <button class="mode-chip" id="modeEmotion" onclick="setAxis('emotion')">💙 Empathy</button>
  </div>

  <!-- MESSAGES -->
  <div id="messages"></div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea id="msgInput" placeholder="Message Clawd…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

  <!-- SIDEBAR -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>Clawd Settings</h3>
      <p>Personal AI · Trinity Graph</p>
    </div>

    <div class="sidebar-section">
      <h4>Persona</h4>
      <div id="sidebarPersonas"></div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <h4>Skill Pack</h4>
      <div class="skill-grid" id="skillGrid"></div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <h4>Memory</h4>
      <div style="font-size:0.78rem;color:var(--muted);line-height:1.6;" id="memoryDisplay">Loading…</div>
    </div>

    <div class="sidebar-section">
      <button class="clear-btn" onclick="clearConversation()">Clear conversation</button>
    </div>
  </div>

</div>

<script>
const PROXY = 'https://awareness-proxy-328246068140.us-central1.run.app/gemini/generate';

// ── PERSONAS ─────────────────────────────────────────────────────────────────
const PERSONAS = {
  ally:    { name:'The Ally',    emoji:'🤝', color:'#16a596', tagline:'In your corner. Always.',      axis:'emotion' },
  oracle:  { name:'The Oracle',  emoji:'🔮', color:'#7b2fff', tagline:'Deep knowledge, clear answers.', axis:'logic'  },
  spark:   { name:'The Spark',   emoji:'⚡', color:'#e94560', tagline:'Ideas that catch fire.',         axis:'emotion' },
  builder: { name:'The Builder', emoji:'🔧', color:'#d4a017', tagline:'From idea to done.',             axis:'logic'  },
  scout:   { name:'The Scout',   emoji:'🔭', color:'#1d9bf0', tagline:'See further. Find faster.',      axis:'logic'  },
  mirror:  { name:'The Mirror',  emoji:'🪞', color:'#c084fc', tagline:'Know yourself better.',          axis:'emotion' },
};

const SKILLS = {
  cooking:  { name:'Cooking',  emoji:'🍳' },
  fitness:  { name:'Fitness',  emoji:'💪' },
  creative: { name:'Writing',  emoji:'✍️' },
  travel:   { name:'Travel',   emoji:'✈️' },
  money:    { name:'Money',    emoji:'💰' },
};

const SKILL_PROMPTS = {
  cooking:  'You have deep cooking expertise: techniques, flavor pairing, ingredient substitutions, dietary adaptations, global cuisines. Give exact temperatures and ratios.',
  fitness:  'You have deep fitness expertise: strength training, periodization, cardio zones, nutrition basics, injury prevention, habit formation. Always ask about level and equipment first.',
  creative: 'You have deep creative writing expertise: narrative structure, character, dialogue, prose style, genre, revision, and the business of writing. Give line-level feedback when asked.',
  travel:   'You are a deeply experienced travel advisor: visas, local customs, budget optimization, points/miles, itinerary pacing, safety, specific recommendations with names and costs.',
  money:    'You have solid personal finance knowledge: budgeting, debt payoff, investing basics, tax-advantaged accounts, insurance, credit. Note when professional advice is warranted. Be direct about numbers.',
};

const PERSONA_VOICES = {
  ally:    'You are The Ally — warm, honest, empathetic. You understand relationships and emotions. You validate without reinforcing bad patterns. Ask one good question rather than flood with advice. You\'re direct but always leading with care.',
  oracle:  'You are The Oracle — a synthesizer of knowledge. You find patterns, surface the thing the user didn\'t know to ask. Structure: principle → evidence → implication. Direct, never condescending. Say when you don\'t know.',
  spark:   'You are The Spark — creative, rapid-fire, playful. You don\'t just generate ideas — you generate the RIGHT ones at the right scale. Push further when something is almost great. Know the difference between derivative and genuinely new.',
  builder: 'You are The Builder — practical, execution-focused. You turn intentions into plans and plans into checklists. Think in systems, timelines, dependencies. Ask "what\'s the next physical action?" before anything else.',
  scout:   'You are The Scout — discovery and research. You find what\'s missing, what\'s better, what the careful second look reveals. Lateral thinking. Concrete outputs: specific names, numbers, options to compare.',
  mirror:  'You are The Mirror — reflective, precise, gentle. You help people see their own patterns, the gap between what they say they want and what they\'re doing. Rarely give advice directly. Ask the question they were avoiding.',
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const MEM_KEY = 'clawd_state';
let state = {
  persona:   'ally',
  axis:      'balanced',
  skill:     null,
  name:      '',
  notes:     [],
  history:   [],   // [{role, content}] — last 12
  turnCount: 0,
};

function loadState() {
  try {
    const saved = localStorage.getItem(MEM_KEY);
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch {}
}

function saveState() {
  try { localStorage.setItem(MEM_KEY, JSON.stringify(state)); } catch {}
}

// ── MESSAGES ──────────────────────────────────────────────────────────────────
const MSG_KEY = 'clawd_messages';
let messages = [];

function loadMessages() {
  try { messages = JSON.parse(localStorage.getItem(MSG_KEY) || '[]'); } catch { messages = []; }
}

function saveMessages() {
  try { localStorage.setItem(MSG_KEY, JSON.stringify(messages.slice(-60))); } catch {}
}

function renderMessages() {
  const el = document.getElementById('messages');
  const wasBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 20;

  if (messages.length === 0) {
    el.innerHTML = '';
    showWelcome(el);
    return;
  }

  el.innerHTML = '';
  messages.forEach(m => el.appendChild(buildBubble(m)));
  if (wasBottom || messages.length <= 2) el.scrollTop = el.scrollHeight;
}

function showWelcome(el) {
  const p = PERSONAS[state.persona];
  el.innerHTML = `
    <div class="welcome">
      <div class="welcome-logo">${p.emoji}</div>
      <h2>Hey, I'm Clawd</h2>
      <p>Your personal AI powered by the Trinity Graph. Six modes. One conversation. What's on your mind?</p>
    </div>`;
}

function buildBubble(m) {
  const p = PERSONAS[state.persona];
  const wrap = document.createElement('div');
  wrap.className = `msg ${m.role}`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatText(m.content);
  if (m.role === 'user') bubble.style.background = PERSONAS[m.persona || state.persona]?.color || p.color;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = m.time || '';

  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  return wrap;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<strong>$1</strong>')
    .replace(/_(.*?)_/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, content, persona) {
  const m = { role, content, persona: persona || state.persona, time: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) };
  messages.push(m);
  saveMessages();

  const el = document.getElementById('messages');
  el.appendChild(buildBubble(m));
  el.scrollTop = el.scrollHeight;
}

// ── TYPING INDICATOR ──────────────────────────────────────────────────────────
let typingEl = null;
function showTyping() {
  const el = document.getElementById('messages');
  typingEl = document.createElement('div');
  typingEl.className = 'msg ai';
  typingEl.innerHTML = '<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  el.appendChild(typingEl);
  el.scrollTop = el.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ── SYSTEM PROMPT ─────────────────────────────────────────────────────────────
function buildSystemPrompt() {
  let sys = PERSONA_VOICES[state.persona] + '\n\n';

  sys += 'You are part of the Clawd Trinity Graph intelligence: Social (human context) + Knowledge (facts) + Generative (creativity) converging into responses that are grounded, contextual, and imaginative. Adapt your register between logical precision and emotional resonance as the moment calls for.\n\n';

  if (state.skill && SKILL_PROMPTS[state.skill]) {
    sys += `ACTIVE SKILL PACK [${SKILLS[state.skill].name}]: ${SKILL_PROMPTS[state.skill]}\n\n`;
  }

  if (state.axis === 'logic') sys += 'MODE: Logic. Lead with structure, data, and clear reasoning. Minimize emotional language.\n\n';
  if (state.axis === 'emotion') sys += 'MODE: Empathy. Lead with emotional validation and connection before advising.\n\n';

  if (state.name) sys += `The user's name is ${state.name}.\n`;
  if (state.notes.length > 0) sys += `Things you know about this person: ${state.notes.slice(-5).join('; ')}.\n`;

  sys += '\nConversational and appropriately concise. Use **bold** for emphasis sparingly. No bullet spam. This is a WhatsApp-style conversation — keep it human.';
  return sys;
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────────
let sending = false;

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || sending) return;

  sending = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  autoResize(input);

  // Command handling
  const lower = text.toLowerCase();

  // Remember note
  if (lower.startsWith('remember:') || lower.startsWith('note:')) {
    const note = text.split(':').slice(1).join(':').trim();
    state.notes.push(note);
    state.notes = state.notes.slice(-10);
    saveState();
    addMessage('user', text);
    addMessage('ai', `✓ Got it. I'll remember: _${note}_`);
    resetSend();
    return;
  }

  // Name detection
  const nameMatch = text.match(/(?:my name is|i'm|i am|call me)\s+([A-Z][a-z]+)/i);
  if (nameMatch) {
    state.name = nameMatch[1];
    saveState();
  }

  addMessage('user', text);
  showTyping();

  // Build history for API
  const apiHistory = state.history.slice(-10).map(h => ({
    role: h.role === 'user' ? 'user' : 'model',
    parts: [{ text: h.content }]
  }));
  apiHistory.push({ role: 'user', parts: [{ text: text }] });

  try {
    const resp = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: buildSystemPrompt() }] },
        contents: apiHistory,
        generationConfig: { maxOutputTokens: 800, temperature: 0.7 }
      })
    });
    const data = await resp.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Something went wrong — try again.';

    hideTyping();
    addMessage('ai', reply);

    // Update history
    state.history.push({ role: 'user', content: text });
    state.history.push({ role: 'ai', content: reply });
    state.history = state.history.slice(-12);
    state.turnCount++;

    // Persona suggestion every 10 turns
    if (state.turnCount % 10 === 0) {
      const suggestions = {
        ally: '💡 _Tip: Try The Mirror if you want to explore your own patterns in this._',
        oracle: '💡 _Tip: Try The Scout to find specific sources and options._',
        spark: '💡 _Tip: Try The Builder when you\'re ready to turn this into a plan._',
        builder: '💡 _Tip: Try The Oracle for frameworks and background context._',
        scout: '💡 _Tip: Try The Oracle to analyze what you\'ve found._',
        mirror: '💡 _Tip: Try The Ally when you\'re ready to talk it through._',
      };
      if (suggestions[state.persona]) {
        setTimeout(() => addMessage('ai', suggestions[state.persona]), 500);
      }
    }

    saveState();
  } catch (e) {
    hideTyping();
    addMessage('ai', 'Connection issue — check your signal and try again.');
  }

  resetSend();
}

function resetSend() {
  sending = false;
  document.getElementById('sendBtn').disabled = false;
}

// ── PERSONA SWITCHING ─────────────────────────────────────────────────────────
function switchPersona(key) {
  state.persona = key;
  saveState();
  updatePersonaUI();
  const p = PERSONAS[key];
  addMessage('ai', `${p.emoji} *${p.name}* is active. _${p.tagline}_\n\nWhat's on your mind?`);
  closeSidebar();
}

function updatePersonaUI() {
  const p = PERSONAS[state.persona];

  // Header
  document.getElementById('personaAvatar').textContent = p.emoji;
  document.getElementById('personaAvatar').style.setProperty('--persona-color', p.color);
  document.getElementById('personaName').textContent = p.name;
  document.getElementById('personaTagline').textContent = p.tagline;
  document.getElementById('personaAvatar').style.background = `linear-gradient(135deg,${p.color},rgba(0,0,0,0.4))`;
  document.getElementById('personaAvatar').style.borderColor = p.color;
  document.getElementById('personaAvatar').style.boxShadow = `0 0 12px ${p.color}`;

  // Send button + user bubbles
  document.querySelector('.send-btn').style.background = p.color;
  document.querySelector('.send-btn').style.boxShadow = `0 0 12px ${p.color}40`;

  // Mode chips
  document.querySelectorAll('.mode-chip').forEach(c => {
    c.style.setProperty('--persona-color', p.color);
  });

  // Persona bar
  document.querySelectorAll('.persona-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.key === state.persona);
    c.style.setProperty('--chip-color', PERSONAS[c.dataset.key].color);
  });

  // Sidebar personas
  document.querySelectorAll('.sidebar-item[data-persona]').forEach(el => {
    el.classList.toggle('active', el.dataset.persona === state.persona);
  });

  // Update mode
  updateModeUI();
}

// ── AXIS ──────────────────────────────────────────────────────────────────────
function setAxis(axis) {
  state.axis = axis;
  saveState();
  updateModeUI();
  const labels = { balanced:'⚖️ Balanced mode', logic:'🧠 Logic mode on — I\'ll lead with structure.', emotion:'💙 Empathy mode on — I\'ll lead with connection.' };
  addMessage('ai', labels[axis]);
}

function updateModeUI() {
  const p = PERSONAS[state.persona];
  ['balanced','logic','emotion'].forEach(m => {
    const el = document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1));
    if (!el) return;
    el.classList.toggle('active', state.axis === m);
    el.style.setProperty('--persona-color', p.color);
  });
}

// ── SKILL PACKS ───────────────────────────────────────────────────────────────
function setSkill(key) {
  state.skill = state.skill === key ? null : key;
  saveState();
  renderSkillGrid();
  if (state.skill) {
    const s = SKILLS[key];
    addMessage('ai', `${s.emoji} *${s.name}* skill pack active. I now have deep domain knowledge for this topic.`);
  } else {
    addMessage('ai', 'Skill pack cleared. Back to general mode.');
  }
  closeSidebar();
}

function renderSkillGrid() {
  const grid = document.getElementById('skillGrid');
  if (!grid) return;
  grid.innerHTML = Object.entries(SKILLS).map(([k, s]) => `
    <div class="skill-card ${state.skill === k ? 'active' : ''}" onclick="setSkill('${k}')"
         style="${state.skill === k ? `border-color:${PERSONAS[state.persona].color}` : ''}">
      <div class="sk-emoji">${s.emoji}</div>
      <div class="sk-name">${s.name}</div>
    </div>`).join('');
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
  if (sb.classList.contains('open')) {
    renderSkillGrid();
    renderMemoryDisplay();
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function renderMemoryDisplay() {
  const el = document.getElementById('memoryDisplay');
  if (!el) return;
  const lines = [];
  if (state.name) lines.push(`👤 <strong>${state.name}</strong>`);
  lines.push(`Turns: ${state.turnCount}`);
  if (state.skill) lines.push(`Skill: ${SKILLS[state.skill]?.emoji} ${SKILLS[state.skill]?.name}`);
  if (state.notes.length > 0) {
    lines.push(`<br><strong>Notes (${state.notes.length}):</strong>`);
    state.notes.slice(-4).forEach(n => lines.push(`• ${n}`));
  } else {
    lines.push('No notes yet. Say <em>remember: [anything]</em>');
  }
  el.innerHTML = lines.join('<br>');
}

function clearConversation() {
  if (!confirm('Clear this conversation? Your memories and settings will stay.')) return;
  messages = [];
  state.history = [];
  saveMessages();
  saveState();
  renderMessages();
  closeSidebar();
}

// ── PERSONA BAR INIT ──────────────────────────────────────────────────────────
function initPersonaBar() {
  const bar = document.getElementById('personaBar');
  bar.innerHTML = Object.entries(PERSONAS).map(([k, p]) => `
    <div class="persona-chip ${k === state.persona ? 'active' : ''}" data-key="${k}"
         onclick="switchPersona('${k}')" style="--chip-color:${p.color}">
      <div class="chip-dot" style="${k === state.persona ? `background:${p.color};box-shadow:0 0 6px ${p.color}` : ''}"></div>
      ${p.emoji} ${p.name.replace('The ', '')}
    </div>`).join('');

  const sbPersonas = document.getElementById('sidebarPersonas');
  sbPersonas.innerHTML = Object.entries(PERSONAS).map(([k, p]) => `
    <div class="sidebar-item ${k === state.persona ? 'active' : ''}" data-persona="${k}" onclick="switchPersona('${k}')">
      <span class="si-icon">${p.emoji}</span>
      <div>
        <div class="si-label">${p.name}</div>
        <div class="si-sub">${p.tagline}</div>
      </div>
    </div>`).join('');
}

// ── INPUT HELPERS ─────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  loadState();
  loadMessages();
  initPersonaBar();
  updatePersonaUI();
  renderMessages();

  // First run welcome message
  if (messages.length === 0) {
    const p = PERSONAS[state.persona];
    setTimeout(() => {
      addMessage('ai', `${p.emoji} Hey. I'm Clawd — your personal AI powered by the Trinity Graph.\n\nI have **six modes** depending on what you need — switch anytime from the bar above or say "switch to Oracle" etc.\n\nYou can also say *remember: [anything]* and I'll hold it.\n\nWhat's on your mind?`);
    }, 300);
  }

  // Focus input on desktop
  if (window.innerWidth > 768) {
    document.getElementById('msgInput').focus();
  }
}

window.addEventListener('load', init);
</script>
</body>
</html>
