<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>William's Adventure Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--orange:#FF6B35;--tan:#D4A853;--purple:#7B2FBE;--bg:#0d0d0d;--panel:#1a1a1a}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Comic Neue',cursive}
body{position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);background-size:12px 12px;pointer-events:none;z-index:0}

.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:1;transition:transform .4s ease,opacity .4s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.exit{transform:translateX(-100%);opacity:0;pointer-events:none}

.panel{background:var(--panel);border:4px solid #333;border-radius:18px;padding:28px 22px;width:100%;max-width:700px;text-align:center;box-shadow:8px 8px 0 #000}

h1,.title{font-family:'Bangers',cursive;color:var(--orange);text-shadow:3px 3px 0 #000;letter-spacing:2px}
h2{font-family:'Bangers',cursive;color:#fff;text-shadow:2px 2px 0 #000}
.sfx{font-family:'Bangers',cursive;color:var(--purple);font-size:28px;text-shadow:2px 2px 0 #000;display:inline-block}

.progress{display:flex;gap:10px;justify-content:center;padding:16px 0;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,13,13,.9)}
.dot{width:18px;height:18px;border-radius:50%;background:#333;border:2px solid #555;transition:all .3s}
.dot.active{background:var(--orange);border-color:var(--orange);transform:scale(1.3)}
.dot.done{background:#4CAF50;border-color:#4CAF50}

.btn{font-family:'Bangers',cursive;font-size:28px;padding:18px 36px;border:4px solid #000;border-radius:14px;cursor:pointer;min-height:80px;min-width:80px;display:inline-flex;align-items:center;justify-content:center;gap:10px;transition:transform .15s;box-shadow:4px 4px 0 #000;text-shadow:2px 2px 0 rgba(0,0,0,.5)}
.btn:active{transform:scale(.95);box-shadow:2px 2px 0 #000}
.btn-orange{background:var(--orange);color:#fff}
.btn-purple{background:var(--purple);color:#fff}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:600px;margin:16px auto}
.opt-btn{font-family:'Comic Neue',cursive;font-weight:700;font-size:22px;padding:16px 10px;border:3px solid #444;border-radius:14px;background:#222;color:#fff;cursor:pointer;min-height:80px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:3px 3px 0 #000;transition:transform .15s,border-color .2s}
.opt-btn:active{transform:scale(.95)}
.opt-btn .emoji{font-size:32px}
.opt-btn.selected{border-color:var(--orange);background:#2a1a0a}

.custom-input{font-family:'Comic Neue',cursive;font-size:28px;font-weight:700;padding:14px 20px;border:3px solid var(--orange);border-radius:12px;background:#1a1a1a;color:#fff;text-align:center;width:100%;max-width:400px;margin-top:12px}

/* Spelling */
.spell-area{margin:20px 0}
.letter-display{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.letter-box{width:52px;height:62px;border:3px solid #444;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:34px;color:#555;background:#1a1a1a;transition:all .3s}
.letter-box.correct{background:var(--orange);color:#fff;border-color:var(--orange);animation:letterPop .3s ease}
.letter-box.current{border-color:var(--orange);box-shadow:0 0 12px rgba(255,107,53,.5)}

.spell-input{font-size:32px;padding:16px;border:3px solid var(--purple);border-radius:12px;background:#1a1a1a;color:#fff;text-align:center;width:100%;max-width:400px;font-family:'Comic Neue',cursive;font-weight:700;caret-color:var(--orange)}

.phonetic{font-size:20px;color:var(--tan);margin-top:10px;font-weight:700}
.definition{font-size:18px;color:#aaa;margin-top:6px}

@keyframes letterPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes celebrate{0%{transform:scale(1)}30%{transform:scale(1.3) rotate(-5deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .3s ease}
.celebrate{animation:celebrate .5s ease}

/* Confetti */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200}
.confetti{position:absolute;width:12px;height:12px;border-radius:2px;animation:confettiFall 1.2s ease-out forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-400px) rotate(720deg);opacity:0}}

/* Story */
.story-container{text-align:left;font-size:24px;line-height:1.7;max-height:60vh;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.story-word{cursor:pointer;transition:color .2s,background .2s;padding:1px 2px;border-radius:4px;display:inline}
.story-word:active{background:rgba(255,107,53,.2)}
.story-word.highlight{color:var(--orange);font-weight:700}
.story-word.read{color:#ccc}
.story-word.place-word,.story-word.action-word,.story-word.object-word{font-weight:700;text-decoration:underline;text-decoration-color:var(--orange)}

.read-btn{position:sticky;top:0;z-index:10}

/* Word modal */
.word-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.word-modal.hidden{display:none}
.word-modal-content{background:var(--panel);border:4px solid var(--orange);border-radius:18px;padding:30px;max-width:500px;width:100%;text-align:center}

/* Print mode */
.print-mode{position:fixed;inset:0;background:#fff;color:#000;z-index:400;padding:40px;overflow-y:auto;font-size:22px;line-height:1.8}
.print-mode.hidden{display:none}
.print-mode h1{color:var(--orange);font-size:36px}
.print-mode .story-text{white-space:pre-wrap}
.print-mode .footer{margin-top:30px;font-size:18px;color:#666;text-align:center}
.print-close{position:fixed;top:16px;right:16px;z-index:401;font-size:20px;background:var(--orange);color:#fff;border:none;border-radius:50%;width:50px;height:50px;cursor:pointer;font-family:'Bangers',cursive}

@media(max-width:500px){
  .options-grid{grid-template-columns:1fr}
  .letter-box{width:44px;height:54px;font-size:28px}
  h1{font-size:32px!important}
}
</style>
</head>

// ============ STATE ============
let currentScreen = 'welcome';
let answers = {place:null, action:null, object:null};
let answerData = {place:null, action:null, object:null};
const screens = ['welcome','q1','spell1','q2','spell2','q3','spell3','story'];

// ============ PROGRESS ============
function updateProgress(){
  const el=document.getElementById('progress');
  const idx=screens.indexOf(currentScreen);
  el.innerHTML=screens.map((_,i)=>`<div class="dot ${i<idx?'done':''} ${i===idx?'active':''}"></div>`).join('');
}

// ============ NAVIGATION ============
function goTo(name){
  const prev=document.getElementById('screen-'+currentScreen);
  const next=document.getElementById('screen-'+name);
  if(prev){prev.classList.add('exit');prev.classList.remove('hidden')}
  next.classList.remove('hidden');next.classList.remove('exit');
  setTimeout(()=>{if(prev)prev.classList.add('hidden');if(prev)prev.classList.remove('exit')},400);
  currentScreen=name;
  updateProgress();
  window.scrollTo(0,0);
  next.scrollTop=0;
}

// ============ START ============
function startGame(){
  answers={place:null,action:null,object:null};
  answerData={place:null,action:null,object:null};
  buildQuestion('q1','WHERE DOES WILLIAM GO TODAY?','🔴👦💬',Q1_OPTIONS,'place','spell1');
  goTo('q1');
}

// ============ QUESTION SCREEN ============
function buildQuestion(screenId, title, icon, options, key, nextScreen){
  const el=document.getElementById('screen-'+screenId);
  let customMode=false;
  el.innerHTML=`
    <div class="panel">
      <div style="font-size:48px;margin-bottom:6px">${icon}</div>
      <h2 style="font-size:30px;margin-bottom:16px">${title}</h2>
      <div class="options-grid" id="${screenId}-opts"></div>
      <div id="${screenId}-custom" style="display:none;margin-top:14px">
        <input class="custom-input" id="${screenId}-input" placeholder="TYPE YOUR WORD" maxlength="20" autocomplete="off" autocapitalize="characters">
        <br><br>
        <button class="btn btn-purple" style="font-size:22px" onclick="submitCustom('${screenId}','${key}','${nextScreen}')">USE THIS WORD!</button>
      </div>
    </div>`;
  const grid=document.getElementById(screenId+'-opts');
  options.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.innerHTML=`<span class="emoji">${o.emoji}</span> ${o.word}`;
    b.onclick=()=>{
      answers[key]=o.word;
      answerData[key]=o;
      buildSpelling(nextScreen.replace('spell',''), o, key);
      goTo(nextScreen);
    };
    grid.appendChild(b);
  });
  // Write your own
  const wb=document.createElement('button');
  wb.className='opt-btn';
  wb.innerHTML='<span class="emoji">✏️</span> WRITE YOUR OWN';
  wb.onclick=()=>{document.getElementById(screenId+'-custom').style.display='block';document.getElementById(screenId+'-input').focus()};
  grid.appendChild(wb);
}

function submitCustom(screenId,key,nextScreen){
  const val=document.getElementById(screenId+'-input').value.trim().toUpperCase();
  if(!val)return;
  const data={emoji:'⭐',word:val,phonetic:val.split('').join('-'),rhyme:val+' — great word!',def:'A word William picked!'};
  answers[key]=val;
  answerData[key]=data;
  buildSpelling(nextScreen.replace('spell',''),data,key);
  goTo(nextScreen);
}

// ============ SPELLING CHALLENGE ============
function buildSpelling(num, data, key){
  const screenId='spell'+num;
  const el=document.getElementById('screen-'+screenId);
  const word=data.word.toUpperCase();
  const letters=word.split('');
  
  // Determine next screen
  const nextMap={'1':'q2','2':'q3','3':'story'};
  const nextScreen=nextMap[num];
  
  // Determine next question builder
  const nextBuilders={
    'q2':()=>buildQuestion('q2','WHAT DOES BOOTS DO?','🐾💨',Q2_OPTIONS,'action','spell2'),
    'q3':()=>buildQuestion('q3','WHAT DOES CHOMPER PRINT?','🖨️💜',Q3_OPTIONS,'object','spell3'),
    'story':()=>buildStory()
  };

  el.innerHTML=`
    <div class="panel">
      <h2 style="font-size:26px">NOW LET'S SPELL IT! ✨</h2>
      <p style="font-size:22px;color:var(--tan);margin:8px 0">Can you type: <strong style="color:var(--orange)">${word}</strong></p>
      <div class="letter-display" id="${screenId}-letters"></div>
      <input class="spell-input" id="${screenId}-input" autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false" inputmode="text">
      <div class="phonetic" id="${screenId}-phonetic" style="display:none">${data.phonetic}</div>
      <div class="definition" id="${screenId}-rhyme" style="display:none">${data.rhyme}</div>
      <div id="${screenId}-celebrate" style="display:none;margin-top:14px">
        <div class="sfx celebrate" style="font-size:36px">YOU SPELLED IT! 🎉</div>
        <br>
        <button class="btn btn-orange" style="font-size:26px" id="${screenId}-next">${nextScreen==='story'?'SEE YOUR STORY! 📖':'NEXT! ➡️'}</button>
      </div>
    </div>`;

  const letterBox=document.getElementById(screenId+'-letters');
  letters.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='letter-box';
    d.id=`${screenId}-l${i}`;
    d.textContent=l;
    letterBox.appendChild(d);
  });
  // Mark first as current
  if(letters.length>0)document.getElementById(`${screenId}-l0`).classList.add('current');

  const inp=document.getElementById(screenId+'-input');
  let pos=0;
  
  // Use input event for mobile compatibility
  inp.addEventListener('input',function(e){
    const val=this.value.toUpperCase();
    // Check the last character typed
    if(val.length>pos){
      const typed=val.charAt(val.length-1).toUpperCase();
      const expected=letters[pos];
      if(expected===' '){
        // auto-advance spaces
        if(typed===' '||typed===expected){
          document.getElementById(`${screenId}-l${pos}`).classList.remove('current');
          document.getElementById(`${screenId}-l${pos}`).classList.add('correct');
          pos++;
        }
      }
      if(typed===expected){
        document.getElementById(`${screenId}-l${pos}`).classList.remove('current');
        document.getElementById(`${screenId}-l${pos}`).classList.add('correct');
        pos++;
        if(pos<letters.length){
          document.getElementById(`${screenId}-l${pos}`).classList.add('current');
          // auto skip spaces
          while(pos<letters.length&&letters[pos]===' '){
            document.getElementById(`${screenId}-l${pos}`).classList.remove('current');
            document.getElementById(`${screenId}-l${pos}`).classList.add('correct');
            pos++;
            if(pos<letters.length)document.getElementById(`${screenId}-l${pos}`).classList.add('current');
          }
        }
        if(pos>=letters.length){
          // WIN!
          inp.disabled=true;
          fireConfetti();
          document.getElementById(screenId+'-phonetic').style.display='block';
          document.getElementById(screenId+'-rhyme').style.display='block';
          document.getElementById(screenId+'-celebrate').style.display='block';
          try{speakWord(word)}catch(e){}
        }
      } else {
        // Wrong letter — shake and remove it
        inp.classList.add('shake');
        setTimeout(()=>inp.classList.remove('shake'),300);
        this.value=val.slice(0,-1);
      }
    }
  });

  document.getElementById(screenId+'-next').onclick=()=>{
    if(nextBuilders[nextScreen])nextBuilders[nextScreen]();
    goTo(nextScreen);
  };

  setTimeout(()=>inp.focus(),500);
}

// ============ CONFETTI ============
function fireConfetti(){
  const box=document.getElementById('confettiBox');
  const colors=['#FF6B35','#D4A853','#7B2FBE','#4CAF50','#FF4081','#00BCD4','#FFEB3B'];
  for(let i=0;i<25;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.top='60%';
    c.style.background=colors[i%colors.length];
    c.style.animationDelay=Math.random()*0.3+'s';
    c.style.animationDuration=(0.8+Math.random()*0.8)+'s';
    box.appendChild(c);
  }
  setTimeout(()=>box.innerHTML='',2000);
}

// ============ SPEECH ============
function speakWord(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.8;u.pitch=1.1;
  speechSynthesis.speak(u);
}

function speakSpell(word){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const letters=word.replace(/\s/g,'').split('');
  let i=0;
  function next(){
    if(i>=letters.length){
      setTimeout(()=>speakWord(word),500);
      return;
    }
    const u=new SpeechSynthesisUtterance(letters[i]);
    u.rate=0.7;u.pitch=1.2;
    u.onend=()=>{i++;setTimeout(next,200)};
    speechSynthesis.speak(u);
  }
  next();
}

// ============ STORY ============
function buildStory(){
  const tpl=STORIES[Math.floor(Math.random()*STORIES.length)];
  const storyText=tpl(answers.place, answers.action.toLowerCase(), answers.object.toLowerCase());
  
  // Save to localStorage
  try{localStorage.setItem('william-last',JSON.stringify({place:answers.place,action:answers.action,object:answers.object,date:new Date().toLocaleDateString()}))}catch(e){}

  const el=document.getElementById('screen-story');
  el.innerHTML=`
    <div style="width:100%;max-width:700px;padding-top:50px">
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px">
        <button class="btn btn-orange read-btn" style="font-size:20px;min-height:60px" onclick="readStoryAloud()">🔊 READ TO ME</button>
        <button class="btn btn-purple" style="font-size:20px;min-height:60px" onclick="stopReading()">⏹️ STOP</button>
      </div>
      <div class="panel">
        <div class="sfx" style="font-size:24px;margin-bottom:10px">📖 YOUR STORY! 📖</div>
        <div class="story-container" id="storyContainer"></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px">
        <button class="btn btn-orange" style="font-size:22px" onclick="showPrint()">📱 SHOW MOM!</button>
        <button class="btn btn-purple" style="font-size:22px" onclick="startGame()">🔄 NEW STORY!</button>
      </div>
    </div>`;

  // Build word spans
  const container=document.getElementById('storyContainer');
  const words=storyText.split(/(\s+)/);
  window._storyWords=[];
  words.forEach((w,i)=>{
    if(/^\s+$/.test(w)){
      // whitespace — preserve newlines
      if(w.includes('\n')){
        w.split('\n').forEach((part,j)=>{
          if(j>0)container.appendChild(document.createElement('br'));
        });
      } else {
        container.appendChild(document.createTextNode(' '));
      }
      return;
    }
    const span=document.createElement('span');
    span.className='story-word';
    span.textContent=w;
    span.dataset.index=window._storyWords.length;
    // Highlight user's words
    const clean=w.replace(/[^A-Za-z]/g,'').toUpperCase();
    const placeWords=answers.place.toUpperCase().split(/\s+/);
    const actionWords=answers.action.toUpperCase().split(/\s+/);
    const objectWords=answers.object.toUpperCase().split(/\s+/);
    if(placeWords.includes(clean))span.classList.add('place-word');
    if(actionWords.includes(clean))span.classList.add('action-word');
    if(objectWords.includes(clean))span.classList.add('object-word');
    
    span.onclick=()=>showWordModal(w);
    container.appendChild(span);
    window._storyWords.push(span);
  });
  
  window._storyText=storyText;
}

// ============ READ ALOUD ============
let _readingUtterance=null;
function readStoryAloud(){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  // Reset highlights
  (window._storyWords||[]).forEach(s=>{s.classList.remove('highlight');s.classList.remove('read')});
  
  const text=window._storyText;
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.8;u.pitch=1.1;
  _readingUtterance=u;
  
  // Word boundary highlighting
  let wordIdx=0;
  u.onboundary=(e)=>{
    if(e.name==='word'&&window._storyWords){
      // unhighlight prev
      if(wordIdx>0&&window._storyWords[wordIdx-1]){
        window._storyWords[wordIdx-1].classList.remove('highlight');
        window._storyWords[wordIdx-1].classList.add('read');
      }
      if(window._storyWords[wordIdx]){
        window._storyWords[wordIdx].classList.add('highlight');
        // scroll into view
        window._storyWords[wordIdx].scrollIntoView({behavior:'smooth',block:'center'});
      }
      wordIdx++;
    }
  };
  u.onend=()=>{
    (window._storyWords||[]).forEach(s=>{s.classList.remove('highlight');s.classList.remove('read')});
  };
  speechSynthesis.speak(u);
}
function stopReading(){if(window.speechSynthesis)speechSynthesis.cancel()}

// ============ WORD MODAL ============
function showWordModal(word){
  const clean=word.replace(/[^A-Za-z']/g,'');
  if(!clean)return;
  speakWord(clean);
  document.getElementById('modalWord').textContent=clean.toUpperCase();
  document.getElementById('modalSpell').textContent=clean.toUpperCase().split('').join(' - ');
  // Simple definitions for common words
  const defs={'THE':'A word that points to something specific','AND':'A word that connects two things together','TO':'Shows direction — going somewhere','WAS':'Means something happened before, in the past','HIS':'Belongs to a boy','HE':'Talking about a boy or man','IT':'A word for a thing','IN':'Inside of something','FOR':'Shows who gets something or why','ON':'Sitting on top of something','SAID':'Spoke words out loud','WITH':'Together, side by side','THAT':'Points to something specific','HAD':'Had means you owned or held something','BUT':'However — something different is coming','FROM':'Where something started','UP':'Going higher','OUT':'Going away from inside','THEY':'More than one person','WERE':'Past tense of are — happened before','ALL':'Every single one','WOULD':'Something that might happen','THERE':'In that place','WHEN':'At what time','BOOTS':'William\'s pug sidekick!','WILLIAM':'That\'s you! The hero!','CHOMPER':'The awesome 3D printer!','WHITNEY':'Your amazing mom!','MEMPHIS':'Your city in Tennessee!','BMX':'A cool type of bike for tricks!','SNRKT':'The sound Boots makes when he snorts!'};
  const upper=clean.toUpperCase();
  document.getElementById('modalDef').textContent=defs[upper]||'A great word to know!';
  document.getElementById('modalExample').textContent=`"${clean}" has ${clean.length} letters.`;
  document.getElementById('wordModal').classList.remove('hidden');
}
function closeWordModal(){document.getElementById('wordModal').classList.add('hidden')}

// ============ PRINT MODE ============
function showPrint(){
  const el=document.getElementById('printMode');
  const today=new Date();
  const dateStr=today.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('printContent').innerHTML=`
    <h1 style="text-align:center;font-family:Bangers,cursive">📖 WILLIAM'S ADVENTURE 📖</h1>
    <p style="text-align:center;font-size:18px;color:#888;margin-bottom:20px">Words chosen: ${answers.place} + ${answers.action} + ${answers.object}</p>
    <div class="story-text" style="white-space:pre-wrap;font-family:'Comic Neue',cursive">${window._storyText}</div>
    <div class="footer">Created by WILLIAM! 📅 ${dateStr}<br>🔴👦 + 🐾 + 🖨️💜</div>`;
  el.classList.remove('hidden');
}
function closePrint(){document.getElementById('printMode').classList.add('hidden')}

updateProgress();

try{
  const last=JSON.parse(localStorage.getItem('william-last'));
  if(last)document.getElementById('lastAdventure').textContent=`Your last adventure: ${last.place} + ${last.action} + ${last.object}`;
}catch(e){}
</script>
