<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Empathic Guest Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;
  --bg-primary:#0a0e1a;
  --card:rgba(255,255,255,0.04);
  --card-solid:#0d1526;
  --border:rgba(255,255,255,0.1);
  --gold:#D4AF37;
  --teal:#00d4ff;
  --red:#ff3d5a;
  --green:#00e676;
  --text:#e8e6e1;
  --muted:#7a8a9e;
  --card-hover:rgba(255,255,255,0.07);
  --glass-blur:blur(20px);
  --accent-cyan:#00d4ff;
  --accent-blue:#4facfe;
  --grad-cyan:linear-gradient(135deg,#00d4ff,#4facfe);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;min-height:100dvh}
h1,h2,h3,.guest-name{font-family:'Playfair Display',serif}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.85);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:16px}
.header h1{font-size:20px;color:var(--gold);letter-spacing:1px}
.header .badge{font-size:11px;color:var(--teal);opacity:.8;font-family:'Inter',sans-serif;font-weight:400}
.header-right{display:flex;align-items:center;gap:16px}
.hotel-name{font-size:14px;color:var(--muted)}
.search-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;width:220px;outline:none}
.search-box:focus{border-color:var(--teal)}
.filter-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:.2s}
.filter-btn.active,.filter-btn:hover{border-color:var(--gold);color:var(--gold)}

/* Layout */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:360px;min-width:360px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg)}
.portrait-panel{flex:1;overflow-y:auto;padding:24px 32px}

/* Sidebar sections */
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:16px 16px 8px;font-weight:600}

/* Alerts */
.alert-card{margin:4px 10px;padding:12px 14px;border-radius:8px;border-left:3px solid var(--red);background:var(--card);cursor:pointer;transition:.2s;position:relative}
.alert-card.amber{border-left-color:var(--gold)}
.alert-card:hover{background:var(--card-hover)}
.alert-card .alert-guest{font-size:13px;font-weight:600;color:var(--text)}
.alert-card .alert-issue{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.alert-card .resolve-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--red);color:var(--red);font-size:10px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:.2s}
.alert-card.amber .resolve-btn{border-color:var(--gold);color:var(--gold)}
.alert-card .resolve-btn:hover{background:var(--red);color:#fff}
.alert-card.amber .resolve-btn:hover{background:var(--gold);color:#000}
.alert-card.resolved{opacity:.4;border-left-color:var(--green)}
.alert-card.resolved .resolve-btn{background:var(--green);color:#000;border-color:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.alert-card:not(.resolved){animation:pulse 2.5s infinite}

/* Guest list items */
.guest-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:.15s;border-left:3px solid transparent}
.guest-item:hover{background:var(--card)}
.guest-item.active{background:var(--card);border-left-color:var(--gold)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.tier-diamond{background:linear-gradient(135deg,#c8a84e,#f0d878);color:#1a1200}
.tier-platinum{background:linear-gradient(135deg,#8a9bb0,#c0cfe0);color:#1a2030}
.tier-gold{background:linear-gradient(135deg,#b8860b,#daa520);color:#1a1200}
.tier-member{background:var(--border);color:var(--muted)}
.guest-item-info{flex:1;min-width:0}
.guest-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guest-item-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;margin-top:2px}
.sentiment-bar{width:40px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0}
.sentiment-fill{height:100%;border-radius:2px;transition:width .6s}
.status-chip{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;text-transform:uppercase;flex-shrink:0}
.chip-arriving{background:rgba(0,229,212,.15);color:var(--teal)}
.chip-inhouse{background:rgba(200,168,78,.15);color:var(--gold)}
.chip-tomorrow{background:rgba(122,138,158,.15);color:var(--muted)}

/* Room service monitor */
.rs-monitor{margin:10px;padding:14px;background:var(--card);border-radius:8px;border:1px solid var(--border)}
.rs-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;font-weight:600}
.rs-order{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)}
.rs-order:last-child{border:none}
.rs-room{color:var(--text);font-weight:500}
.rs-time{font-weight:600}
.rs-ok{color:var(--green)}
.rs-over{color:var(--red);animation:pulse 1s infinite}
.rs-recovery-btn{background:var(--red);color:#fff;border:none;font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;animation:pulse 1s infinite}
.rs-recovery-btn.handled{background:var(--green);animation:none}

/* Portrait panel */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:16px}
.empty-state .icon{font-size:64px;opacity:.3}
.empty-state p{font-size:14px}

.portrait{animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.portrait-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.portrait-header-left{display:flex;gap:20px;align-items:center}
.portrait-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700}
.portrait-info .guest-name{font-size:28px;font-weight:600;margin-bottom:4px}
.portrait-info .tier-label{font-size:12px;padding:3px 10px;border-radius:4px;font-weight:600;display:inline-block;margin-right:8px}
.portrait-info .meta-row{font-size:13px;color:var(--muted);margin-top:6px;display:flex;gap:20px}
.portrait-info .meta-row span{display:flex;align-items:center;gap:4px}

.portrait-actions{display:flex;gap:8px}
.btn{padding:10px 18px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.btn-primary{background:var(--gold);color:#000}.btn-primary:hover{background:#d4b85c}
.btn-secondary{background:none;border:1px solid var(--teal);color:var(--teal)}.btn-secondary:hover{background:rgba(0,229,212,.1)}

/* Sentiment gauge */
.gauge-container{display:flex;align-items:center;gap:24px;margin:20px 0;padding:20px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.gauge-svg{width:120px;height:70px;flex-shrink:0}
.gauge-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.gauge-score{font-size:36px;font-weight:700;font-family:'Playfair Display',serif}
.gauge-desc{font-size:12px;color:var(--muted);margin-top:4px}
.sparkline-container{flex:1;padding-left:24px;border-left:1px solid var(--border)}
.sparkline-label{font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}

/* Sections */
.portrait-section{margin-bottom:20px}
.portrait-section-title{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.portrait-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Flags */
.flag{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:12px;margin:4px;line-height:1.3;max-width:100%}
.flag-red{background:rgba(255,61,90,.12);color:var(--red);border:1px solid rgba(255,61,90,.2)}
.flag-amber{background:rgba(200,168,78,.12);color:var(--gold);border:1px solid rgba(200,168,78,.2)}
.flag-info{background:rgba(0,229,212,.1);color:var(--teal);border:1px solid rgba(0,229,212,.15)}
@keyframes flagIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.flag{animation:flagIn .3s ease backwards}

/* Action queue */
.action-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border-radius:6px;margin-bottom:6px;border:1px solid var(--border)}
.action-item .action-text{flex:1;font-size:13px;line-height:1.4}
.action-item .mark-done{background:none;border:1px solid var(--green);color:var(--green);font-size:11px;padding:4px 12px;border-radius:4px;cursor:pointer;flex-shrink:0;transition:.2s}
.action-item .mark-done:hover{background:var(--green);color:#000}
.action-item.done{opacity:.4}.action-item.done .mark-done{background:var(--green);color:#000}

/* Preference / dietary cards */
.pref-grid{display:flex;flex-wrap:wrap;gap:8px}
.pref-tag{padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--text)}
.dietary-tag{background:rgba(255,61,90,.08);border-color:rgba(255,61,90,.2);color:var(--red)}

/* Complaint timeline */
.timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.timeline-item:last-child{border:none}
.timeline-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.timeline-dot.resolved{background:var(--green)}
.timeline-dot.unresolved{background:var(--red)}
.timeline-date{font-size:11px;color:var(--muted);min-width:70px}
.timeline-text{font-size:13px;flex:1}
.timeline-credit{font-size:11px;color:var(--gold)}

/* AI Brief */
.ai-brief{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-top:12px;position:relative}
.ai-brief::before{content:'AI';position:absolute;top:-8px;left:16px;background:var(--teal);color:#000;font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px}
.ai-brief-text{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap}
.ai-loading{color:var(--muted);font-style:italic}

/* Notes */
.notes-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:13px;line-height:1.6;color:var(--muted);font-style:italic;backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur)}

/* Glass panel upgrades */
.alert-card{background:rgba(255,255,255,0.04);border-radius:12px;backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);box-shadow:0 4px 16px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.05)}
.gauge-container{background:rgba(255,255,255,0.04);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid rgba(255,255,255,0.08);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.08)}
.action-item{background:rgba(255,255,255,0.04);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid rgba(255,255,255,0.07);border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.ai-brief{background:rgba(255,255,255,0.04);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid rgba(255,255,255,0.08);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.25)}
.rs-monitor{background:rgba(255,255,255,0.04);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid rgba(255,255,255,0.08);border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.25)}
input,.search-box{font-size:16px!important;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1);color:var(--text);border-radius:8px}
.search-box:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,212,255,0.15)}

/* Mobile bottom nav */
.hosp-mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  z-index:9999;
  background:rgba(10,14,26,0.94);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,0.1);
  padding-bottom:env(safe-area-inset-bottom);
}
.hosp-mn-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:56px;border:none;background:none;cursor:pointer;
  color:rgba(255,255,255,0.4);font-family:'Inter',sans-serif;
  font-size:9px;font-weight:700;gap:4px;padding:8px 4px;
  text-transform:uppercase;letter-spacing:0.06em;transition:color 0.2s;
}
.hosp-mn-tab.active,.hosp-mn-tab:hover{color:var(--teal)}
.hosp-mn-tab svg{opacity:0.5;transition:opacity 0.2s}
.hosp-mn-tab.active svg{opacity:1}
.btn,.btn-primary,.btn-secondary,.filter-btn{min-height:44px}

/* Responsive layout */
@media(max-width:768px){
  .hosp-mobile-nav{display:flex}
  body{padding-bottom:calc(72px + env(safe-area-inset-bottom))}
  .header{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .header-left{gap:10px}
  .header h1{font-size:16px}
  .header-right{flex-wrap:wrap;gap:8px;width:100%}
  .hotel-name{display:none}
  .search-box{width:100%;min-width:0}
  .main{position:relative}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:100%;max-width:100%;
    z-index:100;transform:translateX(-100%);
    transition:transform 0.3s ease;background:var(--bg);
    padding-top:60px;
  }
  .sidebar.mobile-open{transform:translateX(0)}
  .portrait-panel{width:100%;padding:16px;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
  .portrait-header{flex-direction:column;gap:16px}
  .portrait-header-left{flex-direction:column;gap:12px;align-items:flex-start}
  .portrait-actions{flex-wrap:wrap;gap:8px;width:100%}
  .portrait-actions .btn{flex:1;text-align:center;justify-content:center;min-height:44px}
  .gauge-container{flex-direction:column;gap:16px}
  .portrait-info .meta-row{flex-wrap:wrap;gap:8px}
  .gauge-svg{width:100%;max-width:160px}
}
@media(max-width:480px){
  .header h1{font-size:14px;letter-spacing:0.5px}
  .portrait-info .guest-name{font-size:22px}
  .filter-btn{padding:6px 8px;font-size:11px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>EMPATHIC GUEST INTELLIGENCE</h1>
    <span class="badge">Powered by Inkwell Awareness Model</span>
  </div>
  <div class="header-right">
    <input class="search-box" type="text" placeholder="Search guests, rooms, flags..." id="searchBox">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="arriving">Arriving</button>
    <button class="filter-btn" data-filter="inhouse">In House</button>
    <button class="filter-btn" data-filter="priority">Priority</button>
    <span class="hotel-name">The Meridian 🏨</span>

    <div class="empty-state">
      <div class="icon">👤</div>
      <p>Select a guest to view their living portrait</p>
      <p style="font-size:12px;opacity:.6">AI-powered insights for proactive hospitality</p>
    </div>
  </div>
</div>

<!-- Mobile bottom nav -->
<nav class="hosp-mobile-nav" aria-label="Main navigation">
  <button class="hosp-mn-tab active" id="hmnav-guests" onclick="hospMobileNav('guests')">

    <span>Guests</span>
  </button>
  <button class="hosp-mn-tab" id="hmnav-alerts" onclick="hospMobileNav('alerts')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    <span>Alerts</span>
  </button>
  <button class="hosp-mn-tab" id="hmnav-insights" onclick="hospMobileNav('insights')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Insights</span>
  </button>
  <button class="hosp-mn-tab" id="hmnav-settings" onclick="hospMobileNav('settings')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span>Settings</span>
  </button>
</nav>

<script>
const PROXY='https://awareness-proxy-328246068140.us-central1.run.app/gemini/generate';
async function gemini(prompt,system=''){
  const body={contents:[{parts:[{text:prompt}]}]};
  if(system)body.system_instruction={parts:[{text:system}]};
  const r=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json();
  return d?.candidates?.[0]?.content?.parts?.[0]?.text||'';
}

const guests=[

function tierClass(t){return 'tier-'+t.toLowerCase()}
function initials(name){return name.split(/[\s&]+/).filter(w=>w.length>1).map(w=>w[0]).slice(0,2).join('')}
function sentimentColor(s){return s>=80?'var(--green)':s>=65?'var(--gold)':s>=45?'#ff9800':'var(--red)'}
function formatLTV(v){return v>=1000?'$'+(v/1000).toFixed(v%1000?1:0)+'K':'$'+v}

function getStatus(g){return g.status}
function isPriority(g){return g.flags.some(f=>f.includes('⚠️'))||g.sentiment<65}

function filterGuests(){
  let list=guests;
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(g=>g.name.toLowerCase().includes(q)||g.room.toLowerCase().includes(q)||g.tier.toLowerCase().includes(q)||g.flags.some(f=>f.toLowerCase().includes(q)));
  }
  if(currentFilter==='arriving')list=list.filter(g=>g.status==='arriving');
  else if(currentFilter==='inhouse')list=list.filter(g=>g.status==='inhouse');
  else if(currentFilter==='priority')list=list.filter(isPriority);
  return list;
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  const filtered=filterGuests();
  const priority=filtered.filter(isPriority);
  const arriving=filtered.filter(g=>g.status==='arriving'&&!isPriority(g));
  const inhouse=filtered.filter(g=>g.status==='inhouse'&&!isPriority(g));
  const tomorrow=filtered.filter(g=>g.status==='tomorrow'&&!isPriority(g));

  let html='';

  // Priority alerts
  html+='<div class="section-label">🚨 Priority Alerts ('+priorityAlerts.filter(a=>!resolvedAlerts.has(a.guestId)).length+')</div>';
  priorityAlerts.forEach(a=>{
    const resolved=resolvedAlerts.has(a.guestId);
    html+=`<div class="alert-card ${a.level==='amber'?'amber':''} ${resolved?'resolved':''}" onclick="selectGuest('${a.guestId}')">
      <div class="alert-guest">${a.guest}</div>
      <div class="alert-issue">${a.issue}</div>
      <button class="resolve-btn" onclick="event.stopPropagation();resolveAlert('${a.guestId}')">${resolved?'✓ Resolved':'Resolve'}</button>
    </div>`;
  });

  // Room service monitor
  html+=renderRoomService();

  function renderGroup(label,list,chipClass){
    if(!list.length)return;
    html+=`<div class="section-label">${label} (${list.length})</div>`;
    list.forEach(g=>{
      html+=`<div class="guest-item ${selectedGuestId===g.id?'active':''}" onclick="selectGuest('${g.id}')">
        <div class="avatar ${tierClass(g.tier)}">${initials(g.name)}</div>
        <div class="guest-item-info">
          <div class="guest-item-name">${g.name}</div>
          <div class="guest-item-meta"><span>${g.room}</span><span>${g.tier}</span></div>
        </div>
        <span class="status-chip ${chipClass}">${g.status==='inhouse'?'In House':g.status==='arriving'?'Arriving':'Tomorrow'}</span>
        <div class="sentiment-bar"><div class="sentiment-fill" style="width:${g.sentiment}%;background:${sentimentColor(g.sentiment)}"></div></div>
      </div>`;
    });
  }

  if(priority.length){
    html+='<div class="section-label">⚡ Needs Attention ('+priority.length+')</div>';
    priority.forEach(g=>{
      const chipClass=g.status==='inhouse'?'chip-inhouse':g.status==='arriving'?'chip-arriving':'chip-tomorrow';
      html+=`<div class="guest-item ${selectedGuestId===g.id?'active':''}" onclick="selectGuest('${g.id}')">
        <div class="avatar ${tierClass(g.tier)}">${initials(g.name)}</div>
        <div class="guest-item-info">
          <div class="guest-item-name">${g.name}</div>
          <div class="guest-item-meta"><span>${g.room}</span><span>${g.tier}</span></div>
        </div>
        <span class="status-chip ${chipClass}">${g.status==='inhouse'?'In House':g.status==='arriving'?'Arriving':'Tomorrow'}</span>
        <div class="sentiment-bar"><div class="sentiment-fill" style="width:${g.sentiment}%;background:${sentimentColor(g.sentiment)}"></div></div>
      </div>`;
    });
  }

  renderGroup('Arriving Today',arriving,'chip-arriving');
  renderGroup('In House',inhouse,'chip-inhouse');
  renderGroup('Tomorrow',tomorrow,'chip-tomorrow');

  sb.innerHTML=html;
}

function renderRoomService(){
  let html='<div class="rs-monitor"><div class="rs-title">🍽 Room Service Monitor — '+roomServiceOrders.length+' orders</div>';
  roomServiceOrders.forEach((o,i)=>{
    const mins=Math.floor((Date.now()-o.startTime)/60000);
    const over=mins>=o.threshold;
    const handled=recoveryHandled.has(i);
    html+=`<div class="rs-order">
      <span class="rs-room">Room ${o.room}</span>
      <span class="rs-time ${over&&!handled?'rs-over':''}${!over?'rs-ok':''}">${mins} min</span>
      ${over&&!handled?`<button class="rs-recovery-btn" onclick="event.stopPropagation();handleRecovery(${i})">⚠ RECOVERY</button>`:''}
      ${over&&handled?'<span style="color:var(--green);font-size:11px">✓ Human responding</span>':''}
      ${!over?'<span style="color:var(--green);font-size:11px">OK</span>':''}
    </div>`;
  });
  html+='</div>';
  return html;
}

function resolveAlert(gid){resolvedAlerts.add(gid);renderSidebar()}
function handleRecovery(i){recoveryHandled.add(i);renderSidebar()}

function renderSparkline(g){
  // Simulated sentiment data points for in-house guests
  const data={
    'G003':[78,72,68,61],
    'G005':[85,83,79,79],
    'G008':[80,82,82]
  };
  const pts=data[g.id];
  if(!pts)return '';
  const w=200,h=40,pad=4;
  const xStep=(w-pad*2)/(pts.length-1);
  const min=Math.min(...pts)-5,max=Math.max(...pts)+5;
  const path=pts.map((v,i)=>{
    const x=pad+i*xStep;
    const y=h-pad-((v-min)/(max-min))*(h-pad*2);
    return (i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const lastY=h-pad-((pts[pts.length-1]-min)/(max-min))*(h-pad*2);
  const lastX=pad+(pts.length-1)*xStep;
  return `<svg width="${w}" height="${h}" style="overflow:visible"><path d="${path}" fill="none" stroke="${sentimentColor(g.sentiment)}" stroke-width="2"/><circle cx="${lastX}" cy="${lastY}" r="4" fill="${sentimentColor(g.sentiment)}"/></svg>`;
}

  const el=document.getElementById('aiBrief-'+gid);
  el.innerHTML='<div class="ai-brief"><div class="ai-brief-text ai-loading">Generating full AI portrait via Inkwell Awareness Model...</div></div>';
  const sys='You are the Empathic Guest Intelligence system for a luxury hotel, powered by the Inkwell Awareness Model. Core principles: empathy, reciprocity, clarity. Generate a comprehensive guest portrait with these sections:\n1. STAFF BRIEFING (what to do before/during this stay)\n2. THREE PROACTIVE GESTURES (ranked by impact)\n3. ONE THING TO AVOID (based on complaint history)\n4. SOCIAL MENTION PROBABILITY (likelihood of social media mention, with reasoning)\nBe specific and actionable. Hard rule: AI suggests, humans deliver.';
  const text=await gemini('Full guest record for portrait generation: '+JSON.stringify(g),sys);
  el.innerHTML=`<div class="portrait-section"><div class="portrait-section-title">Full AI Portrait</div><div class="ai-brief"><div class="ai-brief-text">${text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div></div></div>`;
}

// Search & filter
document.getElementById('searchBox').addEventListener('input',e=>{searchQuery=e.target.value;renderSidebar()});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    renderSidebar();
  });
});

// Room service timer update
setInterval(()=>{if(document.querySelector('.rs-monitor'))renderSidebar()},30000);

// Mobile nav
function hospMobileNav(tab) {
  document.querySelectorAll('.hosp-mn-tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('hmnav-'+tab);if(el)el.classList.add('active');
  const sidebar=document.getElementById('sidebar');
  const portrait=document.getElementById('portraitPanel');
  if(tab==='guests') {
    sidebar.classList.add('mobile-open');
    if(portrait)portrait.style.display='';
  } else if(tab==='alerts') {
    sidebar.classList.add('mobile-open');
    // Scroll to alerts
    const alerts=document.querySelector('.section-label');if(alerts)alerts.scrollIntoView({behavior:'smooth'});
  } else if(tab==='insights') {
    sidebar.classList.remove('mobile-open');
    if(portrait)portrait.style.display='';
  } else if(tab==='settings') {
    sidebar.classList.remove('mobile-open');
    if(portrait){
      portrait.innerHTML='<div class="empty-state"><div class="icon">⚙️</div><p>Settings</p><p style="font-size:12px;opacity:.6;margin-top:8px">Hotel: The Meridian &nbsp;|&nbsp; Model: Inkwell Awareness</p></div>';
    }
  }
}
// Close sidebar on portrait tap (mobile)
document.getElementById('portraitPanel').addEventListener('click',()=>{
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('mobile-open');
});

// Init
renderSidebar();
</script>
</body>
</html>
