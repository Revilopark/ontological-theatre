<!DOCTYPE html>
<html lang="en">
<head>

<title>THE OCCURRENCE — A Slenderman Comic</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04040a;--s1:#0a0a12;--s2:#12121c;--s3:#1a1a28;
  --red:#8b0000;--red2:#cc1100;--green:#00ff41;--greeng:rgba(0,255,65,.08);
  --text:#e8e4dc;--muted:#5a5560;--border:#1a1a28;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --horror:'Special Elite',monospace;
  --r:6px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

/* ── SCANLINE OVERLAY ── */
body::after{
  content:'';position:fixed;inset:0;z-index:99999;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,.08) 2px,
    rgba(0,0,0,.08) 4px
  );
}

/* ── SCREEN FLICKER ── */
@keyframes flicker{
  0%,95%,100%{opacity:1}
  96%{opacity:.92}
  97%{opacity:.98}
  98%{opacity:.88}
  99%{opacity:1}
}
body{animation:flicker 8s infinite}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100%}
.topbar{height:48px;background:rgba(4,4,10,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
.logo{font-family:'Creepster',cursive;font-size:1.2rem;font-weight:400;
  color:var(--red);letter-spacing:.08em;text-shadow:0 0 12px rgba(139,0,0,.5)}
.logo em{font-style:italic;font-weight:400;color:var(--muted);font-size:.75rem;
  font-family:var(--sans);letter-spacing:0}
.top-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.tbtn{padding:.3rem .7rem;border-radius:4px;border:1px solid var(--border);
  background:var(--s1);color:var(--muted);font-size:.7rem;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:var(--sans)}
.tbtn:hover{border-color:var(--red);color:var(--red)}
.tbtn.red{background:var(--red);color:#fff;border-color:var(--red);font-weight:700}
.tbtn.red:hover{opacity:.9;box-shadow:0 0 12px rgba(139,0,0,.4)}
.tbtn:disabled{opacity:.4;cursor:default}
.ep-tag{font-family:var(--mono);font-size:.6rem;color:var(--green);
  padding:.15rem .4rem;background:var(--greeng);border:1px solid rgba(0,255,65,.2);border-radius:3px}

.workspace{flex:1;display:flex;overflow:hidden}

/* ── EPISODE SELECTOR ── */
.sidebar{width:260px;background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-hdr{padding:12px 14px;border-bottom:1px solid var(--border);
  font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.15em}
.sb-scroll{flex:1;overflow-y:auto;padding:8px}
.ep-card{padding:12px;border-radius:var(--r);border:1px solid transparent;
  cursor:pointer;transition:all .2s;margin-bottom:6px}
.ep-card:hover{background:var(--s2);border-color:var(--border)}
.ep-card.active{background:rgba(139,0,0,.08);border-color:rgba(139,0,0,.35)}
.ep-era{font-size:.55rem;font-weight:700;color:var(--green);letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;font-family:var(--mono)}
.ep-title{font-family:var(--horror);font-size:.95rem;font-weight:400;color:var(--text);margin-bottom:3px}
.ep-sub{font-size:.68rem;color:var(--muted);line-height:1.5}
.ep-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ep-chip{font-size:.55rem;padding:.15rem .4rem;background:var(--s2);border:1px solid var(--border);
  border-radius:3px;color:var(--muted)}

/* panel list under selected ep */
.panel-list{border-top:1px solid var(--border);padding:8px;flex-shrink:0;max-height:240px;overflow-y:auto}
.pl-item{display:flex;gap:8px;align-items:center;padding:5px 8px;border-radius:4px;
  cursor:pointer;font-size:.7rem;color:var(--muted);transition:all .15s;margin-bottom:2px}
.pl-item:hover{background:var(--s2);color:var(--text)}
.pl-item.active{color:var(--red);background:rgba(139,0,0,.08)}
.pl-item.done{color:var(--text)}
.pl-item.done::before{content:'✓';color:var(--green);font-size:.6rem;margin-right:2px}
.pl-thumb{width:32px;height:24px;border-radius:3px;overflow:hidden;background:var(--s3);flex-shrink:0}
.pl-thumb img{width:100%;height:100%;object-fit:cover}
.pl-num{font-family:var(--mono);font-size:.6rem;color:var(--red);width:16px;flex-shrink:0}

/* ── CENTER — PHONE PREVIEW ── */
.center{flex:1;display:flex;flex-direction:column;align-items:center;
  background:var(--bg);overflow:hidden;padding:12px 0}
.gen-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.gen-progress{font-size:.68rem;color:var(--muted);font-family:var(--mono)}

.phone{background:#020208;border-radius:40px;border:3px solid #111118;
  box-shadow:0 0 0 1px #060610,0 20px 60px rgba(0,0,0,.9),inset 0 0 0 1px rgba(0,255,65,.04);
  overflow:hidden;position:relative;width:340px;height:640px;flex-shrink:0}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:110px;height:26px;background:#020208;border-radius:0 0 16px 16px;z-index:10}
.phone-screen{height:100%;overflow-y:scroll;overflow-x:hidden;padding-top:26px;
  background:#020206;scroll-behavior:smooth;
  /* greenish tint */
  box-shadow:inset 0 0 80px rgba(0,255,65,.03)}
.phone-screen::-webkit-scrollbar{display:none}

/* STRIP PANELS */
.strip-title{padding:32px 20px 16px;text-align:center}
.strip-title .st-era{font-size:.55rem;font-weight:700;color:var(--green);
  letter-spacing:.25em;text-transform:uppercase;margin-bottom:6px;font-family:var(--mono)}
.strip-title h2{font-family:'Creepster',cursive;font-size:1.4rem;color:var(--red);
  font-weight:400;line-height:1.3;margin-bottom:6px;text-shadow:0 0 20px rgba(139,0,0,.3)}
.strip-title .st-sub{font-size:.72rem;color:var(--muted);font-style:italic;
  font-family:var(--horror)}
.strip-end{padding:24px 20px 48px;text-align:center}
.strip-end .se-mark{font-family:var(--horror);font-size:1.2rem;color:var(--red);font-weight:700;margin-bottom:4px}
.strip-end .se-sub{font-size:.65rem;color:var(--muted)}

.s-panel{width:100%;position:relative;overflow:hidden}
.s-panel img{width:100%;display:block;filter:contrast(1.1) saturate(.85)}
.s-panel .s-placeholder{width:100%;display:flex;align-items:center;justify-content:center;
  background:var(--s2);flex-direction:column;gap:6px;
  border:1px dashed rgba(139,0,0,.2)}
.s-panel .s-placeholder .s-ph-num{font-family:var(--mono);font-size:.6rem;color:var(--red)}
.s-panel .s-placeholder .s-ph-desc{font-size:.65rem;color:var(--muted);text-align:center;
  padding:0 20px;line-height:1.5}
.s-panel .gen-spin{position:absolute;inset:0;background:rgba(0,0,0,.8);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;font-size:.65rem;color:var(--muted)}

/* captions */
.s-caption{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;
  background:linear-gradient(transparent,rgba(4,4,10,.9));
  font-family:var(--horror);font-size:.72rem;color:var(--text);
  line-height:1.6}
.s-caption.top{bottom:auto;top:0;
  background:linear-gradient(rgba(4,4,10,.9),transparent)}
.s-caption .cap-tag{font-size:.5rem;font-weight:700;color:var(--green);
  letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:3px;font-family:var(--mono)}

.spin{width:20px;height:20px;border:2px solid rgba(139,0,0,.15);
  border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RIGHT — EDITOR ── */
.editor{width:260px;background:var(--s1);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden}
.ed-hdr{padding:10px 14px;border-bottom:1px solid var(--border);
  font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.15em}
.ed-scroll{flex:1;overflow-y:auto;padding:14px}
.ed-section{margin-bottom:14px}
.ed-label{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);margin-bottom:5px}
.ed-ta{width:100%;padding:.55rem .7rem;border-radius:4px;border:1px solid var(--border);
  background:var(--s2);color:var(--text);font-size:.78rem;font-family:var(--sans);
  resize:none;line-height:1.6}
.ed-ta:focus{outline:none;border-color:rgba(139,0,0,.4)}
.ed-ta::placeholder{color:var(--muted)}
.ed-small{font-size:.6rem;color:var(--muted);margin-top:3px;font-style:italic;line-height:1.4}
.gen-one{width:100%;padding:.55rem;border-radius:4px;border:none;
  background:var(--red);color:#fff;font-size:.78rem;font-weight:700;
  cursor:pointer;font-family:var(--sans);transition:all .2s;margin-top:4px}
.gen-one:hover{opacity:.9;box-shadow:0 0 16px rgba(139,0,0,.4)}
.gen-one:disabled{opacity:.4;cursor:default}
.gen-one.regen{background:var(--s2);color:var(--red);border:1px solid var(--red)}
.gen-one.regen:hover{background:rgba(139,0,0,.08)}

.ed-row{display:flex;gap:6px}
.ed-row .ed-ta{flex:1}
.char-chips{display:flex;gap:4px;flex-wrap:wrap}
.char-chip{padding:.2rem .5rem;border-radius:3px;font-size:.6rem;
  background:rgba(139,0,0,.08);border:1px solid rgba(139,0,0,.25);color:var(--red);
  cursor:pointer;transition:all .15s}
.char-chip:hover{background:rgba(139,0,0,.2)}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--border);border-radius:6px;
  padding:.45rem .9rem;font-size:.72rem;color:var(--text);z-index:99998;
  pointer-events:none;transition:opacity .3s;white-space:nowrap}
.toast.ok{border-color:rgba(0,255,65,.4);color:var(--green)}
.toast.err{border-color:rgba(139,0,0,.4);color:var(--red2)}
.toast.hide{opacity:0}

/* ── RANDOM GLITCH EFFECT ── */
@keyframes glitchH{
  0%{clip-path:inset(40% 0 60% 0);transform:translate(-2px,0)}
  20%{clip-path:inset(10% 0 85% 0);transform:translate(2px,0)}
  40%{clip-path:inset(70% 0 5% 0);transform:translate(-1px,0)}
  60%{clip-path:inset(50% 0 30% 0);transform:translate(1px,0)}
  80%{clip-path:inset(20% 0 70% 0);transform:translate(-2px,0)}
  100%{clip-path:inset(0);transform:translate(0)}
}
.glitch-active .phone-screen{animation:glitchH .15s steps(3) 1}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="logo">THE OCCURRENCE <em>— found footage</em></div>
  <div class="top-right">
    <span class="ep-tag" id="genCount">0 / 0 panels</span>

</div>
</div>

const PANEL_TYPES = {
  standard:  {h:240, ratio:'4:3',  fal:'landscape_4_3'},
  cinematic: {h:152, ratio:'21:9', fal:'landscape_16_9'},
  portrait:  {h:426, ratio:'3:4',  fal:'portrait_4_3'},
  tall:      {h:480, ratio:'9:16', fal:'portrait_4_3'},
  square:    {h:340, ratio:'1:1',  fal:'square'},
};

// ── STATE ────────────────────────────────────────────────────────────────────
let st = {
  epIdx: 0,
  selPanel: 0,
  panels: [],
  generating: false,
};

function curEp(){ return EPISODES[st.epIdx]; }

// ── RANDOM GLITCH ────────────────────────────────────────────────────────────
function triggerGlitch(){
  document.body.classList.add('glitch-active');
  setTimeout(()=> document.body.classList.remove('glitch-active'), 200);
}
setInterval(()=>{
  if(Math.random() < 0.15) triggerGlitch();
}, 5000 + Math.random() * 10000);

// ── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  renderEpList();
  selectEp(0);
}

function selectEp(idx){
  st.epIdx = idx;
  const ep = curEp();
  st.panels = ep.panels.map((p,i)=>({
    desc: p.desc, caption: p.caption, type: p.type,
    imageUrl: p.imageUrl || null, generating: false
  }));
  st.selPanel = 0;
  renderAll();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderAll(){
  renderEpList();
  renderPanelList();
  renderPhone();
  renderEditor();
  updateCounts();
}

function renderEpList(){
  const el = document.getElementById('epList');
  el.innerHTML = EPISODES.map((ep,i)=>`
    <div class="ep-card ${i===st.epIdx?'active':''}" onclick="selectEp(${i})">
      <div class="ep-era">${ep.era}</div>
      <div class="ep-title">${ep.title}</div>
      <div class="ep-sub">${ep.sub}</div>
      <div class="ep-meta">
        ${ep.chars.map(c=>`<span class="ep-chip">${c}</span>`).join('')}
        <span class="ep-chip">${ep.panels.length} panels</span>
      </div>
    </div>`).join('');
}

function renderPanelList(){
  const el = document.getElementById('panelList');
  el.innerHTML = st.panels.map((p,i)=>`
    <div class="pl-item ${i===st.selPanel?'active':''} ${p.imageUrl?'done':''}" onclick="selectPanelIdx(${i})">
      <span class="pl-num">${i+1}</span>
      <div class="pl-thumb">${p.imageUrl?`<img src="${p.imageUrl}">`:'<div style="width:100%;height:100%;background:var(--s3)"></div>'}</div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.desc.slice(0,40)||'(empty)'}</span>
    </div>`).join('');
}

function renderPhone(){
  const ep = curEp();
  const screen = document.getElementById('phoneScreen');
  let html = `<div class="strip-title">
    <div class="st-era">${ep.era}</div>
    <h2>${ep.title}</h2>
    <div class="st-sub">${ep.sub}</div>
  </div>`;

  st.panels.forEach((p,i)=>{
    const pt = PANEL_TYPES[p.type]||PANEL_TYPES.standard;
    const h = pt.h;
    html += `<div class="s-panel" id="sp-${i}" style="cursor:pointer" onclick="selectPanelIdx(${i})">`;
    if(p.generating){
      html += `<div class="s-placeholder" style="height:${h}px"></div>`;
      html += `<div class="gen-spin"><div class="spin"></div><span>Generating panel ${i+1}…</span></div>`;
    } else if(p.imageUrl){
      html += `<img src="${p.imageUrl}" style="min-height:${h*.6}px">`;
    } else {
      html += `<div class="s-placeholder" style="height:${h}px">
        <div class="s-ph-num">Panel ${i+1} · ${pt.ratio}</div>
        <div class="s-ph-desc">${p.desc.slice(0,80)||'Describe this scene…'}</div>
      </div>`;
    }
    if(p.caption && (p.imageUrl||p.generating)){
      const isFirst = i===0;
      html += `<div class="s-caption${isFirst?' top':''}">
        ${isFirst?'<span class="cap-tag">Case File</span>':''}
        ${p.caption}
      </div>`;
    }
    html += `</div>`;
  });

  html += `<div class="strip-end">
    <div class="se-mark">◈</div>
    <div class="se-sub">${ep.title} — THE OCCURRENCE</div>
  </div>`;
  screen.innerHTML = html;
}

function renderEditor(){
  const ed = document.getElementById('edScroll');
  if(!st.panels.length){
    ed.innerHTML='<div style="padding:30px 0;text-align:center;color:var(--muted);font-size:.78rem;font-family:var(--horror)">No panels</div>';
    return;
  }
  const p = st.panels[st.selPanel];
  const ep = curEp();
  const pt = PANEL_TYPES[p.type]||PANEL_TYPES.standard;

  ed.innerHTML = `
    <div class="ed-section">
      <div class="ed-label">Panel ${st.selPanel+1} of ${st.panels.length} · ${pt.ratio}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
        ${Object.entries(PANEL_TYPES).map(([k,t])=>`
          <span class="char-chip" style="${p.type===k?'background:var(--red);color:#fff;border-color:var(--red)':''}"
            onclick="setPanelType(${st.selPanel},'${k}')">${k} ${t.ratio}</span>
        `).join('')}
      </div>
    </div>
    <div class="ed-section">
      <div class="ed-label">Scene Description</div>
      <textarea class="ed-ta" rows="5" id="ed-desc"
        placeholder="Describe what happens in this panel…"
        oninput="st.panels[${st.selPanel}].desc=this.value">${esc(p.desc)}</textarea>
      ${ep.chars.length?`<div style="margin-top:5px"><div class="ed-label">Characters</div>
        <div class="char-chips">${ep.chars.map(c=>`<span class="char-chip" onclick="injectChar('${esc(c)}')">${c}</span>`).join('')}</div></div>`:''}
    </div>
    <div class="ed-section">
      <div class="ed-label">Caption / Narration</div>
      <textarea class="ed-ta" rows="3" id="ed-cap"
        placeholder="Optional narration text overlay…"
        oninput="st.panels[${st.selPanel}].caption=this.value||null">${esc(p.caption||'')}</textarea>
      <button class="tbtn" style="margin-top:4px;width:100%" onclick="aiCaption(${st.selPanel})">✦ AI Write Caption</button>
    </div>
    <div class="ed-section">
      <button class="gen-one ${p.imageUrl?'regen':''}" onclick="generateOne(${st.selPanel})" ${p.generating?'disabled':''}>
        ${p.generating?'Generating…':p.imageUrl?'↻ Regenerate':'✦ Generate This Panel'}
      </button>
    </div>
    <div class="ed-section" style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="tbtn" onclick="addPanelAt(${st.selPanel})">+ Insert Before</button>
      <button class="tbtn" onclick="addPanelAt(${st.selPanel+1})">+ Insert After</button>
      <button class="tbtn" onclick="removePanelAt(${st.selPanel})" style="color:var(--red2)">× Remove</button>
    </div>`;
}

function updateCounts(){
  const done = st.panels.filter(p=>p.imageUrl).length;
  document.getElementById('genCount').textContent = `${done} / ${st.panels.length} panels`;
  document.getElementById('genStatus').textContent = st.generating
    ? 'Generating…' : done===st.panels.length&&done>0
    ? `${curEp().title} — Complete ✓` : `${curEp().title}`;
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function selectPanelIdx(i){
  st.selPanel = i;
  renderPanelList();
  renderEditor();
  document.querySelectorAll('.s-panel').forEach((el,j)=>{
    el.style.outline = j===i ? '2px solid var(--red)' : 'none';
  });
  const el = document.getElementById('sp-'+i);
  if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function setPanelType(i,type){
  st.panels[i].type = type;
  renderAll();
}

function injectChar(name){
  const ta = document.getElementById('ed-desc');
  if(!ta) return;
  const add = st.panels[st.selPanel].desc ? `, ${name}` : name;
  ta.value += add;
  st.panels[st.selPanel].desc = ta.value;
}

function addPanelAt(i){
  st.panels.splice(i,0,{desc:'',caption:null,type:'standard',imageUrl:null,generating:false});
  st.selPanel = i;
  renderAll();
}

function removePanelAt(i){
  if(st.panels.length<=1) return;
  st.panels.splice(i,1);
  if(st.selPanel>=st.panels.length) st.selPanel = st.panels.length-1;
  renderAll();
}

// ── GENERATE ─────────────────────────────────────────────────────────────────
function buildFalPrompt(panel){
  const ep = curEp();
  let charDescs = '';
  for(const name of ep.chars){
    if(panel.desc.toLowerCase().includes(name.toLowerCase().split(' ')[0]) && CHARACTERS[name]){
      charDescs += CHARACTERS[name] + ', ';
    }
  }
  return `${STYLE}, ${charDescs}${panel.desc}`;
}

async function generateOne(i){
  const p = st.panels[i];
  if(!p.desc.trim()){ toast('Write a scene description first','err'); return; }
  p.generating = true;
  renderAll();
  try{
    const pt = PANEL_TYPES[p.type]||PANEL_TYPES.standard;
    const r = await fetch(FAL,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'fal-ai/flux/schnell',
        prompt: buildFalPrompt(p),
        image_size: pt.fal,
        num_inference_steps: 4,
      })
    });
    const data = await r.json();
    const url = data?.images?.[0]?.url;
    if(url){ p.imageUrl = url; toast('Panel generated ✓','ok'); triggerGlitch(); }
    else throw new Error(data?.detail||'No image');
  } catch(e){ toast('Failed: '+e.message,'err'); }
  p.generating = false;
  renderAll();
}

async function generateAll(){
  if(st.generating) return;
  const empty = st.panels.filter(p=>!p.imageUrl && p.desc.trim());
  if(!empty.length){ toast('All panels generated or no descriptions','err'); return; }
  st.generating = true;
  document.getElementById('genAllBtn').disabled = true;
  renderAll();
  for(let i=0;i<st.panels.length;i++){
    const p = st.panels[i];
    if(p.imageUrl || !p.desc.trim()) continue;
    document.getElementById('genStatus').textContent = `Generating panel ${i+1} of ${st.panels.length}…`;
    await generateOne(i);
    await new Promise(r=>setTimeout(r,300));
  }
  st.generating = false;
  document.getElementById('genAllBtn').disabled = false;
  renderAll();
  toast('Episode complete ✓','ok');
}

// ── AI CAPTION ───────────────────────────────────────────────────────────────
async function aiCaption(i){
  const p = st.panels[i];
  if(!p.desc.trim()){ toast('Write a scene description first','err'); return; }
  toast('Writing caption…');
  try{
    const ep = curEp();
    const r = await fetch(GEM,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:`You are the Narrator of THE OCCURRENCE — a found-footage horror ARG about Slenderman. Write in a clinical, unsettling documentary voice. Like a police report that slowly loses its objectivity. Short, declarative sentences. Present tense. No flowery language. State facts that feel wrong. One or two sentences maximum. Think: the calm before you realize what you're reading.`}]},
        contents:[{parts:[{text:`Episode: "${ep.title}" — ${ep.era}\nScene description: ${p.desc}\n\nWrite a single caption (1-2 sentences) for this comic panel. Clinical narration, not dialogue. State facts. Make them wrong.`}]}]
      })
    });
    const data = await r.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if(text){
      p.caption = text.replace(/^["']|["']$/g,'').trim();
      document.getElementById('ed-cap').value = p.caption;
      renderPhone();
      toast('Caption written ✓','ok');
    } else throw new Error('No text');
  } catch(e){ toast('Caption failed: '+e.message,'err'); }
}

// ── EXPORT ───────────────────────────────────────────────────────────────────
async function exportStrip(){
  const generated = st.panels.filter(p=>p.imageUrl);
  if(!generated.length){ toast('Generate some panels first','err'); return; }
  toast('Building strip…');
  const W = 340;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  let totalH = 80;
  const items = [];
  for(const p of generated){
    const pt = PANEL_TYPES[p.type]||PANEL_TYPES.standard;
    const img = new Image(); img.crossOrigin = 'anonymous';
    await new Promise(r=>{img.onload=r;img.onerror=r;img.src=p.imageUrl;});
    const h = Math.round(W * (pt.h / 340));
    items.push({img,h,panel:p});
    totalH += h;
  }
  totalH += 60;
  canvas.height = totalH;
  const ctx = canvas.getContext('2d');

  // Dark background
  ctx.fillStyle = '#04040a';
  ctx.fillRect(0,0,W,totalH);

  // Title
  ctx.fillStyle = '#00ff41';
  ctx.font = '700 9px "DM Sans"';
  ctx.textAlign = 'center';
  ctx.fillText(curEp().era, W/2, 28);
  ctx.fillStyle = '#8b0000';
  ctx.font = '900 22px "Creepster",cursive';
  ctx.fillText(curEp().title, W/2, 52);
  ctx.fillStyle = '#5a5560';
  ctx.font = '11px "Special Elite",monospace';
  ctx.fillText(curEp().sub.slice(0,50), W/2, 68);

  let y = 80;
  for(const {img,h,panel} of items){
    ctx.drawImage(img,0,y,W,h);
    // Add green tint overlay
    ctx.fillStyle = 'rgba(0,255,65,0.03)';
    ctx.fillRect(0,y,W,h);
    if(panel.caption){
      const grad = ctx.createLinearGradient(0,y+h-50,0,y+h);
      grad.addColorStop(0,'transparent');
      grad.addColorStop(1,'rgba(4,4,10,0.9)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,y+h-50,W,50);
      ctx.fillStyle = '#e8e4dc';
      ctx.font = '10px "Special Elite",monospace';
      ctx.textAlign = 'left';
      wrapText(ctx, panel.caption, 14, y+h-18, W-28, 12);
      ctx.textAlign = 'center';
    }
    y += h;
  }
  // Scanline effect on canvas
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for(let sy=0; sy<totalH; sy+=4){
    ctx.fillRect(0,sy,W,2);
  }

  ctx.fillStyle = '#8b0000';
  ctx.font = '700 16px "Creepster",cursive';
  ctx.fillText('◈', W/2, y+24);
  ctx.fillStyle = '#5a5560';
  ctx.font = '9px "DM Sans"';
  ctx.fillText(curEp().title+' — THE OCCURRENCE', W/2, y+40);

  const link = document.createElement('a');
  link.download = 'occurrence-' + curEp().id + '.jpg';
  link.href = canvas.toDataURL('image/jpeg',.92);
  link.click();
  toast('Strip exported ✓','ok');
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words = text.split(' ');
  let line = '';
  for(const w of words){
    const test = line + w + ' ';
    if(ctx.measureText(test).width > maxW && line){
      ctx.fillText(line.trim(),x,y);
      line = w + ' ';
      y += lineH;
    } else line = test;
  }
  if(line) ctx.fillText(line.trim(),x,y);
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+(type||'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.add('hide'),3000);
}

init();
</script>
