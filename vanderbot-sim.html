<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f0f2f5">
<title>VanderBot Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Inkwell Light Glass Morphic */
  --bg:#f0f2f5;
  --bg-warm:#f8f6f3;
  --surface:rgba(255,255,255,0.72);
  --surface-solid:#ffffff;
  --card:rgba(255,255,255,0.55);
  --card-hover:rgba(255,255,255,0.75);
  --border:rgba(0,0,0,0.06);
  --border-strong:rgba(0,0,0,0.1);
  --border-focus:rgba(102,126,234,0.4);

  /* Glass */
  --glass-bg:rgba(255,255,255,0.6);
  --glass-blur:blur(24px);
  --glass-border:rgba(255,255,255,0.7);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
  --glass-shadow-hover:0 12px 40px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.9);

  /* Accents */
  --ink-blue:#4f6df0;
  --ink-blue-soft:rgba(79,109,240,0.1);
  --ink-blue-mid:rgba(79,109,240,0.15);
  --ink-cyan:#0891b2;
  --ink-cyan-soft:rgba(8,145,178,0.08);
  --ink-purple:#7c3aed;
  --ink-purple-soft:rgba(124,58,237,0.08);
  --ink-green:#059669;
  --ink-green-soft:rgba(5,150,105,0.08);
  --ink-gold:#b8860b;
  --ink-gold-soft:rgba(184,134,11,0.08);
  --ink-red:#dc2626;
  --ink-red-soft:rgba(220,38,38,0.08);
  --ink-orange:#ea580c;

  /* Gradients */
  --grad-primary:linear-gradient(135deg,#667eea,#764ba2);
  --grad-blue:linear-gradient(135deg,#4f6df0,#6366f1);
  --grad-mesh:radial-gradient(ellipse 80% 50% at 20% 0%, rgba(99,102,241,0.08) 0%, transparent 60%),
              radial-gradient(ellipse 60% 40% at 80% 100%, rgba(6,182,212,0.06) 0%, transparent 50%);

  /* Text */
  --text:#1a1a2e;
  --text-secondary:#4a4a6a;
  --text-tertiary:#8a8aa0;
  --text-dim:#b0b0c0;

  /* Motion */
  --ease:cubic-bezier(0.0,0,0.2,1);
  --spring:cubic-bezier(0.34,1.56,0.64,1);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  background-image:var(--grad-mesh);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
input,textarea{font-size:16px!important;}
button{min-height:44px;font-family:inherit;border:none;background:none;cursor:pointer;}

/* ── APP SHELL ── */
.app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ── NAV BAR ── */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  max-width:430px;margin:0 auto;
  height:68px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;align-items:center;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom,8px);
  z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 24px;border-radius:14px;cursor:pointer;transition:all 0.2s var(--ease);
}
.nav-item .ni{font-size:22px;transition:transform 0.2s var(--spring);}
.nav-item .nl{font-size:10px;font-weight:600;letter-spacing:0.4px;}
.nav-item.active{background:var(--ink-blue-soft);}
.nav-item.active .ni{transform:scale(1.1);}
.nav-item.active .nl{color:var(--ink-blue);}
.nav-item:not(.active) .nl{color:var(--text-dim);}
.nav-item:active{transform:scale(0.92);}

/* ── TOP BAR ── */
.top-bar{
  height:56px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;align-items:center;
  padding:0 16px;gap:12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.top-bar .back{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;font-size:22px;color:var(--ink-blue);font-weight:600;
  transition:background 0.15s;
}
.top-bar .back:active{background:var(--ink-blue-soft);}
.top-bar h2{font-size:17px;font-weight:600;color:var(--text);}

/* ── GLASS CARD ── */
.glass{
  background:var(--card);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);
  border-radius:16px;
  box-shadow:var(--glass-shadow);
  transition:all 0.2s var(--ease);
  cursor:pointer;
}
.glass:active{transform:scale(0.98);box-shadow:var(--glass-shadow-hover);}

/* ═══════════════════════════════════
   HOME SCREEN
   ═══════════════════════════════════ */
.home-scroll{
  flex:1;overflow-y:auto;padding:20px 20px 88px;
  -webkit-overflow-scrolling:touch;
}
.home-header{margin-bottom:4px;}
.home-header h1{
  font-size:28px;font-weight:700;letter-spacing:-0.5px;
  background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.home-header p{font-size:13px;color:var(--text-tertiary);margin-top:2px;}

.quick-actions{display:flex;gap:10px;margin-top:20px;}
.qa{
  flex:1;border-radius:16px;padding:18px 6px;text-align:center;
  cursor:pointer;transition:all 0.2s var(--ease);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid;
  box-shadow:0 4px 16px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
}
.qa:active{transform:scale(0.94);}
.qa .icon{font-size:24px;}
.qa .label{font-size:10px;margin-top:7px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase;}
.qa.blue{background:var(--ink-blue-soft);border-color:rgba(79,109,240,0.15);}
.qa.blue .label{color:var(--ink-blue);}
.qa.doc{background:var(--ink-cyan-soft);border-color:rgba(8,145,178,0.12);}
.qa.doc .label{color:var(--ink-cyan);}
.qa.purple{background:var(--ink-purple-soft);border-color:rgba(124,58,237,0.12);}
.qa.purple .label{color:var(--ink-purple);}
.qa.cyan{background:var(--ink-green-soft);border-color:rgba(5,150,105,0.12);}
.qa.cyan .label{color:var(--ink-green);}

.section-header{display:flex;justify-content:space-between;align-items:center;margin-top:26px;margin-bottom:12px;}
.section-header h3{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.2px;}
.section-header a{font-size:12px;color:var(--ink-blue);text-decoration:none;font-weight:600;}

.list-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;margin-bottom:8px;
}
.li-icon{
  width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.li-icon.chat-icon{background:var(--ink-blue-soft);}
.li-info{flex:1;min-width:0;}
.li-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.li-meta{font-size:11px;color:var(--text-tertiary);margin-top:2px;display:flex;gap:6px;align-items:center;}
.li-meta .live{color:var(--ink-green);font-weight:600;}
.li-arrow{color:var(--text-dim);font-size:18px;}

/* ═══════════════════════════════════
   CHAT SCREEN
   ═══════════════════════════════════ */
.chat-messages{
  flex:1;overflow-y:auto;padding:16px 16px 8px;
  display:flex;flex-direction:column;gap:10px;
  -webkit-overflow-scrolling:touch;
  background:var(--bg-warm);
}
.bubble{
  max-width:82%;padding:11px 15px;font-size:14px;line-height:1.55;
  animation:fadeUp 0.25s var(--ease);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.bubble.user{
  align-self:flex-end;
  background:var(--grad-blue);
  color:white;
  border-radius:20px 20px 4px 20px;
  box-shadow:0 4px 16px rgba(79,109,240,0.2);
}
.bubble.bot{
  align-self:flex-start;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(0,0,0,0.05);
  border-radius:20px 20px 20px 4px;
  color:var(--text);
  box-shadow:0 2px 12px rgba(0,0,0,0.04);
}
.bubble.bot b{color:var(--ink-blue);}
.typing-dots{color:var(--ink-blue);font-size:18px;letter-spacing:3px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}

.chat-input-bar{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  padding:10px 12px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
  display:flex;align-items:flex-end;gap:8px;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.attach-btn{
  width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--text-tertiary);border-radius:10px;flex-shrink:0;
  transition:background 0.15s;
}
.attach-btn:active{background:rgba(0,0,0,0.04);}
.chat-input{
  flex:1;
  background:rgba(0,0,0,0.04);
  border:1px solid var(--border);
  border-radius:22px;
  padding:10px 16px;
  color:var(--text);font-size:14px;
  outline:none;resize:none;
  min-height:40px;max-height:120px;line-height:1.4;
  transition:border-color 0.2s,background 0.2s;
}
.chat-input:focus{border-color:var(--border-focus);background:rgba(255,255,255,0.8);}
.chat-input::placeholder{color:var(--text-dim);}
.send-btn{
  width:40px;height:40px;
  background:var(--grad-blue);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s var(--ease);
  color:white;font-size:18px;font-weight:700;
  box-shadow:0 4px 12px rgba(79,109,240,0.25);
}
.send-btn:disabled{opacity:0.3;box-shadow:none;}
.send-btn:not(:disabled):active{transform:scale(0.88);}

/* ═══════════════════════════════════
   FILES SCREEN
   ═══════════════════════════════════ */
.files-scroll{flex:1;overflow-y:auto;padding:0 16px 88px;-webkit-overflow-scrolling:touch;}
.filters{display:flex;gap:8px;padding:12px 0;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{
  padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;
  border:1px solid var(--border);background:rgba(255,255,255,0.5);color:var(--text-tertiary);
  cursor:pointer;white-space:nowrap;transition:all 0.2s var(--ease);letter-spacing:0.3px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.chip:active{transform:scale(0.94);}
.chip.active{
  background:var(--ink-blue-soft);color:var(--ink-blue);
  border-color:rgba(79,109,240,0.2);
  box-shadow:0 2px 8px rgba(79,109,240,0.1);
}

.file-item{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;margin-bottom:8px;
}
.file-icon{
  width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.file-icon.page{background:var(--ink-green-soft);}
.file-icon.deck{background:var(--ink-purple-soft);}
.file-icon.doc{background:var(--ink-cyan-soft);}
.file-info{flex:1;min-width:0;}
.file-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.file-meta{font-size:11px;color:var(--text-tertiary);margin-top:3px;display:flex;gap:8px;align-items:center;}
.file-meta .live{color:var(--ink-green);font-weight:600;}

/* ── DOC DETAIL ── */
.doc-detail{padding:20px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px;}
.doc-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.3px;margin-bottom:4px;}
.doc-meta-line{font-size:12px;color:var(--text-tertiary);margin-bottom:18px;}
.doc-actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.doc-btn{
  padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:all 0.2s var(--ease);min-height:44px;border:1px solid transparent;
}
.doc-btn:active{transform:scale(0.95);}
.doc-btn.primary{
  background:var(--grad-blue);color:white;
  box-shadow:0 4px 12px rgba(79,109,240,0.2);
}
.doc-btn.open{background:var(--ink-green-soft);color:var(--ink-green);border-color:rgba(5,150,105,0.15);}
.doc-btn.danger{background:var(--ink-red-soft);color:var(--ink-red);border-color:rgba(220,38,38,0.12);}
.doc-content-preview{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:14px;
  padding:16px;font-size:13px;line-height:1.7;color:var(--text-secondary);
  white-space:pre-wrap;
}

/* ── TOAST ── */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:var(--grad-blue);color:white;padding:12px 24px;border-radius:14px;
  font-size:13px;font-weight:600;z-index:200;
  box-shadow:0 8px 24px rgba(79,109,240,0.3);
  transition:transform 0.3s var(--spring);pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── SUBTLE MESH BG ── */
.home-scroll::before{
  content:'';position:fixed;top:0;left:0;right:0;height:300px;
  background:radial-gradient(ellipse 70% 50% at 30% 0%,rgba(99,102,241,0.07) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 70% 0%,rgba(6,182,212,0.05) 0%,transparent 50%);
  pointer-events:none;z-index:-1;
}
</style>
</head>
<body>
<div class="app" id="app">

<div class="toast" id="toast"></div>

<!-- ═══ HOME ═══ -->
<div class="screen active" id="screen-home">
  <div class="home-scroll">
    <div class="home-header">
      <h1>VanderBot</h1>
      <p>Your AI workspace</p>
    </div>

    <div class="quick-actions">
      <div class="qa blue" onclick="newChat()"><div class="icon">💬</div><div class="label">Chat</div></div>
      <div class="qa doc" onclick="createDoc('doc')"><div class="icon">📄</div><div class="label">Doc</div></div>
      <div class="qa purple" onclick="createDoc('deck')"><div class="icon">📊</div><div class="label">Deck</div></div>
      <div class="qa cyan" onclick="createDoc('page')"><div class="icon">🌐</div><div class="label">Page</div></div>
    </div>

    <div class="section-header">
      <h3>Recent Chats</h3>
      <a href="#" onclick="navTo('chat');return false;">See all</a>
    </div>
    <div id="home-chats"></div>

    <div class="section-header">
      <h3>Recent Files</h3>
      <a href="#" onclick="navTo('files');return false;">See all</a>
    </div>
    <div id="home-files"></div>
  </div>
</div>

<!-- ═══ CHAT ═══ -->
<div class="screen" id="screen-chat">
  <div class="top-bar">
    <div class="back" onclick="navTo('home')">‹</div>
    <h2 id="chat-title">Chat</h2>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <button class="attach-btn" onclick="toast('📷 Image picker')">🖼️</button>
    <textarea class="chat-input" id="chat-input" placeholder="Message VanderBot…" rows="1"
      oninput="autoGrow(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>↑</button>
  </div>
</div>

<!-- ═══ FILES ═══ -->
<div class="screen" id="screen-files">
  <div class="top-bar">
    <div class="back" onclick="navTo('home')">‹</div>
    <h2>Files</h2>
  </div>
  <div class="files-scroll">
    <div class="filters" id="file-filters"></div>
    <div id="file-list"></div>
  </div>
</div>

<!-- ═══ DOC DETAIL ═══ -->
<div class="screen" id="screen-doc">
  <div class="top-bar">
    <div class="back" onclick="navTo('files')">‹</div>
    <h2>Document</h2>
  </div>
  <div class="doc-detail" id="doc-detail"></div>
</div>

<!-- ═══ NAV BAR ═══ -->
<div class="nav-bar" id="nav-bar">
  <div class="nav-item active" data-screen="home" onclick="navTo('home')">
    <div class="ni">🏠</div><div class="nl">Home</div>
  </div>
  <div class="nav-item" data-screen="files" onclick="navTo('files')">
    <div class="ni">📁</div><div class="nl">Files</div>
  </div>
</div>

</div>

    {id:'d7',title:'bmos-venues.html',type:'page',version:1,date:'Feb 27',published:true,url:'#',content:'360 US Live Performance Venues\nOperators: Live Nation, Independent, AEG, MSG, OVG'}
  ],
  currentChat:null,currentDoc:null,fileFilter:'all',activeScreen:'home'
};

function navTo(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ni=document.querySelector(`.nav-item[data-screen="${screen}"]`);
  if(ni)ni.classList.add('active');
  document.getElementById('nav-bar').style.display=(screen==='chat'||screen==='doc')?'none':'flex';
  state.activeScreen=screen;
  if(screen==='home')renderHome();
  if(screen==='files')renderFiles();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

function renderHome(){
  document.getElementById('home-chats').innerHTML=state.chats.slice(0,3).map(c=>`
    <div class="glass list-item" onclick="openChat('${c.id}')">
      <div class="li-icon chat-icon">💬</div>
      <div class="li-info"><div class="li-title">${c.title}</div><div class="li-meta">${c.time}</div></div>
      <span class="li-arrow">›</span>
    </div>`).join('');
  document.getElementById('home-files').innerHTML=state.docs.slice(0,4).map(d=>`
    <div class="glass list-item" onclick="openDoc('${d.id}')">
      <div class="li-icon" style="background:${typeBg(d.type)}">${typeIcon(d.type)}</div>
      <div class="li-info"><div class="li-title">${d.title}</div>
        <div class="li-meta"><span>${d.type.toUpperCase()}</span>${d.published?'<span class="live">● LIVE</span>':''}<span>v${d.version}</span></div>
      </div><span class="li-arrow">›</span>
    </div>`).join('');
}

function openChat(id){
  const chat=state.chats.find(c=>c.id===id);if(!chat)return;
  state.currentChat=chat;
  document.getElementById('chat-title').textContent=chat.title.length>28?chat.title.slice(0,28)+'…':chat.title;
  renderMessages();navTo('chat');
  setTimeout(()=>{const el=document.getElementById('chat-messages');el.scrollTop=el.scrollHeight;},50);
}
function newChat(){
  const id='c'+Date.now();
  state.chats.unshift({id,title:'New Chat',time:'Just now',messages:[]});
  openChat(id);
}
function renderMessages(){
  const chat=state.currentChat;if(!chat)return;
  const el=document.getElementById('chat-messages');
  if(!chat.messages.length){
    el.innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;"><div style="font-size:52px;">🐘</div><div style="color:var(--text-tertiary);margin-top:14px;font-size:15px;font-weight:500;">What are we building?</div></div>';
    return;
  }
  el.innerHTML=chat.messages.map(m=>`<div class="bubble ${m.role==='user'?'user':'bot'}">${m.text}</div>`).join('');
}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';document.getElementById('send-btn').disabled=el.value.trim()==='';}
function sendMsg(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();if(!text||!state.currentChat)return;
  state.currentChat.messages.push({role:'user',text});
  if(state.currentChat.messages.length<=2)state.currentChat.title=text.slice(0,50);
  state.currentChat.time='Just now';
  input.value='';input.style.height='auto';
  document.getElementById('send-btn').disabled=true;
  renderMessages();
  const el=document.getElementById('chat-messages');el.scrollTop=el.scrollHeight;
  const tb=document.createElement('div');tb.className='bubble bot';
  tb.innerHTML='<span class="typing-dots">●●●</span>';
  el.appendChild(tb);el.scrollTop=el.scrollHeight;
  setTimeout(()=>{
    const responses=[
      "Got it. Let me work on that — I'll draft something that captures the full scope.",
      "Here's what I'd suggest:\n\n<b>1.</b> Start with the problem statement\n<b>2.</b> Layer in the technical architecture\n<b>3.</b> Show how IAM + Volvox connects everything\n<b>4.</b> Clear call to action\n\nWant me to build this out?",
      "Done. Structured across three sections:\n\n• <b>Product Process</b> — PMF → Partners → MVP → Legal\n• <b>Common Foundation</b> — IAM + Volvox Knowledge Graph\n• <b>Architecture</b> — Data → Intelligence → Experience\n\nShall I publish?",
      "The key insight is that all Inkwell ventures share the same graph infrastructure — what we build for one makes the others smarter. I'll incorporate that."
    ];
    state.currentChat.messages.push({role:'bot',text:responses[Math.floor(Math.random()*responses.length)]});
    renderMessages();el.scrollTop=el.scrollHeight;
  },1200+Math.random()*800);
}

function renderFiles(){
  const types=[['all','All'],['doc','Docs'],['deck','Decks'],['page','Pages']];
  document.getElementById('file-filters').innerHTML=types.map(([k,v])=>`
    <div class="chip ${state.fileFilter===k?'active':''}" onclick="setFilter('${k}')">${v}</div>`).join('');
  const docs=state.fileFilter==='all'?state.docs:state.docs.filter(d=>d.type===state.fileFilter);
  document.getElementById('file-list').innerHTML=docs.map(d=>`
    <div class="glass file-item" onclick="openDoc('${d.id}')">
      <div class="file-icon ${d.type}">${typeIcon(d.type)}</div>
      <div class="file-info"><div class="file-title">${d.title}</div>
        <div class="file-meta"><span>${d.type.toUpperCase()}</span><span>v${d.version}</span>${d.published?'<span class="live">● LIVE</span>':''}<span>${d.date}</span></div>
      </div><span style="color:var(--text-dim);font-size:18px;">›</span>
    </div>`).join('');
}
function setFilter(f){state.fileFilter=f;renderFiles();}
function openDoc(id){
  const doc=state.docs.find(d=>d.id===id);if(!doc)return;state.currentDoc=doc;
  document.getElementById('doc-detail').innerHTML=`
    <div class="doc-title">${doc.title}</div>
    <div class="doc-meta-line">${doc.type.toUpperCase()} · v${doc.version} · ${doc.date}</div>
    <div class="doc-actions">
      ${doc.type==='page'?`<button class="doc-btn primary" onclick="publishDoc()">🚀 ${doc.published?'Republish':'Publish'}</button>`:''}
      ${doc.published&&doc.url?`<button class="doc-btn open" onclick="window.open('${doc.url}','_blank')">🔗 View Live</button>`:''}
      <button class="doc-btn danger" onclick="toast('🗑️ Delete confirmation')">🗑️ Delete</button>
    </div>
    <div class="doc-content-preview">${doc.content}</div>`;
  navTo('doc');
}
function publishDoc(){if(!state.currentDoc)return;toast('🚀 Published to GitHub Pages!');state.currentDoc.published=true;}
function createDoc(type){
  const n={doc:'Document',deck:'Deck',page:'Page'}[type];
  const id='d'+Date.now();
  state.docs.unshift({id,title:`Untitled ${n}`,type,version:1,date:'Just now',published:false,content:`New ${n} — start editing…`});
  openDoc(id);
}

function typeIcon(t){return{doc:'📄',deck:'📊',page:'🌐'}[t]||'📄';}
function typeBg(t){return{doc:'var(--ink-cyan-soft)',deck:'var(--ink-purple-soft)',page:'var(--ink-green-soft)'}[t]||'var(--ink-cyan-soft)';}

renderHome();
</script>
</body>
</html>
