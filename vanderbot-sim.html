<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f0f2f5">
<title>VanderBot Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f5;
  --bg-warm:#f8f6f3;
  --surface:rgba(255,255,255,0.72);
  --card:rgba(255,255,255,0.55);
  --card-hover:rgba(255,255,255,0.78);
  --border:rgba(0,0,0,0.06);
  --border-strong:rgba(0,0,0,0.1);
  --border-focus:rgba(102,126,234,0.4);
  --glass-bg:rgba(255,255,255,0.6);
  --glass-blur:blur(24px);
  --glass-border:rgba(255,255,255,0.7);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
  --glass-shadow-hover:0 12px 40px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
  --ink-blue:#4f6df0;
  --ink-blue-soft:rgba(79,109,240,0.1);
  --ink-blue-mid:rgba(79,109,240,0.15);
  --ink-cyan:#0891b2;
  --ink-cyan-soft:rgba(8,145,178,0.08);
  --ink-purple:#7c3aed;
  --ink-purple-soft:rgba(124,58,237,0.08);
  --ink-green:#059669;
  --ink-green-soft:rgba(5,150,105,0.08);
  --ink-gold:#b8860b;
  --ink-gold-soft:rgba(184,134,11,0.08);
  --ink-red:#dc2626;
  --ink-red-soft:rgba(220,38,38,0.08);
  --ink-orange:#ea580c;
  --ink-orange-soft:rgba(234,88,12,0.08);
  --ink-rose:#e11d48;
  --ink-rose-soft:rgba(225,29,72,0.08);
  --ink-teal:#0d9488;
  --ink-teal-soft:rgba(13,148,136,0.08);
  --grad-primary:linear-gradient(135deg,#667eea,#764ba2);
  --grad-blue:linear-gradient(135deg,#4f6df0,#6366f1);
  --grad-research:linear-gradient(135deg,#0891b2,#06b6d4);
  --grad-notebook:linear-gradient(135deg,#ea580c,#f59e0b);
  --grad-infographic:linear-gradient(135deg,#e11d48,#f43f5e);
  --grad-mesh:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(99,102,241,0.08) 0%,transparent 60%),
              radial-gradient(ellipse 60% 40% at 80% 100%,rgba(6,182,212,0.06) 0%,transparent 50%);
  --text:#1a1a2e;
  --text-secondary:#4a4a6a;
  --text-tertiary:#8a8aa0;
  --text-dim:#b0b0c0;
  --ease:cubic-bezier(0.0,0,0.2,1);
  --spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);background-image:var(--grad-mesh);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
input,textarea{font-size:16px!important;}
button{min-height:44px;font-family:inherit;border:none;background:none;cursor:pointer;}

.app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative;}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* NAV */
.nav-bar{
  position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;height:72px;
  background:rgba(255,255,255,0.82);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;align-items:center;justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom,8px);z-index:100;
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;border-radius:14px;cursor:pointer;transition:all 0.2s var(--ease);}
.nav-item .ni{font-size:22px;transition:transform 0.2s var(--spring);}
.nav-item .nl{font-size:10px;font-weight:600;letter-spacing:0.4px;}
.nav-item.active{background:var(--ink-blue-soft);}
.nav-item.active .ni{transform:scale(1.1);}
.nav-item.active .nl{color:var(--ink-blue);}
.nav-item:not(.active) .nl{color:var(--text-dim);}
.nav-item:active{transform:scale(0.92);}

/* TOP BAR */
.top-bar{height:56px;background:rgba(255,255,255,0.75);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.top-bar .back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:22px;color:var(--ink-blue);font-weight:600;transition:background 0.15s;}
.top-bar .back:active{background:var(--ink-blue-soft);}
.top-bar h2{font-size:17px;font-weight:600;color:var(--text);}

/* GLASS */
.glass{background:var(--card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:16px;box-shadow:var(--glass-shadow);transition:all 0.2s var(--ease);cursor:pointer;}
.glass:active{transform:scale(0.98);box-shadow:var(--glass-shadow-hover);}

/* ═══ HOME ═══ */
.home-scroll{flex:1;overflow-y:auto;padding:20px 20px 92px;-webkit-overflow-scrolling:touch;}
.home-scroll::before{content:'';position:fixed;top:0;left:0;right:0;height:300px;background:radial-gradient(ellipse 70% 50% at 30% 0%,rgba(99,102,241,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 70% 0%,rgba(6,182,212,0.05) 0%,transparent 50%);pointer-events:none;z-index:-1;}
.home-header h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.home-header p{font-size:13px;color:var(--text-tertiary);margin-top:2px;}

/* QUICK ACTIONS — 2 rows */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px;}
.qa{border-radius:16px;padding:16px 4px;text-align:center;cursor:pointer;transition:all 0.2s var(--ease);border:1px solid;box-shadow:0 4px 16px rgba(0,0,0,0.04),inset 0 1px 0 rgba(255,255,255,0.8);}
.qa:active{transform:scale(0.93);}
.qa .icon{font-size:22px;}
.qa .label{font-size:9px;margin-top:6px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;line-height:1.3;}
.qa.blue{background:var(--ink-blue-soft);border-color:rgba(79,109,240,0.15);}.qa.blue .label{color:var(--ink-blue);}
.qa.doc{background:var(--ink-cyan-soft);border-color:rgba(8,145,178,0.12);}.qa.doc .label{color:var(--ink-cyan);}
.qa.purple{background:var(--ink-purple-soft);border-color:rgba(124,58,237,0.12);}.qa.purple .label{color:var(--ink-purple);}
.qa.green{background:var(--ink-green-soft);border-color:rgba(5,150,105,0.12);}.qa.green .label{color:var(--ink-green);}
.qa.rose{background:var(--ink-rose-soft);border-color:rgba(225,29,72,0.12);}.qa.rose .label{color:var(--ink-rose);}
.qa.orange{background:var(--ink-orange-soft);border-color:rgba(234,88,12,0.12);}.qa.orange .label{color:var(--ink-orange);}
.qa.teal{background:var(--ink-teal-soft);border-color:rgba(13,148,136,0.12);}.qa.teal .label{color:var(--ink-teal);}
.qa.gold{background:var(--ink-gold-soft);border-color:rgba(184,134,11,0.12);}.qa.gold .label{color:var(--ink-gold);}

.section-header{display:flex;justify-content:space-between;align-items:center;margin-top:26px;margin-bottom:12px;}
.section-header h3{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.2px;}
.section-header a{font-size:12px;color:var(--ink-blue);text-decoration:none;font-weight:600;}

.list-item{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:8px;}
.li-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.li-info{flex:1;min-width:0;}
.li-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.li-meta{font-size:11px;color:var(--text-tertiary);margin-top:2px;display:flex;gap:6px;align-items:center;}
.li-meta .live{color:var(--ink-green);font-weight:600;}
.li-arrow{color:var(--text-dim);font-size:18px;}

/* ═══ CREATE SCREEN ═══ */
.create-scroll{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch;}
.create-card{
  background:var(--card);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);border-radius:18px;
  padding:24px 20px;margin-bottom:14px;cursor:pointer;
  box-shadow:var(--glass-shadow);transition:all 0.2s var(--ease);
}
.create-card:active{transform:scale(0.98);}
.create-card .cc-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.create-card .cc-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.create-card .cc-title{font-size:16px;font-weight:700;color:var(--text);}
.create-card .cc-desc{font-size:13px;color:var(--text-secondary);line-height:1.5;}
.create-card .cc-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.cc-tag{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:600;letter-spacing:0.3px;}

/* ═══ CHAT ═══ */
.chat-messages{flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;background:var(--bg-warm);}
.bubble{max-width:82%;padding:11px 15px;font-size:14px;line-height:1.55;animation:fadeUp 0.25s var(--ease);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.bubble.user{align-self:flex-end;background:var(--grad-blue);color:white;border-radius:20px 20px 4px 20px;box-shadow:0 4px 16px rgba(79,109,240,0.2);}
.bubble.bot{align-self:flex-start;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(0,0,0,0.05);border-radius:20px 20px 20px 4px;color:var(--text);box-shadow:0 2px 12px rgba(0,0,0,0.04);}
.bubble.bot b{color:var(--ink-blue);}
.typing-dots{color:var(--ink-blue);font-size:18px;letter-spacing:3px;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}

/* Research card in chat */
.research-card{
  align-self:flex-start;max-width:88%;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(0,0,0,0.06);border-radius:18px;
  padding:16px;animation:fadeUp 0.3s var(--ease);
  box-shadow:0 4px 20px rgba(0,0,0,0.06);
}
.rc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rc-badge{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
.rc-title{font-size:15px;font-weight:700;color:var(--text);}
.rc-body{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.rc-sources{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
.rc-source{padding:3px 8px;border-radius:6px;font-size:10px;background:rgba(0,0,0,0.04);color:var(--text-tertiary);font-weight:500;}

.chat-input-bar{background:rgba(255,255,255,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));display:flex;align-items:flex-end;gap:8px;border-top:1px solid var(--border);flex-shrink:0;}
.attach-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-tertiary);border-radius:10px;flex-shrink:0;}
.attach-btn:active{background:rgba(0,0,0,0.04);}
.chat-input{flex:1;background:rgba(0,0,0,0.04);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--text);font-size:14px;outline:none;resize:none;min-height:40px;max-height:120px;line-height:1.4;transition:border-color 0.2s,background 0.2s;}
.chat-input:focus{border-color:var(--border-focus);background:rgba(255,255,255,0.8);}
.chat-input::placeholder{color:var(--text-dim);}
.send-btn{width:40px;height:40px;background:var(--grad-blue);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s var(--ease);color:white;font-size:18px;font-weight:700;box-shadow:0 4px 12px rgba(79,109,240,0.25);}
.send-btn:disabled{opacity:0.3;box-shadow:none;}
.send-btn:not(:disabled):active{transform:scale(0.88);}

/* MODE PICKER in chat */
.mode-bar{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:rgba(255,255,255,0.5);border-bottom:1px solid var(--border);}
.mode-bar::-webkit-scrollbar{display:none;}
.mode-chip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);background:rgba(255,255,255,0.6);color:var(--text-tertiary);}
.mode-chip:active{transform:scale(0.94);}
.mode-chip.active{color:white;border-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.mode-chip.active.chat-mode{background:var(--grad-blue);}
.mode-chip.active.research-mode{background:var(--grad-research);}
.mode-chip.active.notebook-mode{background:var(--grad-notebook);}
.mode-chip.active.infographic-mode{background:var(--grad-infographic);}

/* ═══ FILES ═══ */
.files-scroll{flex:1;overflow-y:auto;padding:0 16px 92px;-webkit-overflow-scrolling:touch;}
.filters{display:flex;gap:8px;padding:12px 0;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);background:rgba(255,255,255,0.5);color:var(--text-tertiary);cursor:pointer;white-space:nowrap;transition:all 0.2s var(--ease);letter-spacing:0.3px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.chip:active{transform:scale(0.94);}
.chip.active{background:var(--ink-blue-soft);color:var(--ink-blue);border-color:rgba(79,109,240,0.2);box-shadow:0 2px 8px rgba(79,109,240,0.1);}
.file-item{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:8px;}
.file-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.file-info{flex:1;min-width:0;}
.file-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.file-meta{font-size:11px;color:var(--text-tertiary);margin-top:3px;display:flex;gap:8px;align-items:center;}
.file-meta .live{color:var(--ink-green);font-weight:600;}

/* DOC DETAIL */
.doc-detail{padding:20px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:92px;}
.doc-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.3px;margin-bottom:4px;}
.doc-meta-line{font-size:12px;color:var(--text-tertiary);margin-bottom:18px;}
.doc-actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.doc-btn{padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s var(--ease);min-height:44px;border:1px solid transparent;}
.doc-btn:active{transform:scale(0.95);}
.doc-btn.primary{background:var(--grad-blue);color:white;box-shadow:0 4px 12px rgba(79,109,240,0.2);}
.doc-btn.open{background:var(--ink-green-soft);color:var(--ink-green);border-color:rgba(5,150,105,0.15);}
.doc-btn.danger{background:var(--ink-red-soft);color:var(--ink-red);border-color:rgba(220,38,38,0.12);}
.doc-content-preview{background:rgba(255,255,255,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;padding:16px;font-size:13px;line-height:1.7;color:var(--text-secondary);white-space:pre-wrap;}

/* INFOGRAPHIC PREVIEW */
.infographic-preview{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  border-radius:14px;padding:20px;color:white;margin-top:10px;
}
.ig-title{font-size:16px;font-weight:700;margin-bottom:12px;text-align:center;}
.ig-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.ig-stat{text-align:center;padding:12px 8px;background:rgba(255,255,255,0.08);border-radius:10px;border:1px solid rgba(255,255,255,0.1);}
.ig-stat .num{font-size:22px;font-weight:800;background:linear-gradient(135deg,#00d4ff,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ig-stat .lbl{font-size:9px;color:rgba(255,255,255,0.6);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;}
.ig-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:8px;overflow:hidden;}
.ig-bar-fill{height:100%;border-radius:3px;}

/* NOTEBOOK PREVIEW */
.notebook-preview{
  background:linear-gradient(135deg,#fff7ed,#fef3c7);
  border:1px solid rgba(234,88,12,0.15);border-radius:14px;padding:16px;margin-top:10px;
}
.nb-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.nb-icon{font-size:20px;}
.nb-title{font-size:14px;font-weight:700;color:#92400e;}
.nb-sources{font-size:12px;color:#b45309;margin-bottom:10px;}
.nb-actions{display:flex;gap:8px;flex-wrap:wrap;}
.nb-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(234,88,12,0.1);color:#ea580c;border:1px solid rgba(234,88,12,0.15);cursor:pointer;}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--grad-blue);color:white;padding:12px 24px;border-radius:14px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 8px 24px rgba(79,109,240,0.3);transition:transform 0.3s var(--spring);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Progress animation */
.progress-ring{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(255,255,255,0.9);border-radius:12px;border:1px solid var(--border);margin-top:8px;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--ink-blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.progress-text{font-size:12px;color:var(--text-secondary);font-weight:500;}
</style>
</head>
<body>
<div class="app" id="app">
<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-scroll">
    <div class="home-header">
      <h1>VanderBot</h1>
      <p>Your AI workspace</p>
    </div>

    <div class="quick-grid">
      <div class="qa blue" onclick="newChat()"><div class="icon">💬</div><div class="label">Chat</div></div>
      <div class="qa doc" onclick="createDoc('doc')"><div class="icon">📄</div><div class="label">Doc</div></div>
      <div class="qa purple" onclick="createDoc('deck')"><div class="icon">📊</div><div class="label">Deck</div></div>
      <div class="qa green" onclick="createDoc('page')"><div class="icon">🌐</div><div class="label">Page</div></div>
      <div class="qa rose" onclick="createDoc('infographic')"><div class="icon">📈</div><div class="label">Info-graphic</div></div>
      <div class="qa orange" onclick="createDoc('notebook')"><div class="icon">🎙️</div><div class="label">Notebook LM</div></div>
      <div class="qa teal" onclick="startResearch()"><div class="icon">🔬</div><div class="label">Deep Research</div></div>
      <div class="qa gold" onclick="toast('🖼️ Image picker')"><div class="icon">📷</div><div class="label">Image</div></div>
    </div>

    <div class="section-header"><h3>Recent Chats</h3><a href="#" onclick="navTo('chat');return false;">See all</a></div>
    <div id="home-chats"></div>
    <div class="section-header"><h3>Recent Files</h3><a href="#" onclick="navTo('files');return false;">See all</a></div>
    <div id="home-files"></div>
  </div>
</div>

<!-- CREATE -->
<div class="screen" id="screen-create">
  <div class="top-bar"><div class="back" onclick="navTo('home')">‹</div><h2 id="create-title">Create</h2></div>
  <div class="create-scroll" id="create-content"></div>
</div>

<!-- CHAT -->
<div class="screen" id="screen-chat">
  <div class="top-bar"><div class="back" onclick="navTo('home')">‹</div><h2 id="chat-title">Chat</h2></div>
  <div class="mode-bar" id="mode-bar">
    <div class="mode-chip active chat-mode" onclick="setMode('chat')">💬 Chat</div>
    <div class="mode-chip research-mode" onclick="setMode('research')">🔬 Deep Research</div>
    <div class="mode-chip notebook-mode" onclick="setMode('notebook')">🎙️ NotebookLM</div>
    <div class="mode-chip infographic-mode" onclick="setMode('infographic')">📈 Infographic</div>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <button class="attach-btn" onclick="toast('📷 Image picker')">🖼️</button>
    <textarea class="chat-input" id="chat-input" placeholder="Message VanderBot…" rows="1"
      oninput="autoGrow(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>↑</button>
  </div>
</div>

<!-- FILES -->
<div class="screen" id="screen-files">
  <div class="top-bar"><div class="back" onclick="navTo('home')">‹</div><h2>Files</h2></div>
  <div class="files-scroll">
    <div class="filters" id="file-filters"></div>
    <div id="file-list"></div>
  </div>
</div>

<!-- DOC -->
<div class="screen" id="screen-doc">
  <div class="top-bar"><div class="back" onclick="navTo('files')">‹</div><h2>Document</h2></div>
  <div class="doc-detail" id="doc-detail"></div>
</div>

<!-- NAV -->
<div class="nav-bar" id="nav-bar">
  <div class="nav-item active" data-screen="home" onclick="navTo('home')"><div class="ni">🏠</div><div class="nl">Home</div></div>
  <div class="nav-item" data-screen="create" onclick="showCreate()"><div class="ni">✨</div><div class="nl">Create</div></div>
  <div class="nav-item" data-screen="files" onclick="navTo('files')"><div class="ni">📁</div><div class="nl">Files</div></div>
</div>
</div>

<script>
let chatMode='chat';
const state={
  chats:[
    {id:'c1',title:'BackyardOne product email',time:'Mar 13, 3:08 PM',messages:[
      {role:'user',text:'Draft an email about the BackyardOne product process for the Inkwell team'},
      {role:'bot',text:'Here\'s the draft:\n\n<b>Subject:</b> BackyardOne — Product Process, Architecture & How to Get Involved\n\nTeam, I want to share a clearer outline of where we are with BackyardOne — both the product process and the underlying architecture…'},
      {role:'user',text:'Add the IAM awareness model as the common foundation with Volvox'},
      {role:'bot',text:'Updated with a new section:\n\n<b>Common Foundation — IAM & Volvox</b>\n\nAll Inkwell Labs ventures are built on the Inkwell Awareness Model and a common Knowledge Graph powered by Volvox. Every venture we build makes the others smarter.'}
    ]},
    {id:'c2',title:'VNY scenario planning',time:'Mar 12',messages:[
      {role:'user',text:'Build a scenario planner for VNY Hart Street lease'},
      {role:'bot',text:'Built <b>vny-scenario.html</b> — 5 modules, 4 configurations scored. Key risk: FAA Part 13/16 grant obligations.'}
    ]},
    {id:'c3',title:'Deep research: LA ADU market',time:'Mar 11',messages:[
      {role:'user',text:'Research the LA ADU market — regulations, builders, market size, opportunity'},
      {role:'bot',type:'research',text:'<b>LA ADU Market Intelligence</b>',body:'California AB 68 & SB 13 eliminated most barriers to ADU construction in 2020. LA issued <b>24,500+ ADU permits</b> since 2017 — more than any other US city.\n\n<b>Key findings:</b>\n• Average build cost: $150K-$350K (detached), $80K-$200K (conversion)\n• Average rental income: $1,800-$3,200/mo depending on area\n• ROI timeline: 4-7 years at current rates\n• Top builders: Cover, Villa, Acton ADU, Premier ADU\n• Biggest bottleneck: LADBS permit processing (avg 4-6 months)\n\n<b>BackyardOne opportunity:</b> ADU investors need permit tracking + zoning verification + cost estimation in one place. This is a natural feature extension.',sources:['LADBS Open Data','LA Times','Cover Technologies','CA HCD Report 2024','Zillow Research']}
    ]}
  ],
  docs:[
    {id:'d1',title:'backyard-one.html',type:'page',version:3,date:'Mar 13',published:true,url:'https://revilopark.github.io/ontological-theatre/backyard-one.html',content:'BackyardOne — LA Real Estate Intelligence\nProperty lookup, LADBS permits, ZIMAS zoning, parcel maps.'},
    {id:'d2',title:'LA ADU Market Analysis',type:'infographic',version:1,date:'Mar 11',published:true,content:'Infographic: LA ADU Market\n24,500 permits since 2017\n$150K-$350K avg build cost\n4-6 month permit timeline'},
    {id:'d3',title:'Inkwell Labs Overview',type:'deck',version:2,date:'Mar 11',published:false,content:'Slide 1: Inkwell Labs — Building the Intelligence Layer\nSlide 2: Portfolio\nSlide 3: IAM + Volvox\nSlide 4: Team & Traction'},
    {id:'d4',title:'BackyardOne Product Email',type:'doc',version:4,date:'Mar 13',published:false,content:'Subject: BackyardOne — Product Process\nPhase 1: Product-Market Fit\nPhase 2: Launch Partners\nPhase 3: MVP Build'},
    {id:'d5',title:'BackyardOne Market Research',type:'notebook',version:1,date:'Mar 10',published:false,content:'NotebookLM: BackyardOne Research\n3 sources loaded\nPodcast episode generated (12 min)\nKey topics: LA zoning, permit data, proptech landscape'},
    {id:'d6',title:'wildling-series.html',type:'page',version:1,date:'Feb 27',published:true,url:'#',content:'3-Part Wildling Beauty Editorial Series'},
    {id:'d7',title:'bmos-venues.html',type:'page',version:1,date:'Feb 27',published:true,url:'#',content:'360 US Live Venues — Block BMOS'}
  ],
  currentChat:null,currentDoc:null,fileFilter:'all'
};

function navTo(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const ni=document.querySelector(`.nav-item[data-screen="${s}"]`);if(ni)ni.classList.add('active');
  document.getElementById('nav-bar').style.display=['chat','doc'].includes(s)?'none':'flex';
  if(s==='home')renderHome();if(s==='files')renderFiles();
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function renderHome(){
  document.getElementById('home-chats').innerHTML=state.chats.slice(0,3).map(c=>`
    <div class="glass list-item" onclick="openChat('${c.id}')">
      <div class="li-icon" style="background:var(--ink-blue-soft)">💬</div>
      <div class="li-info"><div class="li-title">${c.title}</div><div class="li-meta">${c.time}</div></div>
      <span class="li-arrow">›</span>
    </div>`).join('');
  document.getElementById('home-files').innerHTML=state.docs.slice(0,4).map(d=>`
    <div class="glass list-item" onclick="openDoc('${d.id}')">
      <div class="li-icon" style="background:${typeBg(d.type)}">${typeIcon(d.type)}</div>
      <div class="li-info"><div class="li-title">${d.title}</div>
        <div class="li-meta"><span>${typeLabel(d.type)}</span>${d.published?'<span class="live">● LIVE</span>':''}<span>v${d.version}</span></div>
      </div><span class="li-arrow">›</span>
    </div>`).join('');
}

function showCreate(){
  document.getElementById('create-title').textContent='Create';
  document.getElementById('create-content').innerHTML=`
    <div class="create-card" onclick="createDoc('infographic')">
      <div class="cc-header"><div class="cc-icon" style="background:var(--ink-rose-soft)">📈</div><div class="cc-title">Infographic</div></div>
      <div class="cc-desc">Generate data visualizations and visual summaries from any topic. Charts, stats, comparisons — all auto-designed.</div>
      <div class="cc-tags"><span class="cc-tag" style="background:var(--ink-rose-soft);color:var(--ink-rose)">Data Viz</span><span class="cc-tag" style="background:var(--ink-purple-soft);color:var(--ink-purple)">Auto-Design</span></div>
    </div>
    <div class="create-card" onclick="createDoc('notebook')">
      <div class="cc-header"><div class="cc-icon" style="background:var(--ink-orange-soft)">🎙️</div><div class="cc-title">NotebookLM</div></div>
      <div class="cc-desc">Create research notebooks with AI analysis. Add URLs, documents, or text — generate podcasts, study guides, and Q&A sessions.</div>
      <div class="cc-tags"><span class="cc-tag" style="background:var(--ink-orange-soft);color:var(--ink-orange)">Podcast</span><span class="cc-tag" style="background:var(--ink-gold-soft);color:var(--ink-gold)">Research</span><span class="cc-tag" style="background:var(--ink-cyan-soft);color:var(--ink-cyan)">Multi-Source</span></div>
    </div>
    <div class="create-card" onclick="startResearch()">
      <div class="cc-header"><div class="cc-icon" style="background:var(--ink-teal-soft)">🔬</div><div class="cc-title">Deep Research</div></div>
      <div class="cc-desc">Multi-source intelligence gathering. Searches, synthesizes, and produces structured reports with citations.</div>
      <div class="cc-tags"><span class="cc-tag" style="background:var(--ink-teal-soft);color:var(--ink-teal)">Web Search</span><span class="cc-tag" style="background:var(--ink-blue-soft);color:var(--ink-blue)">Citations</span><span class="cc-tag" style="background:var(--ink-green-soft);color:var(--ink-green)">Synthesis</span></div>
    </div>
    <div class="create-card" onclick="createDoc('doc')">
      <div class="cc-header"><div class="cc-icon" style="background:var(--ink-cyan-soft)">📄</div><div class="cc-title">Document</div></div>
      <div class="cc-desc">Draft emails, memos, proposals, or any text document. Edit, version, and sync to Google Drive.</div>
    </div>
    <div class="create-card" onclick="createDoc('deck')">
      <div class="cc-header"><div class="cc-icon" style="background:var(--ink-purple-soft)">📊</div><div class="cc-title">Pitch Deck</div></div>
      <div class="cc-desc">Generate slide decks from a brief. Export to Google Slides. Full narrative + data slides.</div>
    </div>
    <div class="create-card" onclick="createDoc('page')">
      <div class="cc-header"><div class="cc-icon" style="background:var(--ink-green-soft)">🌐</div><div class="cc-title">Web Page</div></div>
      <div class="cc-desc">Build HTML/CSS pages. Preview in-app, publish to GitHub Pages with one tap.</div>
    </div>`;
  navTo('create');
}

function setMode(m){
  chatMode=m;
  document.querySelectorAll('.mode-chip').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.mode-chip.${m}-mode`).classList.add('active');
  const input=document.getElementById('chat-input');
  const placeholders={chat:'Message VanderBot…',research:'What do you want to research?',notebook:'Describe your notebook topic…',infographic:'What data should we visualize?'};
  input.placeholder=placeholders[m]||placeholders.chat;
}

function openChat(id){
  const chat=state.chats.find(c=>c.id===id);if(!chat)return;
  state.currentChat=chat;
  document.getElementById('chat-title').textContent=chat.title.length>26?chat.title.slice(0,26)+'…':chat.title;
  renderMessages();navTo('chat');
  setTimeout(()=>{const el=document.getElementById('chat-messages');el.scrollTop=el.scrollHeight;},50);
}
function newChat(){
  state.chats.unshift({id:'c'+Date.now(),title:'New Chat',time:'Just now',messages:[]});
  openChat(state.chats[0].id);
}
function startResearch(){
  newChat();setMode('research');
}
function renderMessages(){
  const chat=state.currentChat;if(!chat)return;
  const el=document.getElementById('chat-messages');
  if(!chat.messages.length){
    el.innerHTML='<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;"><div style="font-size:52px;">🐘</div><div style="color:var(--text-tertiary);margin-top:14px;font-size:15px;font-weight:500;">What are we building?</div></div>';
    return;
  }
  el.innerHTML=chat.messages.map(m=>{
    if(m.type==='research') return `
      <div class="bubble user">${chat.messages[chat.messages.indexOf(m)-1]?.text||''}</div>
      <div class="research-card">
        <div class="rc-header"><span class="rc-badge" style="background:var(--ink-teal-soft);color:var(--ink-teal);">🔬 Deep Research</span></div>
        <div class="rc-title">${m.text}</div>
        <div class="rc-body">${m.body}</div>
        <div class="rc-sources">${(m.sources||[]).map(s=>`<span class="rc-source">${s}</span>`).join('')}</div>
      </div>`;
    if(m.type==='infographic') return `
      <div class="research-card">
        <div class="rc-header"><span class="rc-badge" style="background:var(--ink-rose-soft);color:var(--ink-rose);">📈 Infographic</span></div>
        <div class="infographic-preview">
          <div class="ig-title">${m.igTitle||'Data Visualization'}</div>
          <div class="ig-stats">${(m.stats||[]).map(s=>`<div class="ig-stat"><div class="num">${s.num}</div><div class="lbl">${s.label}</div></div>`).join('')}</div>
          ${(m.bars||[]).map(b=>`<div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.6);margin-bottom:2px;"><span>${b.label}</span><span>${b.pct}%</span></div><div class="ig-bar"><div class="ig-bar-fill" style="width:${b.pct}%;background:${b.color||'linear-gradient(90deg,#00d4ff,#4facfe)'}"></div></div>`).join('')}
        </div>
      </div>`;
    if(m.type==='notebook') return `
      <div class="research-card">
        <div class="notebook-preview">
          <div class="nb-header"><span class="nb-icon">🎙️</span><span class="nb-title">${m.nbTitle||'NotebookLM'}</span></div>
          <div class="nb-sources">${m.nbSources||'3 sources loaded'}</div>
          <div class="rc-body" style="color:#92400e;font-size:12px;">${m.body||''}</div>
          <div class="nb-actions">
            <div class="nb-btn" onclick="toast('▶️ Playing podcast…')">▶️ Play Podcast</div>
            <div class="nb-btn" onclick="toast('📋 Generating study guide…')">📋 Study Guide</div>
            <div class="nb-btn" onclick="toast('❓ Starting Q&A…')">❓ Ask Questions</div>
          </div>
        </div>
      </div>`;
    return `<div class="bubble ${m.role==='user'?'user':'bot'}">${m.text}</div>`;
  }).join('');
}

function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';document.getElementById('send-btn').disabled=el.value.trim()==='';}

function sendMsg(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();if(!text||!state.currentChat)return;
  state.currentChat.messages.push({role:'user',text});
  if(state.currentChat.messages.length<=2)state.currentChat.title=text.slice(0,45);
  state.currentChat.time='Just now';
  input.value='';input.style.height='auto';document.getElementById('send-btn').disabled=true;
  renderMessages();
  const el=document.getElementById('chat-messages');el.scrollTop=el.scrollHeight;

  if(chatMode==='research'){
    el.innerHTML+=`<div class="progress-ring"><div class="spinner"></div><span class="progress-text">Searching 12 sources…</span></div>`;
    el.scrollTop=el.scrollHeight;
    setTimeout(()=>{
      state.currentChat.messages.push({role:'bot',type:'research',text:`<b>${text}</b>`,
        body:`Based on analysis of multiple sources:\n\n<b>Key findings:</b>\n• Primary market insight synthesized from 12 sources\n• Competitive landscape mapped with 5 major players identified\n• Regulatory framework analyzed across state and local jurisdictions\n• Revenue opportunity estimated at $2.4M ARR within 18 months\n\n<b>Recommendation:</b> Proceed with Phase 1 validation. Three potential partners identified for outreach.`,
        sources:['Google Scholar','Crunchbase','SEC Filings','Industry Reports','News Archives']});
      renderMessages();el.scrollTop=el.scrollHeight;
    },2500);
  } else if(chatMode==='notebook'){
    el.innerHTML+=`<div class="progress-ring"><div class="spinner"></div><span class="progress-text">Creating notebook…</span></div>`;
    el.scrollTop=el.scrollHeight;
    setTimeout(()=>{
      state.currentChat.messages.push({role:'bot',type:'notebook',
        nbTitle:text.slice(0,40),nbSources:'4 sources analyzed · 12 min podcast ready',
        body:'Notebook created with key themes extracted. AI-generated podcast covers the main topics in a conversational format. Study guide and Q&A mode available.'});
      renderMessages();el.scrollTop=el.scrollHeight;
    },2000);
  } else if(chatMode==='infographic'){
    el.innerHTML+=`<div class="progress-ring"><div class="spinner"></div><span class="progress-text">Generating infographic…</span></div>`;
    el.scrollTop=el.scrollHeight;
    setTimeout(()=>{
      state.currentChat.messages.push({role:'bot',type:'infographic',
        igTitle:text.slice(0,35),
        stats:[{num:'24.5K',label:'Total Units'},{num:'$280K',label:'Avg Cost'},{num:'18mo',label:'ROI Period'}],
        bars:[{label:'Residential',pct:72,color:'linear-gradient(90deg,#4f6df0,#6366f1)'},
              {label:'Commercial',pct:45,color:'linear-gradient(90deg,#0891b2,#06b6d4)'},
              {label:'Mixed Use',pct:28,color:'linear-gradient(90deg,#7c3aed,#8b5cf6)'}]});
      renderMessages();el.scrollTop=el.scrollHeight;
    },2200);
  } else {
    const tb=document.createElement('div');tb.className='bubble bot';
    tb.innerHTML='<span class="typing-dots">●●●</span>';el.appendChild(tb);el.scrollTop=el.scrollHeight;
    setTimeout(()=>{
      const r=["Got it. Let me work on that.","Here's what I'd suggest:\n\n<b>1.</b> Start with the problem\n<b>2.</b> Layer in architecture\n<b>3.</b> Connect IAM + Volvox\n<b>4.</b> Clear call to action","Done. Three sections:\n\n• <b>Product Process</b> — PMF → Partners → MVP\n• <b>Foundation</b> — IAM + Volvox\n• <b>Architecture</b> — Data → Intelligence → Experience"];
      state.currentChat.messages.push({role:'bot',text:r[Math.floor(Math.random()*r.length)]});
      renderMessages();el.scrollTop=el.scrollHeight;
    },1200+Math.random()*800);
  }
}

function renderFiles(){
  const types=[['all','All'],['doc','Docs'],['deck','Decks'],['page','Pages'],['infographic','Infographics'],['notebook','Notebooks']];
  document.getElementById('file-filters').innerHTML=types.map(([k,v])=>`
    <div class="chip ${state.fileFilter===k?'active':''}" onclick="setFilter('${k}')">${v}</div>`).join('');
  const docs=state.fileFilter==='all'?state.docs:state.docs.filter(d=>d.type===state.fileFilter);
  document.getElementById('file-list').innerHTML=docs.map(d=>`
    <div class="glass file-item" onclick="openDoc('${d.id}')">
      <div class="file-icon" style="background:${typeBg(d.type)}">${typeIcon(d.type)}</div>
      <div class="file-info"><div class="file-title">${d.title}</div>
        <div class="file-meta"><span>${typeLabel(d.type)}</span><span>v${d.version}</span>${d.published?'<span class="live">● LIVE</span>':''}<span>${d.date}</span></div>
      </div><span style="color:var(--text-dim);font-size:18px;">›</span>
    </div>`).join('');
}
function setFilter(f){state.fileFilter=f;renderFiles();}
function openDoc(id){
  const d=state.docs.find(x=>x.id===id);if(!d)return;state.currentDoc=d;
  document.getElementById('doc-detail').innerHTML=`
    <div class="doc-title">${d.title}</div>
    <div class="doc-meta-line">${typeLabel(d.type)} · v${d.version} · ${d.date}</div>
    <div class="doc-actions">
      ${d.type==='page'?`<button class="doc-btn primary" onclick="publishDoc()">🚀 ${d.published?'Republish':'Publish'}</button>`:''}
      ${d.type==='infographic'?`<button class="doc-btn primary" onclick="toast('📤 Exporting PNG…')">📤 Export PNG</button>`:''}
      ${d.type==='notebook'?`<button class="doc-btn primary" onclick="toast('▶️ Playing podcast…')">▶️ Play Podcast</button>`:''}
      ${d.published?`<button class="doc-btn open" onclick="toast('🔗 Opening…')">🔗 View Live</button>`:''}
      <button class="doc-btn danger" onclick="toast('🗑️ Delete confirmation')">🗑️ Delete</button>
    </div>
    <div class="doc-content-preview">${d.content}</div>`;
  navTo('doc');
}
function publishDoc(){if(!state.currentDoc)return;toast('🚀 Published!');state.currentDoc.published=true;}
function createDoc(type){
  const n={doc:'Document',deck:'Deck',page:'Page',infographic:'Infographic',notebook:'Notebook'}[type]||type;
  state.docs.unshift({id:'d'+Date.now(),title:`Untitled ${n}`,type,version:1,date:'Just now',published:false,content:`New ${n} — start editing…`});
  openDoc(state.docs[0].id);
}

function typeIcon(t){return{doc:'📄',deck:'📊',page:'🌐',infographic:'📈',notebook:'🎙️'}[t]||'📄';}
function typeLabel(t){return{doc:'DOC',deck:'DECK',page:'PAGE',infographic:'INFOGRAPHIC',notebook:'NOTEBOOK'}[t]||t.toUpperCase();}
function typeBg(t){return{doc:'var(--ink-cyan-soft)',deck:'var(--ink-purple-soft)',page:'var(--ink-green-soft)',infographic:'var(--ink-rose-soft)',notebook:'var(--ink-orange-soft)'}[t]||'var(--ink-cyan-soft)';}

renderHome();
</script>
</body>
</html>
